<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Web Reactor · Arcade Reactor</title>

<!-- Favicons -->
<link rel="icon" type="image/png" sizes="32x32"  href="../assets/favicon-32.png">
<link rel="icon" type="image/png" sizes="256x256" href="../assets/favicon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: #000;
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    color: #fff;
    -webkit-user-select: none; user-select: none;
    touch-action: none;
  }

  #wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    height: calc(100% - 48px);
    margin-top: 48px;
    background: #000;
  }

  canvas { display: block; flex-shrink: 0; }

  #controls {
    display: none;
    flex-shrink: 0;
    width: 100%;
    background: #000;
    position: relative;
  }

  .ctrl-row {
    display: flex; align-items: center; justify-content: space-between;
    height: 100%; padding: 6px 8px; gap: 6px;
  }

  .ctrl-stick-zone {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    -webkit-tap-highlight-color: transparent;
  }

  .ctrl-right-group {
    flex: 0 0 auto;
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .btn {
    border: 1px solid rgba(255,255,255,0.35);
    border-radius: 8px;
    background: rgba(255,255,255,0.06);
    color: #fff;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 0.04em;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 3px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.05s, border-color 0.05s;
    width: 80px; height: 80px;
  }
  .btn.active {
    background: rgba(255,255,255,0.18);
    border-color: rgba(255,255,255,0.7);
  }
  .btn[disabled] { opacity: 0.3; pointer-events: none; }
  .btn-icon  { font-size: 24px; line-height: 1; }
  .btn-label { font-size: 9px; opacity: 0.55; letter-spacing: 0.08em; }

  #btn-fire        { border-color: rgba(34,211,238,0.5); }
  #btn-fire.active { background: rgba(34,211,238,0.22); border-color: rgba(34,211,238,0.9); }

  #btn-zap        { border-color: rgba(251,191,36,0.55); }
  #btn-zap.active { background: rgba(251,191,36,0.3); border-color: rgba(251,191,36,1); }
  #btn-zap .btn-icon { color: #fbbf24; }

  /* ── Virtual thumbstick (horizontal-only for Web Reactor) ────── */
  .stick-base {
    width: 96px; height: 96px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.04);
    position: relative;
    box-shadow: inset 0 0 20px rgba(255,255,255,0.04);
  }
  .stick-base::before {
    /* horizontal guide only — no vertical axis on the web */
    content: '';
    position: absolute;
    background: rgba(255,255,255,0.12);
    top: 50%; left: 12%; right: 12%; height: 1px;
    transform: translateY(-0.5px);
  }
  .stick-knob {
    position: absolute;
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.55);
    background: rgba(255,255,255,0.12);
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    transition: background 0.06s, border-color 0.06s, box-shadow 0.06s;
    pointer-events: none;
  }
  .stick-base.active .stick-knob {
    background: rgba(34,211,238,0.22);
    border-color: rgba(34,211,238,0.9);
    box-shadow: 0 0 14px rgba(34,211,238,0.4);
  }

  /* Hide on-screen controls when a gamepad is connected */
  body.gamepad-active #controls { display: none !important; }

  .ar-topbar {
    position: fixed; top: 0; left: 0; right: 0; height: 48px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 14px;
    background: rgba(10, 14, 20, 0.92);
    backdrop-filter: saturate(140%) blur(10px);
    -webkit-backdrop-filter: saturate(140%) blur(10px);
    border-bottom: 1px solid #1f2937;
    z-index: 9999;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    color: #e6edf3;
  }
  .ar-back {
    display: inline-flex; align-items: center; gap: 6px;
    color: #8b98a8; text-decoration: none;
    font-size: 13px; font-weight: 500;
    padding: 6px 10px; border-radius: 6px;
    border: 1px solid #1f2937;
    transition: color 0.15s, border-color 0.15s;
  }
  .ar-back:hover { color: #22d3ee; border-color: #22d3ee; }
  .ar-back svg   { width: 14px; height: 14px; }
  .ar-title {
    font-size: 13px; font-weight: 700;
    letter-spacing: 0.22em; text-transform: uppercase;
  }
  .ar-score {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 12px; color: #8b98a8;
    letter-spacing: 0.12em; min-width: 90px; text-align: right;
  }
  .ar-score-value { color: #22d3ee; font-weight: 700; }
  .ar-gamepad {
    display: none;
    margin-left: 8px;
    font-size: 14px;
    color: #22d3ee;
    filter: drop-shadow(0 0 4px rgba(34,211,238,0.5));
  }
  body.gamepad-active .ar-gamepad { display: inline; }
  @media (max-width: 480px) {
    .ar-title { font-size: 11px; letter-spacing: 0.15em; }
    .ar-back span { display: none; }
    .ar-back { padding: 6px 8px; }
  }
</style>
</head>
<body>

<div class="ar-topbar">
  <a href="../index.html" class="ar-back" aria-label="Back to Arcade Reactor">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    <span>Arcade Reactor</span>
  </a>
  <div class="ar-title">Web Reactor</div>
  <div class="ar-score">
    SCORE <span class="ar-score-value" id="ar-score-value">0</span><span class="ar-gamepad" title="Gamepad connected">🎮</span>
  </div>
</div>

<div id="wrap">
  <canvas id="c"></canvas>
  <div id="controls">
    <div class="ctrl-row">
      <div class="ctrl-stick-zone" id="stick-zone">
        <div class="stick-base" id="stick-base">
          <div class="stick-knob" id="stick-knob"></div>
        </div>
      </div>
      <div class="ctrl-right-group">
        <div class="btn" id="btn-zap">
          <span class="btn-icon">⚡</span>
          <span class="btn-label">ZAP</span>
        </div>
        <div class="btn" id="btn-fire">
          <span class="btn-icon">◉</span>
          <span class="btn-label">FIRE</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
/* ================================================================
   WEB REACTOR v3 — Tempest-style endless vector arcade
   ----------------------------------------------------------------
   • 6 board shapes; random selection each level (no back-to-back)
   • Random color each level (no back-to-back)
   • Warp transition between levels: tube zooms out past camera,
     new tube zooms in. During the outbound zoom, spikes on your
     lane KILL you — dodge with A/D or ◁/▷.
   • Spikes cannot be cleared mid-level (removed bullet-nibble).
     Their purpose: threaten you during the warp.
   • Slower player controls (cooldown 6→10 frames)
   ================================================================ */

const canvas  = document.getElementById('c');
const ctx     = canvas.getContext('2d');
const ctrlBar = document.getElementById('controls');

const AR_TOPBAR_H = 48;
const GW = 900, GH = 650;
const CX = GW / 2;
const CY = GH / 2 + 10;
const TWOPI = Math.PI * 2;

// ── Canvas resize ────────────────────────────────────────────────
const CTRL_BAR_H = 110;
let canvasW = GW, canvasH = GH, touchMode = false;

function resize() {
  const availW = window.innerWidth;
  const availH = window.innerHeight - AR_TOPBAR_H;
  const barH   = touchMode ? CTRL_BAR_H : 0;
  const playH  = availH - barH;
  const scale  = Math.min(availW / GW, playH / GH);
  canvasW = Math.round(GW * scale);
  canvasH = Math.round(GH * scale);
  canvas.width  = GW;  canvas.height = GH;
  canvas.style.width  = canvasW + 'px';
  canvas.style.height = canvasH + 'px';
  if (touchMode) {
    ctrlBar.style.display = 'block';
    ctrlBar.style.height  = CTRL_BAR_H + 'px';
    ctrlBar.style.width   = availW + 'px';
  } else {
    ctrlBar.style.display = 'none';
  }
}
window.addEventListener('resize', resize);
resize();
function activateTouch() { if (!touchMode) { touchMode = true; resize(); } }

// ── Input ────────────────────────────────────────────────────────
const keys     = {};
const keysPrev = {};                 // previous-frame snapshot for tap detection
const touch    = { left: false, right: false, fire: false, zap: false, sliding: false };
const touchPrev = { left: false, right: false, fire: false, zap: false };
const pad      = { left: false, right: false, fire: false, zap: false, connected: false };
const padPrev  = { left: false, right: false };

document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowLeft','ArrowRight','KeyX'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

document.addEventListener('keydown', e => {
  if (e.code === 'Enter' && (!state || state.phase === 'gameover')) startGame();
});

function wireBtn(id, prop) {
  const el = document.getElementById(id);
  function press(e) {
    e.preventDefault(); activateTouch();
    touch[prop] = true; el.classList.add('active');
    if (!state || state.phase === 'gameover') startGame();
  }
  function release(e) {
    e.preventDefault();
    touch[prop] = false; el.classList.remove('active');
  }
  el.addEventListener('touchstart',  press,   { passive: false });
  el.addEventListener('touchend',    release, { passive: false });
  el.addEventListener('touchcancel', release, { passive: false });
  el.addEventListener('mousedown', press);
  el.addEventListener('mouseup',   release);
  el.addEventListener('mouseleave',release);
}
wireBtn('btn-fire', 'fire');
wireBtn('btn-zap',  'zap');
document.addEventListener('touchstart', activateTouch, { once: true, passive: true });

// ── Virtual thumbstick (horizontal axis only) ────────────────────
// Finger anchor: the stick base jumps to wherever the finger lands,
// so you never have to aim for the knob. Only LEFT/RIGHT matter on
// the web — vertical finger movement is ignored. touch.sliding is
// still set so the v4 edge detection skips its hold-delay and feels
// instant.
function wireStick(zoneId, baseId, knobId) {
  const zone = document.getElementById(zoneId);
  const base = document.getElementById(baseId);
  const knob = document.getElementById(knobId);
  if (!zone || !base || !knob) return;

  const DEAD_ZONE  = 10;
  const MAX_RADIUS = 32;

  let trackingId = null;
  let originCX   = 0;

  function setDir(dir) {
    touch.left  = (dir === -1);
    touch.right = (dir === +1);
    base.classList.toggle('active', dir !== 0);
  }

  function moveKnob(dx) {
    const clamped = Math.max(-MAX_RADIUS, Math.min(MAX_RADIUS, dx));
    knob.style.transform = `translate(calc(-50% + ${clamped}px), -50%)`;
  }

  function resetKnob() {
    knob.style.transform = 'translate(-50%, -50%)';
    setDir(0);
  }

  function xFromEvent(e) {
    if (e.touches && e.touches.length) {
      if (trackingId !== null) {
        for (const t of e.touches) if (t.identifier === trackingId) return t.clientX;
      }
      return e.touches[0].clientX;
    }
    return e.clientX;
  }

  function onDown(e) {
    e.preventDefault();
    activateTouch();
    let cx, cy;
    if (e.touches) {
      const t = e.changedTouches ? e.changedTouches[0] : e.touches[0];
      trackingId = t.identifier;
      cx = t.clientX; cy = t.clientY;
    } else {
      trackingId = 'mouse';
      cx = e.clientX; cy = e.clientY;
    }
    // Move stick base to where finger landed
    const rect = zone.getBoundingClientRect();
    base.style.position = 'absolute';
    base.style.left = (cx - rect.left) + 'px';
    base.style.top  = (cy - rect.top)  + 'px';
    base.style.transform = 'translate(-50%, -50%)';
    originCX = cx;
    touch.sliding = true;
    resetKnob();
    if (!state || state.phase === 'gameover') startGame();
  }

  function onMove(e) {
    if (trackingId === null) return;
    e.preventDefault();
    const x = xFromEvent(e);
    const dx = x - originCX;
    moveKnob(dx);
    if (dx < -DEAD_ZONE)      setDir(-1);
    else if (dx >  DEAD_ZONE) setDir(+1);
    else                      setDir( 0);
  }

  function onUp(e) {
    if (trackingId === null) return;
    if (e.changedTouches) {
      let matched = false;
      for (const t of e.changedTouches) if (t.identifier === trackingId) matched = true;
      if (!matched) return;
    }
    e.preventDefault();
    trackingId = null;
    touch.sliding = false;
    base.style.position = '';
    base.style.left = '';
    base.style.top  = '';
    base.style.transform = '';
    resetKnob();
  }

  zone.addEventListener('touchstart',  onDown, { passive: false });
  zone.addEventListener('touchmove',   onMove, { passive: false });
  zone.addEventListener('touchend',    onUp,   { passive: false });
  zone.addEventListener('touchcancel', onUp,   { passive: false });
  zone.addEventListener('mousedown',   onDown);
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup',   onUp);
}

wireStick('stick-zone', 'stick-base', 'stick-knob');

// ── Gamepad API ──────────────────────────────────────────────────
const PAD_AXIS_DEAD = 0.3;
let padIndex = -1;
let padLastButtons = {};

function scanForGamepad() {
  const list = navigator.getGamepads ? navigator.getGamepads() : [];
  for (let i = 0; i < list.length; i++) {
    if (list[i]) return i;
  }
  return -1;
}

function pollGamepad() {
  if (!navigator.getGamepads) return;
  if (padIndex < 0) {
    padIndex = scanForGamepad();
    if (padIndex < 0) {
      if (pad.connected) {
        pad.connected = false;
        document.body.classList.remove('gamepad-active');
      }
      return;
    }
  }
  const gp = navigator.getGamepads()[padIndex];
  if (!gp) { padIndex = -1; return; }

  if (!pad.connected) {
    pad.connected = true;
    document.body.classList.add('gamepad-active');
    console.log('[gamepad] connected:', gp.id, '·', gp.buttons.length, 'buttons,', gp.axes.length, 'axes, mapping:', gp.mapping);
  }

  // Left stick X + D-pad L/R
  const ax = gp.axes[0] || 0;
  const dpadL = gp.buttons[14] && gp.buttons[14].pressed;
  const dpadR = gp.buttons[15] && gp.buttons[15].pressed;

  pad.left  = (ax < -PAD_AXIS_DEAD) || dpadL;
  pad.right = (ax >  PAD_AXIS_DEAD) || dpadR;

  // A button (0) = FIRE ; X/square (2) = ZAP
  pad.fire = !!(gp.buttons[0] && gp.buttons[0].pressed);
  // Zap is edge-triggered so you don't burn the charge on a long hold
  const zapNow = !!(gp.buttons[2] && gp.buttons[2].pressed);
  pad.zap = zapNow && !padLastButtons[2];

  // Start (9) → start / restart
  const startPressed = gp.buttons[9] && gp.buttons[9].pressed;
  if (startPressed && !padLastButtons[9]) {
    if (!state || state.phase === 'gameover') startGame();
  }
  for (let i = 0; i < gp.buttons.length; i++) {
    padLastButtons[i] = gp.buttons[i] && gp.buttons[i].pressed;
  }
}

window.addEventListener('gamepadconnected',   e => { padIndex = e.gamepad.index; });
window.addEventListener('gamepaddisconnected', e => { if (e.gamepad.index === padIndex) padIndex = -1; });


// ── Utilities ────────────────────────────────────────────────────
function lerp(a, b, t) { return a + (b - a) * t; }
function randBetween(a, b) { return a + Math.random() * (b - a); }
function pickDifferent(list, avoid) {
  const pool = avoid == null ? list : list.filter(x => x !== avoid);
  return (pool.length ? pool : list)[Math.floor(Math.random() * (pool.length || list.length))];
}

// ================================================================
// SHAPE BUILDERS — each returns { lanes, closed, rim[], hub[] }
// ================================================================

function shapeCircle() {
  const N = 16, outerR = 260, innerR = 42;
  const rim = [], hub = [];
  for (let i = 0; i < N; i++) {
    const a = (i / N) * TWOPI - Math.PI / 2;
    rim.push({ x: CX + Math.cos(a) * outerR, y: CY + Math.sin(a) * outerR });
    hub.push({ x: CX + Math.cos(a) * innerR, y: CY + Math.sin(a) * innerR });
  }
  return { lanes: N, closed: true, rim, hub };
}

function shapeSquare() {
  const perSide = 4, N = perSide * 4, outer = 235, inner = 38;
  const rim = [], hub = [];
  for (let i = 0; i < N; i++) {
    const side = Math.floor(i / perSide);
    const t = ((i % perSide) + 0.5) / perSide;
    let rx, ry, hx, hy;
    if (side === 0)      { rx = CX - outer + t*2*outer; ry = CY - outer;
                           hx = CX - inner + t*2*inner; hy = CY - inner; }
    else if (side === 1) { rx = CX + outer;             ry = CY - outer + t*2*outer;
                           hx = CX + inner;             hy = CY - inner + t*2*inner; }
    else if (side === 2) { rx = CX + outer - t*2*outer; ry = CY + outer;
                           hx = CX + inner - t*2*inner; hy = CY + inner; }
    else                 { rx = CX - outer;             ry = CY + outer - t*2*outer;
                           hx = CX - inner;             hy = CY + inner - t*2*inner; }
    rim.push({ x: rx, y: ry });
    hub.push({ x: hx, y: hy });
  }
  return { lanes: N, closed: true, rim, hub };
}

function shapeV() {
  const N = 13;
  const apex = { x: CX,       y: CY + 150 };
  const topL = { x: CX - 290, y: CY - 140 };
  const topR = { x: CX + 290, y: CY - 140 };
  const halfN = Math.floor(N / 2);
  const rim = [], hub = [];
  for (let i = 0; i <= halfN; i++) {
    const t = i / halfN;
    rim.push({ x: topL.x + t * (apex.x - topL.x), y: topL.y + t * (apex.y - topL.y) });
  }
  for (let i = 1; i <= halfN; i++) {
    const t = i / halfN;
    rim.push({ x: apex.x + t * (topR.x - apex.x), y: apex.y + t * (topR.y - apex.y) });
  }
  const hubC = { x: CX, y: CY - 40 };
  for (const p of rim) {
    hub.push({ x: hubC.x + (p.x - hubC.x) * 0.18, y: hubC.y + (p.y - hubC.y) * 0.18 });
  }
  return { lanes: rim.length, closed: false, rim, hub };
}

function shapeFlat() {
  const N = 14, W = 600;
  const bottomY = CY + 185;
  const topY    = CY - 170;
  const topWidth = W * 0.22;
  const rim = [], hub = [];
  for (let i = 0; i < N; i++) {
    const t = (i + 0.5) / N;
    rim.push({ x: CX - W/2 + t * W, y: bottomY });
    hub.push({ x: CX - topWidth/2 + t * topWidth, y: topY });
  }
  return { lanes: N, closed: false, rim, hub };
}

function shapeCross() {
  const N = 16;
  const rim = [], hub = [];
  for (let i = 0; i < N; i++) {
    const a = (i / N) * TWOPI - Math.PI / 2;
    const factor = 0.5 + 0.5 * Math.cos(4 * a);
    const outerR = 130 + factor * 150;
    rim.push({ x: CX + Math.cos(a) * outerR, y: CY + Math.sin(a) * outerR });
    hub.push({ x: CX + Math.cos(a) * 38,     y: CY + Math.sin(a) * 38     });
  }
  return { lanes: N, closed: true, rim, hub };
}

function shapeZigzag() {
  const N = 14, W = 600;
  const baseY = CY + 130;
  const amp   = 75;
  const rim = [], hub = [];
  for (let i = 0; i < N; i++) {
    const t = (i + 0.5) / N;
    const x = CX - W/2 + t * W;
    const y = baseY + (i % 2 === 0 ? -amp : amp);
    rim.push({ x, y });
    hub.push({ x: CX - W/4 + t * W/2, y: CY - 160 });
  }
  return { lanes: N, closed: false, rim, hub };
}

const SHAPES       = { circle: shapeCircle, square: shapeSquare, v: shapeV,
                       flat: shapeFlat, cross: shapeCross, zigzag: shapeZigzag };
const SHAPE_ORDER  = ['circle', 'square', 'v', 'flat', 'cross', 'zigzag'];
const SHAPE_LABEL  = { circle: 'CIRCLE', square: 'SQUARE', v: 'V-SHAPE',
                       flat: 'FLAT', cross: 'CROSS', zigzag: 'ZIGZAG' };
const LEVEL_COLORS = ['#22d3ee', '#a78bfa', '#f59e0b', '#22c55e', '#ef4444', '#fbbf24'];

// ================================================================
// LEVEL PLANNER — random shape/color each level (no back-to-back)
// ================================================================

function levelPlan(level, prevShape, prevColor) {
  const shape = pickDifferent(SHAPE_ORDER,  prevShape);
  const color = pickDifferent(LEVEL_COLORS, prevColor);
  const mix =
    level <= 2 ? { flipper: 1.0 } :
    level <= 4 ? { flipper: 0.75, tanker: 0.25 } :
    level <= 6 ? { flipper: 0.6,  tanker: 0.25, spiker: 0.15 } :
    level <= 9 ? { flipper: 0.55, tanker: 0.25, spiker: 0.2  } :
                 { flipper: 0.5,  tanker: 0.3,  spiker: 0.2  };
  return {
    shape, color,
    geometry:   SHAPES[shape](),
    enemyQuota: 10 + Math.floor(level * 1.8),
    enemyMix:   mix,
    baseSpeed:  0.42 + level * 0.035,
    spawnMin:   Math.max(38, 95 - level * 6),
    spawnMax:   Math.max(70, 150 - level * 7)
  };
}

function pickEnemyType(mix) {
  const r = Math.random();
  let acc = 0;
  for (const type of Object.keys(mix)) {
    acc += mix[type];
    if (r <= acc) return type;
  }
  return 'flipper';
}

// ================================================================
// LANE GEOMETRY HELPERS
// ================================================================

function laneXY(lane, depth, geom) {
  const g = geom || state.geometry;
  const r = g.rim[lane], h = g.hub[lane];
  return { x: h.x + (r.x - h.x) * depth, y: h.y + (r.y - h.y) * depth };
}

function laneNormal(lane, geom) {
  const g = geom || state.geometry;
  const r = g.rim[lane], h = g.hub[lane];
  const dx = r.x - h.x, dy = r.y - h.y;
  const len = Math.hypot(dx, dy) || 1;
  return { x: dx/len, y: dy/len };
}

function laneTangent(lane, geom) {
  const g = geom || state.geometry;
  const N = g.lanes;
  let prev, next;
  if (g.closed) {
    prev = (lane - 1 + N) % N;
    next = (lane + 1) % N;
  } else {
    prev = Math.max(0, lane - 1);
    next = Math.min(N - 1, lane + 1);
  }
  const dx = g.rim[next].x - g.rim[prev].x;
  const dy = g.rim[next].y - g.rim[prev].y;
  const len = Math.hypot(dx, dy) || 1;
  return { x: dx/len, y: dy/len };
}

function laneLength(lane, geom) {
  const g = geom || state.geometry;
  const r = g.rim[lane], h = g.hub[lane];
  return Math.hypot(r.x - h.x, r.y - h.y);
}

function visualPos() {
  const lv = state.laneVisual;
  const g  = state.geometry;
  const i0 = Math.floor(lv);
  const frac = lv - i0;
  const a = Math.max(0, Math.min(g.lanes - 1, i0));
  const b = g.closed
    ? ((i0 + 1) % g.lanes)
    : Math.max(0, Math.min(g.lanes - 1, i0 + 1));
  const r0 = g.rim[a], r1 = g.rim[b];
  return { x: r0.x + (r1.x - r0.x) * frac, y: r0.y + (r1.y - r0.y) * frac };
}

// ================================================================
// STATE
// ================================================================

// var so window.state is readable by the Arcade Reactor score bridge
var state = null;

const MOVE_COOLDOWN     = 10;  // legacy: base cadence (kept for first press)
const MOVE_REPEAT_DELAY = 11;  // frames of no-move before hold-to-repeat kicks in (~180ms @ 60fps)
const MOVE_MIN          = 4;   // fastest allowed cooldown at high levels
// Scales repeat speed with level — enemies get faster, you should too.
// Level 1  → cooldown ~10  (feels deliberate)
// Level 10 → cooldown ~6
// Level 20 → cooldown = MOVE_MIN (4)
function moveCooldownForLevel(lv) {
  return Math.max(MOVE_MIN, Math.round(MOVE_COOLDOWN - (lv - 1) * 0.4));
}
const WARP_OUT_LEN  = 55;
const WARP_IN_LEN   = 60;
const WARP_WARN_LEN = 50;   // pre-warp warning phase: "CLEAR YOUR LANE"

function startGame() {
  state = {
    phase:         'warpIn',
    warpT:         WARP_IN_LEN,
    score:         0,
    lives:         3,
    level:         1,
    lane:          0,
    laneVisual:    0,
    moveCooldown:  0,
    holdTimer:     0,
    shootCooldown: 0,
    invincible:    120,
    bullets:       [],
    enemies:       [],
    spikes:        [],
    particles:     [],
    spawnTimer:    60,
    enemiesSpawned: 0,
    enemiesKilled:  0,
    zapAvailable:   true,   // one superzapper charge per level
    zapFlashT:      0,      // visual flash frames remaining after zap fires
    geometry:      null,
    shape:         null,
    color:         null,
    prevShape:     null,
    prevColor:     null,
    plan:          null
  };
  applyLevel(1);
}

function applyLevel(level) {
  const plan = levelPlan(level, state.prevShape, state.prevColor);
  state.plan       = plan;
  state.shape      = plan.shape;
  state.color      = plan.color;
  state.geometry   = plan.geometry;
  // Reset to lane 0 of new shape
  state.lane       = 0;
  state.laneVisual = 0;
  state.bullets    = [];
  state.enemies    = [];
  state.spikes     = [];
  state.enemiesSpawned = 0;
  state.enemiesKilled  = 0;
  state.spawnTimer     = 30;
  state.invincible     = 120;
  state.zapAvailable   = true;
  state.zapFlashT      = 0;
  state.level          = level;
  state.phase          = 'warpIn';
  state.warpT          = WARP_IN_LEN;
}

function nextLevel() {
  state.score += 500 + state.level * 100;
  state.prevShape = state.shape;
  state.prevColor = state.color;
  // Celebratory burst
  for (let i = 0; i < 60; i++) {
    const a = Math.random() * TWOPI;
    state.particles.push({
      x: CX, y: CY,
      vx: Math.cos(a) * randBetween(3, 8),
      vy: Math.sin(a) * randBetween(3, 8),
      life: randBetween(30, 70), hue: 'accent'
    });
  }
  // Freeze combat, but keep spikes visible for the WARN phase
  state.bullets = [];
  state.enemies = [];
  // Begin WARN phase: gives the player time to see spikes and reposition
  state.phase = 'warpWarn';
  state.warpT = WARP_WARN_LEN;
}

function spawnEnemy() {
  const lane = Math.floor(Math.random() * state.geometry.lanes);
  const type = pickEnemyType(state.plan.enemyMix);
  const speed = type === 'flipper' ? state.plan.baseSpeed
              : type === 'tanker'  ? state.plan.baseSpeed * 0.62
                                   : state.plan.baseSpeed * 0.85;
  state.enemies.push({ type, lane, depth: 0.02, pulse: 0, speed });
  state.enemiesSpawned++;
}

// ================================================================
// UPDATE
// ================================================================

function handleLaneInput() {
  // Edge detection: tap = down now but NOT down last frame
  // Gamepad is treated like an instant (continuous) analog source — same
  // semantics as the thumbstick: holding = "I definitely mean it", so
  // it participates in edge detection via the pad.left/right flags.
  const leftDown   = keys['ArrowLeft']  || keys['KeyA'] || touch.left  || pad.left;
  const rightDown  = keys['ArrowRight'] || keys['KeyD'] || touch.right || pad.right;
  const leftPrev   = keysPrev['ArrowLeft']  || keysPrev['KeyA'] || touchPrev.left  || padPrev.left;
  const rightPrev  = keysPrev['ArrowRight'] || keysPrev['KeyD'] || touchPrev.right || padPrev.right;
  const leftTap    = leftDown  && !leftPrev;
  const rightTap   = rightDown && !rightPrev;

  const g = state.geometry;
  const N = g.lanes;
  const stepLeft  = () => { state.lane = g.closed ? (state.lane - 1 + N) % N : Math.max(0, state.lane - 1); };
  const stepRight = () => { state.lane = g.closed ? (state.lane + 1) % N     : Math.min(N - 1, state.lane + 1); };

  // 1) Tap-to-step: always moves one lane on the leading edge
  if (leftTap && !rightTap) {
    stepLeft();
    state.holdTimer = 0;
    state.moveCooldown = 0;  // don't block the tap
  } else if (rightTap && !leftTap) {
    stepRight();
    state.holdTimer = 0;
    state.moveCooldown = 0;
  }

  // 2) Hold-to-repeat: after the button has been held for REPEAT_DELAY
  //    frames without releasing, start firing repeats at the level-scaled rate.
  //    Exception: if input is from the tracking slider (touch.sliding), skip the
  //    delay — the slider makes direction intent unambiguous the moment the
  //    finger enters a side zone.
  const holding = (leftDown && !rightDown) || (rightDown && !leftDown);
  if (holding) {
    state.holdTimer++;
    const delay = touch.sliding ? 0 : MOVE_REPEAT_DELAY;
    if (state.holdTimer > delay) {
      if (state.moveCooldown > 0) state.moveCooldown--;
      if (state.moveCooldown === 0) {
        if (leftDown && !rightDown) stepLeft();
        else if (rightDown && !leftDown) stepRight();
        state.moveCooldown = moveCooldownForLevel(state.level);
      }
    }
  } else {
    state.holdTimer = 0;
    state.moveCooldown = 0;
  }

  // Smooth visual position
  let dl = state.lane - state.laneVisual;
  if (g.closed) {
    if (dl >  N / 2) dl -= N;
    if (dl < -N / 2) dl += N;
  }
  state.laneVisual += dl * 0.4;
  if (g.closed) state.laneVisual = ((state.laneVisual % N) + N) % N;
}

function update() {
  if (!state) return;

  // Particles always animate
  for (const p of state.particles) {
    p.x += p.vx; p.y += p.vy; p.vx *= 0.95; p.vy *= 0.95; p.life--;
  }
  state.particles = state.particles.filter(p => p.life > 0);

  // ── WARP IN: new tube zooms in from a point ──────────────────
  if (state.phase === 'warpIn') {
    state.warpT--;
    if (state.warpT <= 0) state.phase = 'play';
    return;
  }

  // ── WARP WARN: brief "CLEAR YOUR LANE" phase before the tube leaves ─
  if (state.phase === 'warpWarn') {
    handleLaneInput();
    if (state.invincible > 0) state.invincible--;
    state.warpT--;
    if (state.warpT <= 0) {
      state.phase = 'warpOut';
      state.warpT = WARP_OUT_LEN;
    }
    return;
  }

  // ── WARP OUT: current tube zooms out past camera. Spikes kill ──
  if (state.phase === 'warpOut') {
    handleLaneInput();
    if (state.invincible > 0) state.invincible--;
    state.warpT--;
    if (state.warpT <= 0) {
      // At the moment of passing through: check for spike on player lane
      const sp = state.spikes.find(s => s.lane === state.lane && s.length > 0.08);
      if (sp && state.invincible === 0) {
        state.lives--;
        const hp = laneXY(state.lane, 1);
        for (let i = 0; i < 30; i++) {
          const a = Math.random() * TWOPI;
          const s = randBetween(2, 6);
          state.particles.push({
            x: hp.x, y: hp.y,
            vx: Math.cos(a) * s, vy: Math.sin(a) * s,
            life: randBetween(30, 60), hue: 'red'
          });
        }
        if (state.lives <= 0) {
          state.phase = 'gameover';
          return;
        }
      }
      applyLevel(state.level + 1);
    }
    return;
  }

  if (state.phase !== 'play') return;

  // ── Normal play ────────────────────────────────────────────────
  handleLaneInput();

  const wantFire = keys['Space'] || keys['KeyZ'] || touch.fire || pad.fire;
  // Zap is edge-triggered to prevent held-button from burning the charge
  const zapPressed = keys['KeyX'] || touch.zap || pad.zap;
  const zapPrev    = keysPrev['KeyX'] || touchPrev.zap;
  const zapTap     = (zapPressed && !zapPrev) || pad.zap;  // pad.zap is already edge-detected

  if (state.invincible > 0) state.invincible--;
  if (state.shootCooldown > 0) state.shootCooldown--;
  if (wantFire && state.shootCooldown === 0) {
    state.bullets.push({ lane: state.lane, depth: 1.0 });
    state.shootCooldown = 8;
  }

  // Superzapper: one-per-level emergency screen clear
  if (zapTap && state.zapAvailable) {
    state.zapAvailable = false;
    state.zapFlashT    = 20;   // 20-frame bright flash
    // Kill every enemy on screen; score half points (emergency = no prowess bonus)
    let zapScore = 0;
    for (const e of state.enemies) {
      const pts = e.type === 'flipper' ? 50 : e.type === 'tanker' ? 75 : 100;
      zapScore += pts;
      const ep = laneXY(e.lane, e.depth);
      for (let i = 0; i < 8; i++) {
        const a = Math.random() * TWOPI;
        const s = randBetween(1, 4);
        state.particles.push({
          x: ep.x, y: ep.y,
          vx: Math.cos(a) * s, vy: Math.sin(a) * s,
          life: randBetween(20, 50), hue: 'yellow'
        });
      }
    }
    state.enemiesKilled += state.enemies.length;
    state.score += zapScore;
    state.enemies = [];
    // Radial zap pulse from hub
    for (let i = 0; i < 80; i++) {
      const a = Math.random() * TWOPI;
      const s = randBetween(4, 10);
      state.particles.push({
        x: CX, y: CY,
        vx: Math.cos(a) * s, vy: Math.sin(a) * s,
        life: randBetween(25, 50), hue: 'yellow'
      });
    }
  }
  if (state.zapFlashT > 0) state.zapFlashT--;

  // Bullets travel inward (depth 1 → 0). Stop at spike tip.
  for (const b of state.bullets) {
    const L = laneLength(b.lane);
    b.depth -= 14 / L;
  }
  state.bullets = state.bullets.filter(b => {
    if (b.depth <= 0) return false;
    const sp = state.spikes.find(s => s.lane === b.lane);
    if (sp && b.depth > 1 - sp.length) return false;   // absorbed, no nibble
    return true;
  });

  // Spawn enemies until quota
  if (state.enemiesSpawned < state.plan.enemyQuota) {
    state.spawnTimer--;
    if (state.spawnTimer <= 0) {
      spawnEnemy();
      state.spawnTimer = randBetween(state.plan.spawnMin, state.plan.spawnMax);
    }
  }

  // Update enemies
  for (const e of state.enemies) {
    const L = laneLength(e.lane);
    e.depth += e.speed / L;
    e.pulse += 0.15;
    if (e.type === 'spiker') {
      let sp = state.spikes.find(s => s.lane === e.lane);
      if (!sp) { sp = { lane: e.lane, length: 0 }; state.spikes.push(sp); }
      sp.length = Math.max(sp.length, Math.min(0.55, e.depth * 0.9));
    }
  }

  // Bullet × Enemy
  const deadBullets = new Set();
  const deadEnemies = new Set();
  const spawnedFromSplits = [];
  for (let bi = 0; bi < state.bullets.length; bi++) {
    const b = state.bullets[bi];
    for (let ei = 0; ei < state.enemies.length; ei++) {
      if (deadEnemies.has(ei)) continue;
      const e = state.enemies[ei];
      if (e.lane !== b.lane) continue;
      if (Math.abs(e.depth - b.depth) < 0.05) {
        deadBullets.add(bi);
        deadEnemies.add(ei);
        const pts = e.type === 'flipper' ? 100 : e.type === 'tanker' ? 150 : 200;
        state.score += pts;
        state.enemiesKilled++;
        const ep = laneXY(e.lane, e.depth);
        const hue = e.type === 'spiker' ? 'yellow' : 'white';
        for (let i = 0; i < 10; i++) {
          const a = Math.random() * TWOPI;
          const s = randBetween(1, 4);
          state.particles.push({
            x: ep.x, y: ep.y,
            vx: Math.cos(a) * s, vy: Math.sin(a) * s,
            life: randBetween(18, 40), hue
          });
        }
        if (e.type === 'tanker') {
          const N = state.geometry.lanes;
          const leftL  = state.geometry.closed ? (e.lane - 1 + N) % N : Math.max(0, e.lane - 1);
          const rightL = state.geometry.closed ? (e.lane + 1) % N     : Math.min(N - 1, e.lane + 1);
          spawnedFromSplits.push({ type: 'flipper', lane: leftL,  depth: e.depth, pulse: 0, speed: state.plan.baseSpeed * 1.1 });
          spawnedFromSplits.push({ type: 'flipper', lane: rightL, depth: e.depth, pulse: 0, speed: state.plan.baseSpeed * 1.1 });
        }
        break;
      }
    }
  }
  state.bullets = state.bullets.filter((_, i) => !deadBullets.has(i));
  state.enemies = state.enemies.filter((_, i) => !deadEnemies.has(i)).concat(spawnedFromSplits);

  // Enemies reaching rim → drop spike, grab player if on lane
  const survivors = [];
  for (const e of state.enemies) {
    if (e.depth >= 1) {
      let sp = state.spikes.find(s => s.lane === e.lane);
      if (!sp) { sp = { lane: e.lane, length: 0 }; state.spikes.push(sp); }
      sp.length = Math.max(sp.length, 0.55);
      if (state.invincible === 0 && e.lane === state.lane) {
        state.lives--;
        state.invincible = 120;
        const hp = laneXY(state.lane, 1);
        for (let i = 0; i < 26; i++) {
          const a = Math.random() * TWOPI;
          const s = randBetween(1.5, 5);
          state.particles.push({
            x: hp.x, y: hp.y, vx: Math.cos(a) * s, vy: Math.sin(a) * s,
            life: randBetween(25, 55), hue: 'red'
          });
        }
        if (state.lives <= 0) state.phase = 'gameover';
      }
      continue;
    }
    survivors.push(e);
  }
  state.enemies = survivors;

  // Level complete
  if (state.enemiesSpawned >= state.plan.enemyQuota && state.enemies.length === 0) {
    nextLevel();
  }
}

function snapshotInput() {
  // Called after every update frame so next frame's edge detection works
  for (const k of ['ArrowLeft','ArrowRight','KeyA','KeyD','Space','KeyZ','KeyX']) {
    keysPrev[k] = !!keys[k];
  }
  touchPrev.left  = touch.left;
  touchPrev.right = touch.right;
  touchPrev.fire  = touch.fire;
  touchPrev.zap   = touch.zap;
  padPrev.left    = pad.left;
  padPrev.right   = pad.right;
}

// ================================================================
// DRAW
// ================================================================

function hexAlpha(hex, a) {
  const n = parseInt(hex.slice(1), 16);
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return `rgba(${r},${g},${b},${a})`;
}

function warpScaleAlpha() {
  // Returns { scale, alpha } for current phase
  if (state.phase === 'warpOut') {
    const t = 1 - state.warpT / WARP_OUT_LEN;  // 0 → 1
    const scale = 1 + t * t * 5;               // 1 → 6 (ease-in)
    const alpha = 1 - t * t * 0.85;            // 1 → ~0.15
    return { scale, alpha };
  }
  if (state.phase === 'warpIn') {
    const t = 1 - state.warpT / WARP_IN_LEN;   // 0 → 1
    const ease = 1 - (1 - t) * (1 - t);        // ease-out
    const scale = 0.15 + ease * 0.85;          // 0.15 → 1
    const alpha = 0.2 + ease * 0.8;            // 0.2 → 1
    return { scale, alpha };
  }
  return { scale: 1, alpha: 1 };
}

function drawWeb() {
  const g = state.geometry;
  const col = state.color;
  ctx.lineWidth = 1;
  ctx.strokeStyle = hexAlpha(col, 0.35);
  for (let i = 0; i < g.lanes; i++) {
    ctx.beginPath();
    ctx.moveTo(g.hub[i].x, g.hub[i].y);
    ctx.lineTo(g.rim[i].x, g.rim[i].y);
    ctx.stroke();
  }
  ctx.strokeStyle = hexAlpha(col, 0.15);
  for (let ring = 1; ring <= 3; ring++) {
    const d = ring / 4;
    ctx.beginPath();
    for (let i = 0; i < g.lanes; i++) {
      const p = laneXY(i, d);
      if (i === 0) ctx.moveTo(p.x, p.y);
      else         ctx.lineTo(p.x, p.y);
    }
    if (g.closed) ctx.closePath();
    ctx.stroke();
  }
  ctx.strokeStyle = hexAlpha(col, 0.65);
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  for (let i = 0; i < g.lanes; i++) {
    const p = g.hub[i];
    if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
  }
  if (g.closed) ctx.closePath();
  ctx.stroke();
  ctx.strokeStyle = hexAlpha(col, 0.55);
  ctx.beginPath();
  for (let i = 0; i < g.lanes; i++) {
    const p = g.rim[i];
    if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
  }
  if (g.closed) ctx.closePath();
  ctx.stroke();
}

function drawSpikes(highlightPlayer) {
  ctx.lineWidth = 2.5;
  for (const sp of state.spikes) {
    if (sp.length <= 0) continue;
    // Highlight the player's lane spike during warp so danger is obvious
    const isPlayerLane = highlightPlayer && sp.lane === state.lane;
    ctx.strokeStyle = isPlayerLane ? '#ff4757' : '#fef08a';
    const rimP = laneXY(sp.lane, 1);
    const tip  = laneXY(sp.lane, 1 - sp.length);
    ctx.beginPath();
    ctx.moveTo(rimP.x, rimP.y);
    ctx.lineTo(tip.x,  tip.y);
    ctx.stroke();
    const n = laneNormal(sp.lane);
    const t = { x: -n.y, y: n.x };
    for (let i = 0; i < 3; i++) {
      const d = 1 - sp.length + (i + 0.5) * sp.length / 3;
      const p = laneXY(sp.lane, d);
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x + t.x * 5 - n.x * 3, p.y + t.y * 5 - n.y * 3);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x - t.x * 5 - n.x * 3, p.y - t.y * 5 - n.y * 3);
      ctx.stroke();
    }
  }
}

function drawEnemies() {
  for (const e of state.enemies) {
    const p = laneXY(e.lane, e.depth);
    const pulse = 1 + Math.sin(e.pulse) * 0.15;
    const sizeBase = 6 + e.depth * 10;
    const s = sizeBase * pulse;
    if (e.type === 'flipper') {
      ctx.strokeStyle = '#ff4757';
      ctx.lineWidth = 1.6;
      ctx.beginPath();
      ctx.moveTo(p.x,     p.y - s);
      ctx.lineTo(p.x + s, p.y    );
      ctx.lineTo(p.x,     p.y + s);
      ctx.lineTo(p.x - s, p.y    );
      ctx.closePath(); ctx.stroke();
      ctx.strokeStyle = 'rgba(255,71,87,0.5)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(p.x - s*0.6, p.y); ctx.lineTo(p.x + s*0.6, p.y);
      ctx.moveTo(p.x, p.y - s*0.6); ctx.lineTo(p.x, p.y + s*0.6);
      ctx.stroke();
    } else if (e.type === 'tanker') {
      const big = s * 1.35;
      ctx.strokeStyle = '#d946ef';
      ctx.lineWidth = 1.8;
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = i / 6 * TWOPI;
        const px = p.x + Math.cos(a) * big;
        const py = p.y + Math.sin(a) * big;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.closePath(); ctx.stroke();
      ctx.strokeStyle = 'rgba(217,70,239,0.55)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(p.x, p.y, big * 0.45, 0, TWOPI);
      ctx.stroke();
    } else {
      ctx.strokeStyle = '#fbbf24';
      ctx.lineWidth = 1.8;
      const n = laneNormal(e.lane);
      const t = { x: -n.y, y: n.x };
      ctx.beginPath();
      ctx.moveTo(p.x + n.x * s,          p.y + n.y * s);
      ctx.lineTo(p.x - n.x*s + t.x*s,    p.y - n.y*s + t.y*s);
      ctx.lineTo(p.x - n.x*s - t.x*s,    p.y - n.y*s - t.y*s);
      ctx.closePath(); ctx.stroke();
    }
  }
}

function drawBullets() {
  ctx.fillStyle = '#e6edf3';
  ctx.strokeStyle = 'rgba(230,237,243,0.7)';
  ctx.lineWidth = 1.5;
  for (const b of state.bullets) {
    const head = laneXY(b.lane, b.depth);
    const tail = laneXY(b.lane, Math.min(1, b.depth + 0.04));
    ctx.beginPath();
    ctx.moveTo(tail.x, tail.y);
    ctx.lineTo(head.x, head.y);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(head.x, head.y, 2.5, 0, TWOPI);
    ctx.fill();
  }
}

function drawPlayer(useSnapLane) {
  if (state.invincible > 0 && Math.floor(state.invincible / 6) % 2 === 0) return;
  let pos, lane;
  if (useSnapLane) {
    pos  = state.geometry.rim[state.lane];
    lane = state.lane;
  } else {
    pos  = visualPos();
    lane = Math.round(state.laneVisual) % state.geometry.lanes;
  }
  const n = laneNormal(lane);
  const t = laneTangent(lane);
  const size = 16;
  const px = pos.x, py = pos.y;
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.8;
  ctx.beginPath();
  ctx.moveTo(px + t.x * size,        py + t.y * size);
  ctx.lineTo(px + t.x * size * 0.55 - n.x * size * 0.45,
             py + t.y * size * 0.55 - n.y * size * 0.45);
  ctx.lineTo(px - n.x * size * 0.95, py - n.y * size * 0.95);
  ctx.lineTo(px - t.x * size * 0.55 - n.x * size * 0.45,
             py - t.y * size * 0.55 - n.y * size * 0.45);
  ctx.lineTo(px - t.x * size,        py - t.y * size);
  ctx.stroke();
  ctx.strokeStyle = 'rgba(255,255,255,0.45)';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(px + t.x * size, py + t.y * size);
  ctx.lineTo(px - t.x * size, py - t.y * size);
  ctx.stroke();
  ctx.fillStyle = state.color;
  ctx.beginPath();
  ctx.arc(px - n.x * size * 0.95, py - n.y * size * 0.95, 2.8, 0, TWOPI);
  ctx.fill();
}

function drawParticles() {
  for (const p of state.particles) {
    const alpha = Math.min(p.life / 40, 1);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.hue === 'red'    ? '#ff4757'
                  : p.hue === 'accent' ? state.color
                  : p.hue === 'yellow' ? '#fbbf24'
                                       : '#fff';
    ctx.fillRect(p.x - 1.5, p.y - 1.5, 3, 3);
  }
  ctx.globalAlpha = 1;
}

function drawHUD() {
  ctx.font      = "15px 'Courier New', monospace";
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'left';
  ctx.fillText(`SCORE  ${state.score}`, 14, 24);
  ctx.textAlign = 'right';
  ctx.fillText(`LEVEL  ${state.level}`, GW - 14, 24);
  ctx.textAlign = 'center';
  ctx.globalAlpha = 0.7;
  ctx.fillStyle = state.color;
  ctx.font = "11px 'Courier New', monospace";
  ctx.fillText(SHAPE_LABEL[state.shape], GW / 2, 22);
  ctx.globalAlpha = 1;
  for (let i = 0; i < state.lives; i++) {
    ctx.strokeStyle = state.color;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(22 + i * 22, GH - 20, 6, 0, TWOPI);
    ctx.stroke();
  }

  // Zap charge indicator (bottom-right)
  ctx.textAlign = 'right';
  ctx.font = "11px 'Courier New', monospace";
  if (state.zapAvailable) {
    ctx.fillStyle = '#fbbf24';
    ctx.globalAlpha = 1;
  } else {
    ctx.fillStyle = '#fbbf24';
    ctx.globalAlpha = 0.25;
  }
  ctx.fillText('⚡ ZAP', GW - 14, GH - 16);
  ctx.globalAlpha = 1;
}

function drawLevelFlash() {
  // Big level number during warpIn (peaks mid-warp, fades at end)
  const t = 1 - state.warpT / WARP_IN_LEN; // 0 → 1
  const alpha =
    t < 0.15 ? t / 0.15                    // fade in
    : t < 0.75 ? 1                          // hold
    : (1 - t) / 0.25;                       // fade out
  ctx.globalAlpha = Math.max(0, Math.min(1, alpha));
  ctx.textAlign = 'center';
  ctx.fillStyle = state.color;
  ctx.font = "44px 'Courier New', monospace";
  ctx.fillText(`LEVEL ${state.level}`, GW / 2, CY - 10);
  ctx.font = "16px 'Courier New', monospace";
  ctx.fillText(SHAPE_LABEL[state.shape], GW / 2, CY + 22);
  ctx.globalAlpha = 1;
}

function drawCentered(text, y, size, alpha) {
  ctx.globalAlpha = alpha ?? 1;
  ctx.font      = `${size}px 'Courier New', monospace`;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.fillText(text, GW / 2, y);
  ctx.globalAlpha = 1;
}

function draw() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, GW, GH);

  if (!state) {
    drawCentered('WEB  REACTOR',                   CY - 60, 36);
    drawCentered('PRESS  ENTER  TO  START',        CY - 20, 15);
    if (!touchMode)
      drawCentered('A / D  MOVE  ·  SPACE  FIRE  ·  X  ZAP',  CY + 10, 12, 0.5);
    else
      drawCentered('TAP  ANY  BUTTON  TO  START',  CY + 10, 12, 0.5);
    return;
  }

  const { scale, alpha } = warpScaleAlpha();
  const duringWarp = state.phase === 'warpOut' || state.phase === 'warpIn';
  const duringWarn = state.phase === 'warpWarn';

  ctx.save();
  if (scale !== 1) {
    ctx.translate(CX, CY);
    ctx.scale(scale, scale);
    ctx.translate(-CX, -CY);
  }
  ctx.globalAlpha = alpha;

  drawWeb();
  // Highlight player-lane spike during both the warn phase AND the warp-out
  drawSpikes(state.phase === 'warpOut' || duringWarn);
  drawParticles();
  drawEnemies();
  drawBullets();
  if (state.phase === 'play' || state.phase === 'warpOut' || duringWarn) {
    drawPlayer(state.phase === 'warpOut' || duringWarn);
  }

  ctx.globalAlpha = 1;
  ctx.restore();

  drawHUD();

  // ── Superzapper flash overlay ──────────────────────────────────
  if (state.zapFlashT > 0) {
    const a = state.zapFlashT / 20;
    ctx.fillStyle = `rgba(251, 191, 36, ${0.55 * a})`;
    ctx.fillRect(0, 0, GW, GH);
  }

  if (state.phase === 'warpIn') drawLevelFlash();

  // ── WARP WARN overlay: LEVEL CLEAR + spike danger warning ───
  if (duringWarn) {
    // Big level-clear banner
    const t = 1 - state.warpT / WARP_WARN_LEN;  // 0 → 1
    const bannerAlpha = t < 0.2 ? t / 0.2 : 1;
    ctx.globalAlpha = bannerAlpha;
    ctx.textAlign = 'center';
    ctx.fillStyle = state.color;
    ctx.font = "28px 'Courier New', monospace";
    ctx.fillText('LEVEL CLEAR', GW / 2, 70);
    ctx.fillStyle = '#fff';
    ctx.font = "13px 'Courier New', monospace";
    ctx.globalAlpha = bannerAlpha * 0.85;
    ctx.fillText('WARP INCOMING — DODGE THE SPIKES', GW / 2, 94);
    ctx.globalAlpha = 1;

    // Pulsing DANGER if player is on a spiked lane
    const onSpike = state.spikes.some(s => s.lane === state.lane && s.length > 0.08);
    if (onSpike) {
      const pulse = 0.5 + 0.5 * Math.sin(state.warpT * 0.45);
      ctx.globalAlpha = pulse;
      ctx.fillStyle = '#ff4757';
      ctx.font = "22px 'Courier New', monospace";
      ctx.fillText('▲ MOVE OFF SPIKE ▲', GW / 2, GH - 70);
      ctx.globalAlpha = 1;
    }
  }

  // Warp-out DANGER indicator if player is on a spiked lane
  if (state.phase === 'warpOut') {
    const onSpike = state.spikes.some(s => s.lane === state.lane && s.length > 0.08);
    if (onSpike) {
      const pulse = 0.5 + 0.5 * Math.sin(state.warpT * 0.4);
      ctx.globalAlpha = pulse;
      ctx.textAlign = 'center';
      ctx.fillStyle = '#ff4757';
      ctx.font = "18px 'Courier New', monospace";
      ctx.fillText('▲ MOVE OFF SPIKE ▲', GW / 2, GH - 60);
      ctx.globalAlpha = 1;
    }
  }

  if (state.phase === 'gameover') {
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(0, 0, GW, GH);
    drawCentered('GAME  OVER',              CY - 30, 32);
    drawCentered(`SCORE:  ${state.score}`,  CY + 10, 18);
    if (!touchMode)
      drawCentered('PRESS  ENTER  TO  RESTART',  CY + 46, 14);
    else
      drawCentered('TAP  ANY  BUTTON  TO  RESTART', CY + 46, 14);
  }
}

// ================================================================
// LOOP
// ================================================================

function loop() {
  pollGamepad();
  update();
  // Reflect superzapper availability on the on-screen button
  const zapBtn = document.getElementById('btn-zap');
  if (zapBtn) {
    const avail = !!(state && state.zapAvailable && state.phase === 'play');
    if (avail) zapBtn.removeAttribute('disabled');
    else       zapBtn.setAttribute('disabled', 'true');
  }
  if (state) snapshotInput();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>

<!-- Arcade Reactor score bridge -->
<script>
(function () {
  const scoreEl = document.getElementById('ar-score-value');
  if (!scoreEl) return;
  let lastShown = -1;
  function tick() {
    const s = (window.state && typeof window.state.score === 'number')
      ? window.state.score : 0;
    if (s !== lastShown) {
      scoreEl.textContent = s.toLocaleString('en-US');
      lastShown = s;
    }
  }
  setInterval(tick, 150);
  tick();
})();
</script>
