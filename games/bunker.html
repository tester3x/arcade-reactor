<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bunker · Arcade Reactor</title>

<!-- Favicons -->
<link rel="icon" type="image/png" sizes="32x32"  href="../assets/favicon-32.png">
<link rel="icon" type="image/png" sizes="256x256" href="../assets/favicon.png">
<link rel="apple-touch-icon" href="../assets/favicon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #000;
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    color: #fff;
    -webkit-user-select: none; user-select: none;
    touch-action: none;
  }

  #wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    height: calc(100% - 48px);
    margin-top: 48px;
    background: #000;
  }

  canvas { display: block; flex-shrink: 0; }

  #controls {
    display: none;
    flex-shrink: 0;
    width: 100%;
    background: #000;
    position: relative;
  }

  .ctrl-row {
    display: flex; align-items: center; justify-content: space-between;
    height: 100%; padding: 6px 8px; gap: 6px;
  }

  .ctrl-stick-zone {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    -webkit-tap-highlight-color: transparent;
  }

  .ctrl-right-group {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding-right: 8px;
  }

  .btn {
    border: 1px solid rgba(255,255,255,0.35);
    border-radius: 8px;
    background: rgba(255,255,255,0.06);
    color: #fff;
    font-family: 'Courier New', monospace;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 2px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.05s, border-color 0.05s;
    width: 80px; height: 60px;
  }
  .btn.active {
    background: rgba(255,255,255,0.18);
    border-color: rgba(255,255,255,0.7);
  }
  .btn-icon  { font-size: 22px; line-height: 1; }
  .btn-label { font-size: 9px; opacity: 0.55; letter-spacing: 0.08em; }

  #btn-fire        { border-color: rgba(34,211,238,0.5); }
  #btn-fire.active { background: rgba(34,211,238,0.22); border-color: rgba(34,211,238,0.9); }
  #btn-nade        { border-color: rgba(163,230,53,0.5); }
  #btn-nade.active { background: rgba(163,230,53,0.25); border-color: rgba(163,230,53,0.95); }
  /* Disabled when out of grenades — tappable but visually muted */
  #btn-nade.empty  { opacity: 0.35; }

  /* ── Virtual thumbstick (full 360° for this game) ────────────── */
  .stick-base {
    width: 112px; height: 112px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.04);
    position: relative;
    box-shadow: inset 0 0 20px rgba(255,255,255,0.04);
  }
  /* Crosshair guides inside the stick base */
  .stick-base::before,
  .stick-base::after {
    content: '';
    position: absolute;
    background: rgba(255,255,255,0.12);
  }
  .stick-base::before {
    top: 50%; left: 12%; right: 12%; height: 1px;
    transform: translateY(-0.5px);
  }
  .stick-base::after {
    left: 50%; top: 12%; bottom: 12%; width: 1px;
    transform: translateX(-0.5px);
  }
  .stick-knob {
    position: absolute;
    width: 50px; height: 50px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.55);
    background: rgba(255,255,255,0.12);
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    transition: background 0.06s, border-color 0.06s, box-shadow 0.06s;
    pointer-events: none;
  }
  .stick-base.active .stick-knob {
    background: rgba(34,211,238,0.22);
    border-color: rgba(34,211,238,0.9);
    box-shadow: 0 0 14px rgba(34,211,238,0.4);
  }

  /* Hide on-screen controls when a gamepad is connected */
  body.gamepad-active #controls { display: none !important; }

  /* ── Arcade Reactor shell — top bar ─────────────────────────── */
  .ar-topbar {
    position: fixed; top: 0; left: 0; right: 0; height: 48px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 14px;
    background: rgba(10, 14, 20, 0.92);
    backdrop-filter: saturate(140%) blur(10px);
    -webkit-backdrop-filter: saturate(140%) blur(10px);
    border-bottom: 1px solid #1f2937;
    z-index: 9999;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    color: #e6edf3;
  }
  .ar-back {
    display: inline-flex; align-items: center; gap: 6px;
    color: #8b98a8; text-decoration: none;
    font-size: 13px; font-weight: 500;
    padding: 6px 10px; border-radius: 6px;
    border: 1px solid #1f2937;
    transition: color 0.15s, border-color 0.15s;
  }
  .ar-back:hover { color: #22d3ee; border-color: #22d3ee; }
  .ar-back svg   { width: 14px; height: 14px; }
  .ar-title {
    font-size: 13px; font-weight: 700;
    letter-spacing: 0.22em; text-transform: uppercase;
  }
  .ar-score {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 12px; color: #8b98a8;
    letter-spacing: 0.12em; min-width: 90px; text-align: right;
  }
  .ar-score-value { color: #22d3ee; font-weight: 700; }
  .ar-gamepad {
    display: none;
    margin-left: 8px;
    font-size: 14px;
    color: #22d3ee;
    filter: drop-shadow(0 0 4px rgba(34,211,238,0.5));
  }
  body.gamepad-active .ar-gamepad { display: inline; }
  @media (max-width: 480px) {
    .ar-title { font-size: 11px; letter-spacing: 0.15em; }
    .ar-back span { display: none; }
    .ar-back { padding: 6px 8px; }
  }
</style>
</head>
<body>

<div class="ar-topbar">
  <a href="../index.html" class="ar-back" aria-label="Back to Arcade Reactor">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    <span>Arcade Reactor</span>
  </a>
  <div class="ar-title">Bunker</div>
  <div class="ar-score">
    PHASE <span class="ar-score-value" id="ar-score-value">--</span><span class="ar-gamepad" title="Gamepad connected">🎮</span>
  </div>
</div>

<div id="wrap">
  <canvas id="c"></canvas>
  <div id="controls">
    <div class="ctrl-row">
      <div class="ctrl-stick-zone" id="move-zone">
        <div class="stick-base" id="move-base">
          <div class="stick-knob" id="move-knob"></div>
        </div>
      </div>
      <div class="ctrl-stick-zone" id="aim-zone">
        <div class="stick-base" id="aim-base">
          <div class="stick-knob" id="aim-knob"></div>
        </div>
      </div>
      <div class="ctrl-right-group">
        <div class="btn" id="btn-fire">
          <span class="btn-icon">◉</span>
          <span class="btn-label">FIRE</span>
        </div>
        <div class="btn" id="btn-nade">
          <span class="btn-icon">✦</span>
          <span class="btn-label">NADE</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
/* ================================================================
   BUNKER — Phase 1
   ----------------------------------------------------------------
   Deliverable: playable character with 360° movement, screen
   boundaries, keyboard + thumbstick + gamepad input.
   NOT YET: walls, guards, shooting, stealth, keys, doors.
   ================================================================ */

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const ctrlBar = document.getElementById('controls');

const AR_TOPBAR_H = 48;
const GW = 900, GH = 650;        // logical play field (matches other games)

// Single source of truth for the build label. Shown in the topbar
// (synced into the HTML on load) and in the in-game HUD. Versioning
// scheme:
//   N.0  — new phase lands (e.g. 12.0 when Phase 12 ships)
//   N.x  — refinements / tuning / bug fixes within a phase
// Bumping this on every deploy gives a visual "new build is live"
// check regardless of cache — if the old label shows, refresh again.
const BUILD_LABEL = '12.1';
document.getElementById('ar-score-value').textContent = BUILD_LABEL;

// ── Responsive canvas ────────────────────────────────────────────
const CTRL_BAR_H = 140;          // taller than other games — we have a big stick
let canvasW = GW, canvasH = GH, touchMode = false;

function resize() {
  const availW = window.innerWidth;
  const availH = window.innerHeight - AR_TOPBAR_H;
  const barH   = touchMode ? CTRL_BAR_H : 0;
  const playH  = availH - barH;
  const scale  = Math.min(availW / GW, playH / GH);
  canvasW = Math.round(GW * scale);
  canvasH = Math.round(GH * scale);
  canvas.width  = GW;  canvas.height = GH;
  canvas.style.width  = canvasW + 'px';
  canvas.style.height = canvasH + 'px';
  if (touchMode) {
    ctrlBar.style.display = 'block';
    ctrlBar.style.height  = CTRL_BAR_H + 'px';
    ctrlBar.style.width   = availW + 'px';
  } else {
    ctrlBar.style.display = 'none';
  }
}
window.addEventListener('resize', resize);
resize();

// Input mode is "most recent input wins". A user can pair a gamepad,
// set it down, and tap the screen to bring the touch UI back; later
// pressing any controller input swaps back to gamepad mode and grows
// the canvas. Both 'touchMode' and the gamepad-active CSS class
// reflect this single state — touchMode = true overrides everything.
function setTouchMode(on) {
  if (touchMode === on) return;
  touchMode = on;
  if (on) {
    document.body.classList.remove('gamepad-active');
  } else if (pad.connected) {
    document.body.classList.add('gamepad-active');
  }
  resize();
}
function activateTouch() { setTouchMode(true); }

// ── Input state ──────────────────────────────────────────────────
const keys = {};
const keysPrev = {};
// touch{} holds the move thumbstick's raw x/y in [-1,+1] (continuous, not flags)
// plus on-screen button state. touchAim{} mirrors the right (aim) thumbstick.
const touch    = { x: 0, y: 0, active: false, fire: false, nade: false };
const touchAim = { x: 0, y: 0, active: false };
const pad   = { x: 0, y: 0, aimX: 0, aimY: 0, aimActive: false, connected: false, fire: false, firePrev: false };

document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','KeyW','KeyA','KeyS','KeyD','Enter','Escape','KeyP','KeyG'].includes(e.code)) {
    e.preventDefault();
  }
  if (e.code === 'Enter' && state && (state.gameover || state.won || state.timesUp)) restartGame();
  // Pause toggle (Esc or P). e.repeat filters OS key auto-repeat so
  // holding the key doesn't flicker pause on/off.
  if ((e.code === 'Escape' || e.code === 'KeyP') && !e.repeat && state && canTogglePause()) {
    state.paused = !state.paused;
  }
  // Grenade-mode toggle (G) — keyboard equivalent of B. Same gating
  // as the gamepad version: must have a grenade, can't toggle while
  // paused, and can't switch out mid-cook (pin's already out).
  if (e.code === 'KeyG' && !e.repeat && state && state.player.grenades > 0 && !state.paused && !state.player.cooking && canTogglePause()) {
    state.player.weaponMode = state.player.weaponMode === 'grenade' ? 'gun' : 'grenade';
  }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// ── Virtual thumbstick (360° analog) ─────────────────────────────
// Finger-anchor: base jumps to touchdown point. Stick outputs
// normalized x/y in [-1,+1] based on distance from origin, clamped
// to MAX_RADIUS, with a small dead zone around origin. The target
// arg lets multiple sticks share the same wiring (move + aim).
function wireStick(zoneId, baseId, knobId, target) {
  const zone = document.getElementById(zoneId);
  const base = document.getElementById(baseId);
  const knob = document.getElementById(knobId);
  if (!zone || !base || !knob) return;

  const DEAD_ZONE  = 8;
  const MAX_RADIUS = 42;

  let trackingId = null;
  let originCX = 0, originCY = 0;

  function setStick(dx, dy) {
    const mag = Math.hypot(dx, dy);
    if (mag < DEAD_ZONE) {
      target.x = 0; target.y = 0; target.active = false;
      base.classList.remove('active');
      return;
    }
    base.classList.add('active');
    target.active = true;
    // Remap (dx, dy) beyond DEAD_ZONE to normalized [-1, +1], clamped at MAX_RADIUS
    const usable = Math.max(0, Math.min(mag - DEAD_ZONE, MAX_RADIUS - DEAD_ZONE));
    const norm   = usable / (MAX_RADIUS - DEAD_ZONE);   // 0..1
    target.x = (dx / mag) * norm;
    target.y = (dy / mag) * norm;
  }

  function moveKnob(dx, dy) {
    const mag = Math.hypot(dx, dy);
    let vx = dx, vy = dy;
    if (mag > MAX_RADIUS) {
      const s = MAX_RADIUS / mag;
      vx = dx * s; vy = dy * s;
    }
    knob.style.transform = `translate(calc(-50% + ${vx}px), calc(-50% + ${vy}px))`;
  }

  function resetStick() {
    knob.style.transform = 'translate(-50%, -50%)';
    target.x = 0; target.y = 0; target.active = false;
    base.classList.remove('active');
  }

  function xyFromEvent(e) {
    if (e.touches && e.touches.length) {
      if (trackingId !== null) {
        for (const t of e.touches) if (t.identifier === trackingId) return { x: t.clientX, y: t.clientY };
      }
      return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }
    return { x: e.clientX, y: e.clientY };
  }

  function onDown(e) {
    e.preventDefault();
    activateTouch();
    let cx, cy;
    if (e.touches) {
      const t = e.changedTouches ? e.changedTouches[0] : e.touches[0];
      trackingId = t.identifier;
      cx = t.clientX; cy = t.clientY;
    } else {
      trackingId = 'mouse';
      cx = e.clientX; cy = e.clientY;
    }
    const rect = zone.getBoundingClientRect();
    base.style.position = 'absolute';
    base.style.left = (cx - rect.left) + 'px';
    base.style.top  = (cy - rect.top)  + 'px';
    base.style.transform = 'translate(-50%, -50%)';
    originCX = cx;
    originCY = cy;
    resetStick();
  }

  function onMove(e) {
    if (trackingId === null) return;
    e.preventDefault();
    const { x, y } = xyFromEvent(e);
    const dx = x - originCX;
    const dy = y - originCY;
    moveKnob(dx, dy);
    setStick(dx, dy);
  }

  function onUp(e) {
    if (trackingId === null) return;
    if (e.changedTouches) {
      let matched = false;
      for (const t of e.changedTouches) if (t.identifier === trackingId) matched = true;
      if (!matched) return;
    }
    e.preventDefault();
    trackingId = null;
    base.style.position = '';
    base.style.left = '';
    base.style.top  = '';
    base.style.transform = '';
    resetStick();
  }

  zone.addEventListener('touchstart',  onDown, { passive: false });
  zone.addEventListener('touchmove',   onMove, { passive: false });
  zone.addEventListener('touchend',    onUp,   { passive: false });
  zone.addEventListener('touchcancel', onUp,   { passive: false });
  zone.addEventListener('mousedown',   onDown);
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup',   onUp);
}
wireStick('move-zone', 'move-base', 'move-knob', touch);
wireStick('aim-zone',  'aim-base',  'aim-knob',  touchAim);

function wireBtn(id, prop) {
  const el = document.getElementById(id);
  if (!el) return;
  function press(e)   { e.preventDefault(); activateTouch(); touch[prop] = true; el.classList.add('active'); }
  function release(e) { e.preventDefault(); touch[prop] = false; el.classList.remove('active'); }
  el.addEventListener('touchstart',  press,   { passive: false });
  el.addEventListener('touchend',    release, { passive: false });
  el.addEventListener('touchcancel', release, { passive: false });
  el.addEventListener('mousedown',   press);
  el.addEventListener('mouseup',     release);
  el.addEventListener('mouseleave',  release);
}
wireBtn('btn-fire', 'fire');
wireBtn('btn-nade', 'nade');
document.addEventListener('touchstart', activateTouch, { once: true, passive: true });
document.addEventListener('touchstart', e => {
  if (state && (
        (state.gameover && state.gameoverT > 30) ||
        (state.won      && state.wonT      > 30) ||
        (state.timesUp  && state.timesUpT  > 30)
      )) {
    restartGame();
  }
}, { passive: true });

// ── Gamepad API ──────────────────────────────────────────────────
const PAD_AXIS_DEAD = 0.25;
let padIndex = -1;
let padLastButtons = {};

function scanForGamepad() {
  const list = navigator.getGamepads ? navigator.getGamepads() : [];
  for (let i = 0; i < list.length; i++) if (list[i]) return i;
  return -1;
}

function pollGamepad() {
  if (!navigator.getGamepads) return;
  if (padIndex < 0) {
    padIndex = scanForGamepad();
    if (padIndex < 0) {
      if (pad.connected) {
        pad.connected = false;
        document.body.classList.remove('gamepad-active');
        pad.x = 0; pad.y = 0;
      }
      return;
    }
  }
  const gp = navigator.getGamepads()[padIndex];
  if (!gp) { padIndex = -1; return; }

  if (!pad.connected) {
    pad.connected = true;
    // Don't auto-flip into gamepad mode just because something paired
    // (a tablet may auto-pair without the user picking it up). Wait
    // until there's actual input below — see the touchMode flip after
    // the stick + button reads.
    if (!touchMode) document.body.classList.add('gamepad-active');
    console.log('[gamepad] connected:', gp.id, '·', gp.buttons.length, 'buttons,', gp.axes.length, 'axes, mapping:', gp.mapping);
  }

  // Left stick with dead-zone remap to 0..1 magnitude (movement)
  const ax = gp.axes[0] || 0;
  const ay = gp.axes[1] || 0;
  const mag = Math.hypot(ax, ay);
  if (mag < PAD_AXIS_DEAD) {
    pad.x = 0; pad.y = 0;
  } else {
    const usable = Math.min(mag, 1.0);
    const norm = (usable - PAD_AXIS_DEAD) / (1 - PAD_AXIS_DEAD);
    pad.x = (ax / mag) * norm;
    pad.y = (ay / mag) * norm;
  }

  // Right stick = aim (twin-stick style). When active, overrides
  // the "face = move direction" rule so you can walk one way and
  // shoot another. Same deadzone scheme as the left stick.
  const rx = gp.axes[2] || 0;
  const ry = gp.axes[3] || 0;
  const rmag = Math.hypot(rx, ry);
  if (rmag < PAD_AXIS_DEAD) {
    pad.aimX = 0; pad.aimY = 0; pad.aimActive = false;
  } else {
    const usable = Math.min(rmag, 1.0);
    const norm = (usable - PAD_AXIS_DEAD) / (1 - PAD_AXIS_DEAD);
    pad.aimX = (rx / rmag) * norm;
    pad.aimY = (ry / rmag) * norm;
    pad.aimActive = true;
  }

  // D-pad overrides stick if pressed (digital controllers still work)
  const dpadL = gp.buttons[14] && gp.buttons[14].pressed;
  const dpadR = gp.buttons[15] && gp.buttons[15].pressed;
  const dpadU = gp.buttons[12] && gp.buttons[12].pressed;
  const dpadD = gp.buttons[13] && gp.buttons[13].pressed;
  if (dpadL || dpadR || dpadU || dpadD) {
    let dx = (dpadR ? 1 : 0) - (dpadL ? 1 : 0);
    let dy = (dpadD ? 1 : 0) - (dpadU ? 1 : 0);
    const m = Math.hypot(dx, dy) || 1;
    pad.x = dx / m;
    pad.y = dy / m;
  }

  // Fire buttons: A (0) or RT (7). RT is the natural shooter mapping;
  // A kept for backwards-compat and for controllers missing triggers.
  pad.firePrev = pad.fire;
  pad.fire = !!(
    (gp.buttons[0] && gp.buttons[0].pressed) ||
    (gp.buttons[7] && gp.buttons[7].pressed)
  );
  // B (button 1) — edge-triggered weapon-mode toggle. Only flips if
  // you have grenades and aren't already cooking one (pin's out,
  // can't put it back). No toggling while paused either.
  const bPressed = gp.buttons[1] && gp.buttons[1].pressed;
  if (bPressed && !padLastButtons[1] && state.player.grenades > 0 && !state.paused && !state.player.cooking) {
    state.player.weaponMode = state.player.weaponMode === 'grenade' ? 'gun' : 'grenade';
  }
  // Start (9) — edge-triggered. On terminal states (gameover / won /
  // time's up) it restarts. Otherwise it toggles pause. Restart is
  // checked first so Start always gets you out of a dead/won screen.
  const startPressed = gp.buttons[9] && gp.buttons[9].pressed;
  if (startPressed && !padLastButtons[9]) {
    if (state.gameover || state.won || state.timesUp) {
      restartGame();
    } else if (canTogglePause()) {
      state.paused = !state.paused;
    }
  }

  // Most-recent-input-wins. If the gamepad is doing anything real
  // (stick past the deadzone or any button pressed) and we're
  // currently showing the touch UI, swap to gamepad mode. The reverse
  // direction (touch → gamepad-off) is handled by activateTouch().
  if (touchMode) {
    let padActive = pad.x !== 0 || pad.y !== 0 ||
                    pad.aimX !== 0 || pad.aimY !== 0 ||
                    pad.fire;
    if (!padActive) {
      for (let i = 0; i < gp.buttons.length; i++) {
        if (gp.buttons[i] && gp.buttons[i].pressed) { padActive = true; break; }
      }
    }
    if (padActive) setTouchMode(false);
  }

  // Snapshot button state for next frame's edge detection (Phase 4+ will use this)
  for (let i = 0; i < gp.buttons.length; i++) {
    padLastButtons[i] = gp.buttons[i] && gp.buttons[i].pressed;
  }
}

window.addEventListener('gamepadconnected',   e => { padIndex = e.gamepad.index; });
window.addEventListener('gamepaddisconnected', e => { if (e.gamepad.index === padIndex) padIndex = -1; });

// ================================================================
// GAME STATE
// ================================================================

const PLAYER_SPEED = 3.2;   // pixels per frame at full input
const PLAYER_R     = 12;    // collision radius

// ── Shooting / damage — Phase 4 ──────────────────────────────────
const PLAYER_HP_MAX      = 5;      // baseline hit buffer so combat has a "hurt but alive" middle zone
const PLAYER_IFRAMES     = 60;     // frames of invulnerability after taking a hit
const KNOCKBACK_DISTANCE = 150;    // ~3 tiles; how far a guard hit pushes you back (replaces teleport-on-hit)
const BULLET_SPEED    = 7.5;
const BULLET_R        = 3;

// ================================================================
// ADAPTIVE DIRECTOR — Phase 12
// ----------------------------------------------------------------
// Reads recent player performance and tunes guard spawn count,
// vision cone width, patrol speed, investigate cooldown, and
// minimap detail. Score is a rolling [0,1] across the last few
// completed levels: 0 = struggling, 0.5 = neutral, 1 = crushing.
//
// Persistence: localStorage carries the post-completion score
// history across sessions so the director has data on day 2. The
// transient run stats (this-level deaths/spotted/start-time) live
// in memory only and reset every level start.
//
// First playthrough: with no history, score defaults to 0.5
// (neutral knobs) on the first level. Real adaptation kicks in
// from level 2 onward.
//
// Knob ranges chosen to be felt but not punishing — a struggling
// player gets ~25% fewer guards, slightly narrower cones, slower
// patrols, longer investigate gaps, and a guard-revealing minimap.
// A dominant player gets all guards plus ~15% buffs and a
// layout-only minimap.
// ================================================================
const SKILL_KEY        = 'bunker.skill.v1';
const SKILL_HISTORY_N  = 3;     // rolling-average window
const TARGET_TIME_FRAMES = 90 * 60;  // 90s baseline target per level

function defaultSkillState() {
  return {
    levelsCompleted: 0,
    deaths:          0,
    recentScores:    []   // last SKILL_HISTORY_N completion scores
  };
}
function loadSkill() {
  try {
    const raw = localStorage.getItem(SKILL_KEY);
    if (!raw) return defaultSkillState();
    const obj = JSON.parse(raw);
    return Object.assign(defaultSkillState(), obj);
  } catch (e) { return defaultSkillState(); }
}
function saveSkill() {
  try { localStorage.setItem(SKILL_KEY, JSON.stringify(skill)); } catch (e) {}
}
const skill = loadSkill();

// Transient per-run accumulators. Reset every level start. Death
// doesn't enter scoring directly because death = full restart back
// to L1 — the only run that ever gets scored is one the player
// survived. We track hit-count (HP damage taken) instead, which is
// a meaningful "did you play clean" signal on a winning run.
const runStats = {
  framesElapsed:   0,
  hits:            0,   // times player lost HP during this run
  spotted:         0,   // distinct guard "spotted you" events this run
  spottedCooldown: 0    // frames until another spotted-event counts
};

function resetRunStats() {
  runStats.framesElapsed   = 0;
  runStats.hits            = 0;
  runStats.spotted         = 0;
  runStats.spottedCooldown = 0;
}

function recordSpotted() {
  if (runStats.spottedCooldown > 0) return;
  runStats.spotted++;
  runStats.spottedCooldown = 60;  // 1s grace before another spotted counts
}
function recordHit() {
  runStats.hits++;
}
function recordDeath() {
  // Lifetime counter only. Doesn't enter the per-level score because
  // a dying run never reaches recordLevelComplete().
  skill.deaths++;
  saveSkill();
}
function recordLevelComplete() {
  // Per-level performance score in [0, 1]. Three components:
  //   timeScore    — completed under target = 1, 2x target = 0
  //   hitScore     — took 0 hits = 1, 4+ hits = 0
  //   spottedScore — never spotted = 1, 5+ = 0
  // Weighted: 0.5 time + 0.3 hits + 0.2 spotted.
  const t = runStats.framesElapsed;
  const timeScore    = clamp01(1 - (t - TARGET_TIME_FRAMES) / TARGET_TIME_FRAMES);
  const hitScore     = clamp01(1 - runStats.hits    / 4);
  const spottedScore = clamp01(1 - runStats.spotted / 5);
  const score = 0.5 * timeScore + 0.3 * hitScore + 0.2 * spottedScore;
  skill.recentScores.push(score);
  while (skill.recentScores.length > SKILL_HISTORY_N) skill.recentScores.shift();
  skill.levelsCompleted++;
  saveSkill();
}
function clamp01(v) { return v < 0 ? 0 : v > 1 ? 1 : v; }
function lerp(a, b, t) { return a + (b - a) * t; }

function currentSkillScore() {
  if (skill.recentScores.length === 0) return 0.5;  // neutral first run
  let sum = 0;
  for (const s of skill.recentScores) sum += s;
  return sum / skill.recentScores.length;
}

// Compute the director multipliers for the upcoming level. Called
// once at buildStateFor() and stashed in module scope so per-frame
// reads don't recompute. Linear maps keep tuning easy to read.
function computeDirector() {
  const score = currentSkillScore();
  return {
    score,
    guardFraction:   lerp(0.75, 1.0,  score),  // drop up to 25% of guards at low skill
    visionMult:      lerp(0.85, 1.15, score),
    speedMult:       lerp(0.9,  1.15, score),
    investigateMult: lerp(1.3,  0.7,  score),  // inverted: faster reaction at high skill
    minimapTier:     score >= 0.75 ? 0 : score >= 0.4 ? 1 : 2
  };
}
let directorState = computeDirector();

// Phase 11: all levels, played in order.
const LEVELS = [LEVEL_1, LEVEL_2, LEVEL_3];

// Current level / room helpers — single source of truth. All
// collision sampling, guard updates, and minimap reads go through
// these, so swapping level is a one-line change
// (state.levelIndex = 1) and swapping room within a level is
// (state.currentRoomId = 'B').
function currentLevel() {
  return LEVELS[state.levelIndex];
}
function currentRoom() {
  return currentLevel().rooms[state.currentRoomId];
}
function currentRoomState() {
  return state.rooms[state.currentRoomId];
}

// Is the tile at (col, row) a doorway in the current room? Returns
// the doorway definition if so, else null.
function doorwayAt(col, row) {
  const room = currentRoom();
  for (const d of room.doorways) {
    if (d.x === col && d.y === row) return d;
  }
  return null;
}

// Sample the map at a world pixel (x, y). Returns true if that
// point is inside a wall tile. Out-of-bounds counts as wall.
function isWallAt(x, y) {
  const col = Math.floor(x / TILE);
  const row = Math.floor(y / TILE);
  if (col < 0 || col >= MAP_COLS || row < 0 || row >= MAP_ROWS) return true;
  return currentRoom().map[row][col] === 1;
}

// Does a circle of radius r centered at (cx, cy) overlap any wall tile?
// Sample 8 points around the circumference + the center. Cheap and
// sufficient for grid-aligned walls at this scale.
function circleHitsWall(cx, cy, r) {
  if (isWallAt(cx, cy)) return true;
  const N = 8;
  for (let i = 0; i < N; i++) {
    const a = (i / N) * Math.PI * 2;
    if (isWallAt(cx + Math.cos(a) * r, cy + Math.sin(a) * r)) return true;
  }
  return false;
}

// Guard-only collision: walls AND doorway tiles block. Guards stay
// inside their room; doorways are player-only transit. Without this,
// guards get biased toward doorway tiles (the ray-to-wall distance
// through the doorway is long) and end up standing in what visually
// reads as the wall position.
function isGuardBlockerAt(x, y) {
  if (isWallAt(x, y)) return true;
  const col = Math.floor(x / TILE);
  const row = Math.floor(y / TILE);
  return doorwayAt(col, row) !== null;
}
function circleHitsGuardBlocker(cx, cy, r) {
  if (isGuardBlockerAt(cx, cy)) return true;
  const N = 8;
  for (let i = 0; i < N; i++) {
    const a = (i / N) * Math.PI * 2;
    if (isGuardBlockerAt(cx + Math.cos(a) * r, cy + Math.sin(a) * r)) return true;
  }
  return false;
}
// Ray distance for guards: also stops at doorway tiles so the wander
// AI doesn't prefer heading toward exits.
function rayDistToGuardBlocker(x, y, angle, offset) {
  const nx = Math.cos(angle), ny = Math.sin(angle);
  const maxDist = TILE * 10;
  const step = TILE / 4;
  for (let d = offset; d < maxDist; d += step) {
    if (isGuardBlockerAt(x + nx * d, y + ny * d)) return d;
  }
  return maxDist;
}

// Convert a tile coord {x, y} (in the room grid) to world pixel
// center. Used by room data (playerSpawn, guardSpawns, doorways).
function tileToPx(tx, ty) {
  return { x: tx * TILE + TILE / 2, y: ty * TILE + TILE / 2 };
}

// ================================================================
// GUARD AI HELPERS — Phase 3
// ================================================================

// Line-of-sight: is the segment from (x1,y1) to (x2,y2) unobstructed
// by any wall tile? Walks the line in small steps and samples the
// tilemap. Returns true if any point along the line is a wall.
function segmentHitsWall(x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  const dist = Math.hypot(dx, dy);
  if (dist < 0.1) return false;
  // Step size ≤ TILE/3 so we can't jump over a wall tile between samples
  const step = TILE / 3;
  const steps = Math.max(1, Math.ceil(dist / step));
  const nx = dx / dist, ny = dy / dist;
  for (let i = 1; i <= steps; i++) {
    const t = Math.min(i * step, dist);
    if (isWallAt(x1 + nx * t, y1 + ny * t)) return true;
  }
  return false;
}

// Can the guard currently see the player?
//   0. Player is NOT stealthed (speed boost = cloak; Phase 11)
//   1. Distance within GUARD_VISION_RANGE
//   2. Angle from guard's facing is within GUARD_VISION_HALF
//   3. No wall between guard and player
function guardCanSeePlayer(g) {
  // Simulation mode: when we're pre-rolling guard patrols during a
  // room reset, the player isn't really "in the room" even if
  // their coords say so. Skip the check entirely to avoid spurious
  // alerts during the sim.
  if (state._simulatingGuards) return false;
  // Stealth cloak: while the speed boost is active the player is
  // invisible to vision cones. Guards finish any chase/search they
  // already committed to, then resume patrol — which gives you a
  // short window to vanish. The boost timer in the HUD is your
  // cloak clock.
  if (state.player.speedBoostT > 0) return false;
  const px = state.player.x, py = state.player.y;
  const dx = px - g.x, dy = py - g.y;
  const dist = Math.hypot(dx, dy);
  if (dist > GUARD_VISION_RANGE) return false;
  const angleToPlayer = Math.atan2(dy, dx);
  // shortest angular diff, normalized to [-π, π]
  let diff = angleToPlayer - g.dir;
  while (diff >  Math.PI) diff -= Math.PI * 2;
  while (diff < -Math.PI) diff += Math.PI * 2;
  if (Math.abs(diff) > guardVisionHalfForGuard(g)) return false;
  if (segmentHitsWall(g.x, g.y, px, py)) return false;
  return true;
}

// Rotate an angle toward a target, at most MAX radians per frame.
function rotateToward(cur, target, max) {
  let diff = target - cur;
  while (diff >  Math.PI) diff -= Math.PI * 2;
  while (diff < -Math.PI) diff += Math.PI * 2;
  if (Math.abs(diff) <= max) return target;
  return cur + Math.sign(diff) * max;
}

// Pick a new wander direction for a guard. Strongly biases toward the
// longest open cardinal direction (N/S/E/W) because corridors in a
// grid-based level are cardinal-aligned — walking N down a hallway
// feels right; drifting NW at 33° across one feels like a drunk.
// Small random noise added to the chosen angle so they don't look
// robotic.
function pickNewWanderDir(g) {
  const reverseDir = g.dir + Math.PI;
  // Sample the 4 cardinals
  const cardinals = [0, Math.PI / 2, Math.PI, -Math.PI / 2];
  let best = cardinals[Math.floor(Math.random() * 4)];
  let bestDist = -1;
  for (const c of cardinals) {
    // Skip if candidate is within ±60° of reverse (prevents bouncing)
    let diff = c - reverseDir;
    while (diff >  Math.PI) diff -= Math.PI * 2;
    while (diff < -Math.PI) diff += Math.PI * 2;
    if (Math.abs(diff) < Math.PI / 3) continue;
    const rayDist = rayDistToGuardBlocker(g.x, g.y, c, GUARD_R);
    // Add small random noise so tied corridors don't always go the same way
    const score = rayDist + Math.random() * TILE;
    if (score > bestDist) {
      bestDist = score;
      best = c;
    }
  }
  // Small angular jitter so they don't look perfectly grid-snapped
  g.dir = best + (Math.random() - 0.5) * 0.15;
}

// Pick a random floor tile within INVESTIGATE_RANGE to walk to.
// Returns {x, y} in pixel coords, or null if no suitable tile found.
function pickInvestigateSpot(g) {
  for (let tries = 0; tries < 20; tries++) {
    const angle = Math.random() * Math.PI * 2;
    const dist  = TILE * 2 + Math.random() * (GUARD_INVESTIGATE_RANGE - TILE * 2);
    const x = g.x + Math.cos(angle) * dist;
    const y = g.y + Math.sin(angle) * dist;
    if (!isWallAt(x, y) && !segmentHitsWall(g.x, g.y, x, y)) {
      return { x, y };
    }
  }
  return null;
}

// Move a guard toward (tx, ty) at speed, using the same per-axis
// collision pattern as the player. Returns true if arrived (within
// GUARD_WAYPOINT_TOL).
function moveGuardToward(g, tx, ty, speed) {
  const dx = tx - g.x, dy = ty - g.y;
  const dist = Math.hypot(dx, dy);
  if (dist < GUARD_WAYPOINT_TOL) return true;
  const nx = dx / dist, ny = dy / dist;
  // Walk directly toward the target. Facing angle rotates smoothly
  // toward motion direction as a visual detail — but motion itself
  // is NOT gated by facing. (Gating caused stuck guards when sharp
  // turns faced a wall while rotation hadn't caught up yet.)
  g.dir = rotateToward(g.dir, Math.atan2(ny, nx), GUARD_TURN_RATE);
  const mvx = nx * speed;
  const mvy = ny * speed;
  const nx0 = g.x + mvx;
  if (!circleHitsGuardBlocker(nx0, g.y, GUARD_R)) g.x = nx0;
  const ny0 = g.y + mvy;
  if (!circleHitsGuardBlocker(g.x, ny0, GUARD_R)) g.y = ny0;
  return false;
}

// 11.7: a guard's "oh shit, grenade" reflex. Returns the closest
// in-flight grenade within GUARD_DODGE_RADIUS or null. Skipped
// during the room-reset simulation so pre-rolled patrols don't see
// phantom grenades.
function nearbyGrenadeFor(g) {
  if (state._simulatingGuards) return null;
  const rs = currentRoomState();
  let best = null, bestD2 = GUARD_DODGE_RADIUS * GUARD_DODGE_RADIUS;
  for (const gn of rs.grenades) {
    const ddx = gn.x - g.x, ddy = gn.y - g.y;
    const d2  = ddx * ddx + ddy * ddy;
    if (d2 < bestD2) { best = gn; bestD2 = d2; }
  }
  return best;
}

// Per-guard update: drive the state machine
function updateGuard(g) {
  // 11.7: dodge first. Any guard that sees a grenade close enough
  // bolts directly away from it for this frame, skipping the rest
  // of the AI tick. Sentries get displaced from anchor and walk
  // back via their normal "return to anchor" logic once the grenade
  // is gone (detonated or out of range). The dodge speed is between
  // patrol and chase — fast enough to actually escape but reads as
  // panic, not chase.
  const dodgeFrom = nearbyGrenadeFor(g);
  if (dodgeFrom) {
    const dgx = g.x - dodgeFrom.x, dgy = g.y - dodgeFrom.y;
    const ddist = Math.hypot(dgx, dgy) || 1;
    const moveX = (dgx / ddist) * GUARD_DODGE_SPEED;
    const moveY = (dgy / ddist) * GUARD_DODGE_SPEED;
    const tryX = g.x + moveX;
    if (!circleHitsGuardBlocker(tryX, g.y, GUARD_R)) g.x = tryX;
    const tryY = g.y + moveY;
    if (!circleHitsGuardBlocker(g.x, tryY, GUARD_R)) g.y = tryY;
    // Face the grenade so the visual reads as "tracking the threat"
    g.dir = Math.atan2(-dgy, -dgx);
    return;
  }

  const canSee = guardCanSeePlayer(g);

  if (g.phase === 'patrol') {
    // Wander: walk along current facing. On wall hit or random timer,
    // pick a new direction. If player enters sight, switch to 'alert'.
    if (canSee) {
      g.phase = 'alert';
      g.phaseT = guardAlertTimeForType(g);
      g.lastSeenX = state.player.x;
      g.lastSeenY = state.player.y;
      addAlertness(alertnessOnSpottedFor(g));
      recordSpotted();
      return;
    }

    // Sentry: no wander. Return to anchor if displaced (e.g. after a
    // chase+search), otherwise sweep facing angle around anchorDir.
    if (g.type === 'sentry') {
      const dx = g.anchorX - g.x, dy = g.anchorY - g.y;
      const distToAnchor = Math.hypot(dx, dy);
      if (distToAnchor > GUARD_SENTRY_ANCHOR_TOL) {
        moveGuardToward(g, g.anchorX, g.anchorY, guardPatrolSpeedNow());
      } else {
        g.sweepT++;
        const sweep = Math.sin(g.sweepT / GUARD_SENTRY_SWEEP_PERIOD) * GUARD_SENTRY_SWEEP_RANGE;
        g.dir = g.anchorDir + sweep;
      }
      return;
    }

    const speed = guardPatrolSpeedForType(g);
    const mvx = Math.cos(g.dir) * speed;
    const mvy = Math.sin(g.dir) * speed;

    // Record position before the move so we can measure actual progress
    const preX = g.x, preY = g.y;

    // Per-axis collision: try X, try Y. Committed axes move; blocked
    // ones don't. Uses the guard-specific blocker so patrols can't
    // drift onto doorway tiles (which are player-only transit).
    const nx0 = g.x + mvx;
    if (!circleHitsGuardBlocker(nx0, g.y, GUARD_R)) g.x = nx0;
    const ny0 = g.y + mvy;
    if (!circleHitsGuardBlocker(g.x, ny0, GUARD_R)) g.y = ny0;

    // "Not moving" watchdog: project actual motion onto the guard's
    // facing direction. A guard oscillating E-W while facing N reads
    // zero northward progress, so we correctly flag them as stuck.
    // Total-magnitude wouldn't catch that — it'd see the E-W shake as
    // "movement" and the guard would vibrate against a corner forever.
    const actualDX = g.x - preX;
    const actualDY = g.y - preY;
    const forwardProgress = actualDX * Math.cos(g.dir) + actualDY * Math.sin(g.dir);
    if (forwardProgress < 0.3) {
      g.stillT = (g.stillT || 0) + 1;
    } else {
      g.stillT = 0;
    }

    // Random-turn timer for unpredictability in open spaces
    g.wanderTimer--;
    if (g.stillT >= 5 || g.wanderTimer <= 0) {
      pickNewWanderDir(g);
      g.wanderTimer = 480 + Math.floor(Math.random() * 420);
      g.stillT = 0;
    }

    // Investigate timer: every 10-25 seconds, head to a random spot nearby
    g.investigateTimer--;
    if (g.investigateTimer <= 0) {
      const spot = pickInvestigateSpot(g);
      if (spot) {
        g.investigateX = spot.x;
        g.investigateY = spot.y;
        g.phase = 'investigate';
        g.phaseT = 0;  // not used during walking; used during look-around
      }
      // Reset timer whether or not we found a spot
      const iv = guardInvestigateIntervalNow();
      g.investigateTimer = iv.min + Math.floor(Math.random() * (iv.max - iv.min));
    }
  } else if (g.phase === 'investigate') {
    // Head purposefully toward investigateX/Y, then look around for a
    // moment, then return to wandering. Visible to player as a guard
    // that suddenly decides to go check a spot — feels like a
    // "thought I heard something" moment.
    if (canSee) {
      // Player spotted mid-investigation — switch to alert chain
      g.phase = 'alert';
      g.phaseT = guardAlertTimeForType(g);
      g.lastSeenX = state.player.x;
      g.lastSeenY = state.player.y;
      addAlertness(alertnessOnSpottedFor(g));
      recordSpotted();
      return;
    }
    if (g.phaseT > 0) {
      // Arrived — look around (small oscillation of facing)
      const t = g.phaseT / 10;
      g.dir += Math.sin(t) * 0.06;
      g.phaseT--;
      if (g.phaseT <= 0) {
        g.phase = 'patrol';
        pickNewWanderDir(g);
        g.wanderTimer = 480 + Math.floor(Math.random() * 420);
      }
    } else {
      // Walking to the spot — faster than patrol speed, slower than chase
      const arrived = moveGuardToward(g, g.investigateX, g.investigateY, guardPatrolSpeedForType(g) * 1.35);
      if (arrived) {
        g.phaseT = GUARD_INVESTIGATE_LOOK;
      }
    }
  } else if (g.phase === 'alert') {
    // Stand still and "see" — short pause before chase kicks in.
    // If the player breaks LoS during alert, we still go to chase
    // using the last-seen position; commits to investigating.
    if (canSee) {
      g.lastSeenX = state.player.x;
      g.lastSeenY = state.player.y;
      // Rotate to face player while alerted
      g.dir = rotateToward(g.dir,
        Math.atan2(state.player.y - g.y, state.player.x - g.x),
        GUARD_TURN_RATE * 1.5);
    }
    g.phaseT--;
    if (g.phaseT <= 0) {
      g.phase = 'chase';
    }
  } else if (g.phase === 'chase') {
    // Keep refreshing last-seen while visible
    if (canSee) {
      g.lastSeenX = state.player.x;
      g.lastSeenY = state.player.y;
      g.stuckT = 0;   // seeing the player resets stuck counter
    }
    // Record pre-move position so we can detect "pushing against a wall"
    const preX = g.x, preY = g.y;
    // Walk toward last-seen position. If we reach it without ever
    // re-seeing the player, enter 'search' (a timed wander-at-spot).
    const arrived = moveGuardToward(g, g.lastSeenX, g.lastSeenY, guardChaseSpeedForType(g));
    // Stuck detection: per-axis collision prevents tunneling, but with
    // no pathfinding a guard can get wedged pushing toward a target on
    // the far side of a wall. If we barely moved two frames in a row,
    // accept the loss and search here instead.
    const moved = Math.hypot(g.x - preX, g.y - preY);
    if (moved < 0.2) {
      g.stuckT = (g.stuckT || 0) + 1;
    } else {
      g.stuckT = 0;
    }
    if (arrived && !canSee) {
      g.phase = 'search';
      g.phaseT = GUARD_SEARCH_TIME;
      g.stuckT = 0;
    } else if (g.stuckT > 30 && !canSee) {   // ~0.5s of no progress → give up
      g.phase = 'search';
      g.phaseT = GUARD_SEARCH_TIME;
      g.stuckT = 0;
    }
  } else if (g.phase === 'search') {
    // Stand at last-seen and slowly sweep facing angle left/right.
    // If player reappears, back to alert/chase. If timer expires,
    // return to patrol at the closest waypoint.
    if (canSee) {
      g.phase = 'alert';
      g.phaseT = guardAlertTimeForType(g);
      g.lastSeenX = state.player.x;
      g.lastSeenY = state.player.y;
      addAlertness(alertnessOnSpottedFor(g));
      recordSpotted();
      return;
    }
    // Sweep: oscillate facing by ±60° over ~2 sec
    const t = (GUARD_SEARCH_TIME - g.phaseT) / 30;
    g.dir = g.dir + Math.sin(t) * 0.04;  // gentle oscillation
    g.phaseT--;
    if (g.phaseT <= 0) {
      // Resume wandering: pick a fresh random direction and reset the
      // wander timer. No waypoints to snap back to anymore.
      pickNewWanderDir(g);
      g.wanderTimer = 480 + Math.floor(Math.random() * 420);
      g.phase = 'patrol';
    }
  }
}

function updateGuards() {
  for (const g of currentRoomState().guards) updateGuard(g);
}

// ── Guards — Phase 3 ─────────────────────────────────────────────
const GUARD_R             = 12;
const GUARD_PATROL_SPEED  = 1.6;    // faster = more purposeful looking
const GUARD_CHASE_SPEED   = 2.2;
const GUARD_TURN_RATE     = 0.07;   // radians per frame when rotating toward target
const GUARD_VISION_RANGE  = 220;    // how far the cone reaches (px)
const GUARD_VISION_HALF   = Math.PI / 5;   // half-angle of the cone (≈36° total)
const GUARD_ALERT_TIME    = 45;     // frames of "?" pause before committing to chase
const GUARD_SEARCH_TIME   = 150;    // frames spent searching at lost-sight position
const GUARD_WAYPOINT_TOL  = 6;      // px tolerance to consider a waypoint reached
// Investigation — the "thought I heard something" behavior
const GUARD_INVESTIGATE_MIN    = 600;   // min frames between investigations (10s)
const GUARD_INVESTIGATE_MAX    = 1500;  // max frames between investigations (25s)
const GUARD_INVESTIGATE_RANGE  = 400;   // max distance of chosen investigate spot (px)
const GUARD_INVESTIGATE_LOOK   = 90;    // frames spent looking at the spot (~1.5s)

// Build guards for a specific room from its guardSpawns definition.
// Spawn entries may include { type, facingDir }:
//   type     - 'patrol' (default), 'sentry', 'hunter', 'alarm'
//   facingDir- initial/anchor facing angle (radians). Required for
//              sentries so they sweep meaningfully; optional otherwise.
// Sentries remember their anchor position so they can return after
// a chase.
function makeGuardsForRoom(roomDef) {
  // Phase 12: director may drop a fraction of guard spawns at low
  // skill. Sort first so the same guards get dropped on retry — a
  // level shouldn't shuffle which guards exist between attempts.
  let spawns = (roomDef.guardSpawns || []).slice();
  if (directorState && directorState.guardFraction < 1.0 && spawns.length > 1) {
    const keep = Math.max(1, Math.round(spawns.length * directorState.guardFraction));
    spawns.sort((a, b) => (a.x - b.x) || (a.y - b.y));
    spawns = spawns.slice(0, keep);
  }
  return spawns.map(tile => {
    const p     = tileToPx(tile.x, tile.y);
    const type  = tile.type || 'patrol';
    const dir   = tile.facingDir !== undefined ? tile.facingDir : Math.random() * Math.PI * 2;
    return {
      x: p.x, y: p.y,
      dir,
      type,
      // Sentry anchor — where they return to and sweep around.
      anchorX:   p.x,
      anchorY:   p.y,
      anchorDir: dir,
      // Per-guard sweep counter with a random offset so multiple
      // sentries don't pan in lockstep.
      sweepT: Math.random() * 1000,
      phase: 'patrol',
      phaseT: 0,
      wanderTimer: 300 + Math.floor(Math.random() * 600),
      investigateTimer: GUARD_INVESTIGATE_MIN + Math.floor(Math.random() * (GUARD_INVESTIGATE_MAX - GUARD_INVESTIGATE_MIN)),
      investigateX: 0, investigateY: 0,
      lastSeenX: 0, lastSeenY: 0
    };
  });
}

// Build the per-room runtime state (guards + bullets + keys +
// pickups per room) so rooms remember their own state when the
// player leaves and returns. Bullets stay with the room they were
// fired in; collected keys/pickups disappear and stay gone.
//
// Phase 11: takes a level def so we can build room state for any
// level, not just the current one (needed when we advance).
function makeRoomsState(levelDef) {
  const rooms = {};
  for (const id in levelDef.rooms) {
    const def = levelDef.rooms[id];
    rooms[id] = {
      guards:  makeGuardsForRoom(def),
      bullets: [],
      // Grenades in flight + active explosion animations (11.2).
      // Both are room-scoped just like bullets — leaving the room
      // discards anything mid-air.
      grenades:   [],
      explosions: [],
      // Keys and pickups are clones of the spawn lists so we can
      // splice them out as collected without mutating definitions.
      keys:    (def.keySpawns    || []).map(k => ({ x: k.x, y: k.y })),
      pickups: (def.pickupSpawns || []).map(p => ({ x: p.x, y: p.y, type: p.type }))
    };
  }
  return rooms;
}

// Count keys defined across a specific level.
function totalKeysInLevel(levelDef) {
  let n = 0;
  for (const id in levelDef.rooms) n += (levelDef.rooms[id].keySpawns || []).length;
  return n;
}

// Build state for a specific level. If carryPlayer is provided,
// HP and ammo persist from the prior level; otherwise the player
// starts fresh. Cloak always resets between levels (it's a temp
// buff, not an inventory item). Alertness, timer, keys, and room
// state all reset — a new level is a clean situation.
function buildStateFor(levelIndex, carryPlayer) {
  // Phase 12: refresh director knobs once per level start. This MUST
  // happen before makeRoomsState() because guard-fraction is read at
  // spawn time. Also reset transient run stats — director scoring
  // works per-attempt.
  directorState = computeDirector();
  resetRunStats();

  const levelDef  = LEVELS[levelIndex];
  const startRoom = levelDef.rooms[levelDef.startRoomId];
  const sp        = tileToPx(startRoom.playerSpawn.x, startRoom.playerSpawn.y);
  return {
    player: {
      x: sp.x,
      y: sp.y,
      dir: -Math.PI / 2,
      hp:       carryPlayer ? carryPlayer.hp   : PLAYER_HP_MAX,
      iframes:  0,
      // Burst-fire (11.2): shootCooldown is the inter-burst gate;
      // burstRemaining/burstStep run within an in-flight burst;
      // lastFirePressed gates the trigger to edge-detect.
      shootCooldown:   0,
      burstRemaining:  0,
      burstStep:       0,
      lastFirePressed: false,
      lastNadePressed: false,
      ammo:     carryPlayer ? carryPlayer.ammo     : PLAYER_AMMO_START,
      // Grenades (11.2): inventory carries between levels like ammo.
      // weaponMode flips to 'grenade' on B; throwing reverts to 'gun'.
      // 11.5: cooking + cookT track an in-hand grenade with the pin
      // pulled. Set when trigger goes down in grenade mode, cleared
      // on release (throw) or when cookT hits the fuse (in-hand boom).
      grenades:   carryPlayer ? carryPlayer.grenades : GRENADE_START,
      weaponMode: 'gun',
      cooking:    false,
      cookT:      0,
      speedBoostT: 0
    },
    levelIndex:    levelIndex,
    currentRoomId: levelDef.startRoomId,
    rooms:         makeRoomsState(levelDef),
    transition:    null,
    keysCollected: 0,
    totalKeys:     totalKeysInLevel(levelDef),
    needKeysT:     0,
    // Terminal WIN (final-level escape). Intermediate "LEVEL N
    // CLEAR" uses levelComplete* instead.
    won:           false,
    wonT:          0,
    // Phase 11: between-level card. Non-terminal; after levelCompleteT
    // hits LEVEL_COMPLETE_FRAMES the update loop calls advanceLevel().
    levelComplete:  false,
    levelCompleteT: 0,
    visitedRooms:  { [levelDef.startRoomId]: true },
    timerFrames:   levelDef.timerFrames,
    timerStarted:  false,
    timesUp:       false,
    timesUpT:      0,
    alertness:     0,
    gameover:      false,
    gameoverT:     0,
    // Phase 11 follow-up: pause toggle. Freezes update() entirely
    // while set; Esc/P/Start toggle. Never true during terminal /
    // transition / level-complete states — canTogglePause() gates.
    paused:        false
  };
}

// Can the player pause right now? No during terminal screens (they
// have their own flow) or during automatic transitions (doorway
// fade, between-level card) — pausing those would strand the game.
function canTogglePause() {
  return !state.gameover && !state.won && !state.timesUp &&
         !state.levelComplete && !state.transition;
}
function buildState() { return buildStateFor(0, null); }

var state = buildState();

function restartGame() {
  state = buildState();
}

// Phase 11: between-level advance. Called from update() once the
// levelComplete card has been shown long enough. Preserves HP+ammo
// (and grenades since 11.2) so choices in the prior level matter.
function advanceLevel() {
  const carry = {
    hp:       state.player.hp,
    ammo:     state.player.ammo,
    grenades: state.player.grenades
  };
  state = buildStateFor(state.levelIndex + 1, carry);
}

// ================================================================
// UPDATE
// ================================================================

function getMoveVector() {
  // Merge keyboard + touch + gamepad into a single (vx, vy), normalized
  // so diagonals aren't faster than cardinals.
  let vx = 0, vy = 0;

  // Keyboard (digital: each key contributes ±1)
  if (keys['ArrowLeft']  || keys['KeyA']) vx -= 1;
  if (keys['ArrowRight'] || keys['KeyD']) vx += 1;
  if (keys['ArrowUp']    || keys['KeyW']) vy -= 1;
  if (keys['ArrowDown']  || keys['KeyS']) vy += 1;

  // Touch (analog: already normalized)
  if (touch.active) {
    vx += touch.x;
    vy += touch.y;
  }

  // Gamepad (analog)
  if (pad.connected && (pad.x !== 0 || pad.y !== 0)) {
    vx += pad.x;
    vy += pad.y;
  }

  // Clamp magnitude to 1 so diagonal input doesn't go faster than cardinal
  const mag = Math.hypot(vx, vy);
  if (mag > 1) {
    vx /= mag;
    vy /= mag;
  }
  return { vx, vy };
}

// Room transition timing (frames at 60fps → ~167ms each half)
const TRANSITION_OUT_FRAMES = 10;
const TRANSITION_IN_FRAMES  = 10;

// ── Alertness helpers (Phase 9) ─────────────────────────────────
// Scale factor 0..1. Used as linear interp factor for all the
// alertness-driven guard behaviors.
function alertnessScale() {
  return Math.min(1, Math.max(0, state.alertness / ALERTNESS_MAX));
}
// Current effective values that scale with alertness. Called on
// demand by cone/patrol/investigate code so behavior updates in
// real time as alertness rises and decays.
function guardVisionHalfNow() {
  const d = directorState || { visionMult: 1 };
  return GUARD_VISION_HALF * (1 + (ALERTNESS_CONE_SCALE_MAX - 1) * alertnessScale()) * d.visionMult;
}
function guardPatrolSpeedNow() {
  const d = directorState || { speedMult: 1 };
  return GUARD_PATROL_SPEED * (1 + (ALERTNESS_SPEED_SCALE_MAX - 1) * alertnessScale()) * d.speedMult;
}
function guardInvestigateIntervalNow() {
  const s = alertnessScale();
  const d = directorState || { investigateMult: 1 };
  const min = GUARD_INVESTIGATE_MIN + (ALERTNESS_INVEST_MIN_AT_MAX - GUARD_INVESTIGATE_MIN) * s;
  const max = GUARD_INVESTIGATE_MAX + (ALERTNESS_INVEST_MAX_AT_MAX - GUARD_INVESTIGATE_MAX) * s;
  return { min: Math.floor(min * d.investigateMult), max: Math.floor(max * d.investigateMult) };
}
function addAlertness(n) {
  state.alertness = Math.min(ALERTNESS_MAX, state.alertness + n);
}

// Reset the surviving guards in a room back to their patrol anchors
// and fresh AI state, then pre-roll a random number of patrol
// frames so they're not rubber-banded to anchor when the player
// re-enters. Dead guards stay dead. Bullets in the room are cleared.
//
// The pre-roll runs updateGuard for each guard while _simulatingGuards
// is set, which short-circuits canSee to false — so no spurious
// alerts from a player who isn't really in the room yet. currentRoomId
// is temporarily pointed at the target room so the guard AI's wall/
// doorway lookups sample the right map.
const RESET_SIM_FRAMES_MIN = 30;   // 0.5s of sim patrol minimum
const RESET_SIM_FRAMES_MAX = 120;  // 2s of sim patrol maximum

function resetGuardsInRoom(roomId) {
  const rs = state.rooms[roomId];
  if (!rs) return;
  for (const g of rs.guards) {
    g.x = g.anchorX;
    g.y = g.anchorY;
    g.dir = g.anchorDir;
    g.phase = 'patrol';
    g.phaseT = 0;
    g.lastSeenX = 0;
    g.lastSeenY = 0;
    g.stillT = 0;
    g.stuckT = 0;
    g.contacted = false;
    g.wanderTimer = 300 + Math.floor(Math.random() * 600);
    const iv = guardInvestigateIntervalNow();
    g.investigateTimer = iv.min + Math.floor(Math.random() * (iv.max - iv.min));
  }
  rs.bullets = [];

  // Pre-roll: let the guards wander for a random number of frames
  // so they're somewhere along their patrol when the player comes
  // back. currentRoomId points at this room already (we're called
  // mid-transition from the leaving room), but we save/restore it
  // so the function is safe to call from anywhere.
  const savedRoomId = state.currentRoomId;
  state.currentRoomId = roomId;
  state._simulatingGuards = true;
  const simFrames = RESET_SIM_FRAMES_MIN +
                    Math.floor(Math.random() * (RESET_SIM_FRAMES_MAX - RESET_SIM_FRAMES_MIN));
  for (let f = 0; f < simFrames; f++) {
    for (const g of rs.guards) updateGuard(g);
  }
  state._simulatingGuards = false;
  state.currentRoomId = savedRoomId;
}

// Short knockback: push the player away from (fromX, fromY) by up
// to `distance` pixels, stepping to respect walls so they can't
// clip through geometry. Used when a guard hits the player.
function applyKnockback(p, fromX, fromY, distance) {
  const dx = p.x - fromX, dy = p.y - fromY;
  const dist = Math.hypot(dx, dy) || 1;
  const nx = dx / dist, ny = dy / dist;
  const stepSize = PLAYER_R;       // half a tile per iteration
  const steps    = Math.ceil(distance / stepSize);
  for (let i = 0; i < steps; i++) {
    const tryX = p.x + nx * stepSize;
    if (!circleHitsWall(tryX, p.y, PLAYER_R)) p.x = tryX;
    const tryY = p.y + ny * stepSize;
    if (!circleHitsWall(p.x, tryY, PLAYER_R)) p.y = tryY;
  }
}

// 11.5: shared detonation handler used by both in-flight grenades
// (wall hit / fuse-out) and in-hand cook-overs. Spawns the explosion
// entity, kills guards inside the blast radius, dumps alertness,
// and applies self-damage if the player is in their own boom.
function detonateGrenadeAt(x, y) {
  const rs = currentRoomState();
  rs.explosions.push({ x: x, y: y, t: 0 });
  addAlertness(ALERTNESS_ON_GRENADE);
  const r2 = EXPLOSION_RADIUS * EXPLOSION_RADIUS;
  for (const g of rs.guards) {
    const ddx = g.x - x, ddy = g.y - y;
    if (ddx * ddx + ddy * ddy < r2) {
      g.dead = true;
      addAlertness(ALERTNESS_ON_KILL);
    }
  }
  // Self-damage: standing in your own blast costs HP and gets you
  // knocked out of the radius. iframes gate prevents double-counting
  // overlapping explosions on the same frame.
  const p = state.player;
  const pdx = p.x - x, pdy = p.y - y;
  if (pdx * pdx + pdy * pdy < r2 && p.iframes === 0 && p.hp > 0) {
    p.hp = Math.max(0, p.hp - GRENADE_SELF_DAMAGE);
    p.iframes = PLAYER_IFRAMES;
    recordHit();
    if (p.hp <= 0) {
      state.gameover  = true;
      state.gameoverT = 0;
      recordDeath();
    } else {
      applyKnockback(p, x, y, KNOCKBACK_DISTANCE);
    }
  }
}

// ── Per-guard-type behavior overrides (Phase 10) ────────────────
// Base values come from the Phase 3 constants and are scaled by
// alertness. These per-type helpers apply the additional per-guard
// multipliers on top. All call sites for guard speed / vision /
// alert time now go through one of these helpers.
function guardPatrolSpeedForType(g) {
  const base = guardPatrolSpeedNow();
  if (g.type === 'hunter') return base * GUARD_HUNTER_PATROL_MULT;
  return base;  // sentry never patrol-walks (see updateGuard), so no mult here
}
function guardChaseSpeedForType(g) {
  const base = GUARD_CHASE_SPEED;
  if (g.type === 'hunter') return base * GUARD_HUNTER_CHASE_MULT;
  return base;
}
function guardAlertTimeForType(g) {
  if (g.type === 'hunter') return Math.max(1, Math.floor(GUARD_ALERT_TIME * GUARD_HUNTER_ALERT_MULT));
  return GUARD_ALERT_TIME;
}
function guardVisionHalfForGuard(g) {
  const base = guardVisionHalfNow();
  if (g.type === 'sentry') return base * GUARD_SENTRY_CONE_MULT;
  return base;
}
function alertnessOnSpottedFor(g) {
  return g.type === 'alarm' ? ALERTNESS_ON_SPOTTED + ALERTNESS_ALARM_BONUS
                             : ALERTNESS_ON_SPOTTED;
}

function update() {
  // Pause: freeze everything. No timer tick, no guard AI, no bullets,
  // no alertness decay. The overlay + unpause input both live outside
  // update() so they keep working.
  if (state.paused) return;

  // Hard freeze on gameover / win / time's up; just increment the
  // fade timer. All three are terminal states handled the same way.
  if (state.gameover) { state.gameoverT++; return; }
  if (state.won)      { state.wonT++;      return; }
  if (state.timesUp)  { state.timesUpT++;  return; }

  // Phase 11: between-level "LEVEL N CLEAR" card. Non-terminal.
  // When the counter hits LEVEL_COMPLETE_FRAMES we swap state to
  // the next level (player HP/ammo carry over). The card overlay
  // tracks levelCompleteT for its fade.
  if (state.levelComplete) {
    state.levelCompleteT++;
    if (state.levelCompleteT >= LEVEL_COMPLETE_FRAMES) {
      advanceLevel();
    }
    return;
  }

  // Alertness decay — continuous, only while gameplay is active.
  // Rising triggers are hooked in the firing/kill/spot sites.
  if (state.alertness > 0) {
    state.alertness = Math.max(0, state.alertness - ALERTNESS_DECAY_PER_F);
  }

  // Phase 12: tick run-time counter and spotted-cooldown. Same gate
  // as alertness — gameplay-active only, skipped during pause /
  // terminal screens / transition (those returned earlier).
  runStats.framesElapsed++;
  if (runStats.spottedCooldown > 0) runStats.spottedCooldown--;

  // Tick down the "NEED N KEYS" prompt regardless of other updates
  // so it doesn't get stuck on screen forever after one trigger.
  if (state.needKeysT > 0) state.needKeysT--;

  // If a room transition is in flight, advance it and skip gameplay
  // updates. Bullets/guards in the OLD room freeze for the duration
  // and resume when we come back (or get discarded if we never do).
  if (state.transition) {
    const tr = state.transition;
    tr.t++;
    if (tr.phase === 'out' && tr.t >= TRANSITION_OUT_FRAMES) {
      // Fade to black complete — reset the room we're leaving so
      // guards there return to their patrol anchors (living ones
      // only), then swap rooms and reposition the player.
      const leavingRoom = state.currentRoomId;
      if (leavingRoom !== tr.toRoom) resetGuardsInRoom(leavingRoom);
      state.currentRoomId = tr.toRoom;
      state.visitedRooms[tr.toRoom] = true;   // minimap reveal
      const dst = tileToPx(tr.toX, tr.toY);
      state.player.x = dst.x;
      state.player.y = dst.y;
      tr.phase = 'in';
      tr.t = 0;
    } else if (tr.phase === 'in' && tr.t >= TRANSITION_IN_FRAMES) {
      state.transition = null;
    }
    return;
  }

  const p = state.player;
  const { vx, vy } = getMoveVector();

  // ── Countdown timer ───────────────────────────────────────────
  // Starts on first movement input (any non-zero vector). While
  // started and gameplay is active, tick down each frame. Hits 0
  // → TIME'S UP terminal state.
  if (!state.timerStarted && (Math.abs(vx) > 0.01 || Math.abs(vy) > 0.01)) {
    state.timerStarted = true;
  }
  if (state.timerStarted && state.timerFrames > 0) {
    state.timerFrames--;
    if (state.timerFrames <= 0) {
      state.timesUp = true;
      state.timesUpT = 0;
      recordDeath();   // Phase 12: timesUp counts as a failed run
      return;
    }
  }


  // Speed boost: while active, move faster. Decrement each frame.
  if (p.speedBoostT > 0) p.speedBoostT--;
  const moveSpeed = p.speedBoostT > 0 ? PLAYER_SPEED * SPEED_BOOST_MULT : PLAYER_SPEED;
  const dx = vx * moveSpeed;
  const dy = vy * moveSpeed;

  // Per-axis collision: attempt X, revert if it lands in a wall, then
  // attempt Y, revert if it lands in a wall.
  if (dx !== 0) {
    p.x += dx;
    if (circleHitsWall(p.x, p.y, PLAYER_R)) p.x -= dx;
  }
  if (dy !== 0) {
    p.y += dy;
    if (circleHitsWall(p.x, p.y, PLAYER_R)) p.y -= dy;
  }

  // Facing priority (twin-stick style): aim stick > movement > last
  // angle. The gamepad's right stick and the touch aim stick both
  // override movement-facing so you can walk one way and shoot
  // another. Keyboard players fall through to movement-based facing.
  if (pad.aimActive) {
    p.dir = Math.atan2(pad.aimY, pad.aimX);
  } else if (touchAim.active) {
    p.dir = Math.atan2(touchAim.y, touchAim.x);
  } else if (Math.abs(vx) > 0.01 || Math.abs(vy) > 0.01) {
    p.dir = Math.atan2(vy, vx);
  }

  // ── Pickup collection ────────────────────────────────────────
  // Walk over a pickup → apply effect and remove it, but only if
  // the pickup can actually do something. Health at max HP and
  // ammo at max capacity leave the pickup sitting there for later.
  // Speed boost always consumes (it just refreshes the duration).
  {
    const rs = currentRoomState();
    for (let i = rs.pickups.length - 1; i >= 0; i--) {
      const pk = rs.pickups[i];
      const pp = tileToPx(pk.x, pk.y);
      const ddx = p.x - pp.x, ddy = p.y - pp.y;
      if (ddx * ddx + ddy * ddy < PICKUP_R * PICKUP_R) {
        let consume = false;
        if (pk.type === 'health') {
          if (p.hp < PLAYER_HP_MAX) {
            p.hp = Math.min(PLAYER_HP_MAX, p.hp + HEALTH_PICKUP_HEAL);
            consume = true;
          }
        } else if (pk.type === 'ammo') {
          if (p.ammo < PLAYER_AMMO_MAX) {
            p.ammo = Math.min(PLAYER_AMMO_MAX, p.ammo + AMMO_PICKUP_AMOUNT);
            consume = true;
          }
        } else if (pk.type === 'speed') {
          p.speedBoostT = SPEED_BOOST_DURATION;
          consume = true;
        } else if (pk.type === 'grenade') {
          if (p.grenades < GRENADE_MAX) {
            p.grenades = Math.min(GRENADE_MAX, p.grenades + GRENADE_PICKUP_AMOUNT);
            consume = true;
          }
        }
        if (consume) rs.pickups.splice(i, 1);
      }
    }
  }

  // ── Key pickup ────────────────────────────────────────────────
  // Walk over a key in the current room → collect it. Compares
  // pixel distance against KEY_R so you don't have to be exactly
  // on the tile center.
  {
    const rs = currentRoomState();
    for (let i = rs.keys.length - 1; i >= 0; i--) {
      const k  = rs.keys[i];
      const kp = tileToPx(k.x, k.y);
      const dx = p.x - kp.x, dy = p.y - kp.y;
      if (dx * dx + dy * dy < KEY_R * KEY_R) {
        rs.keys.splice(i, 1);
        state.keysCollected++;
      }
    }
  }

  // ── Exit check ────────────────────────────────────────────────
  // Stepping onto the exit tile of the current room either wins
  // (all keys collected) or shows the "NEED N KEYS" feedback.
  // Checked BEFORE doorways so the exit can't double as a transition.
  //
  // Phase 11: on a successful exit, if there's a next level, trigger
  // the between-level card (levelComplete). If we're on the final
  // level, the terminal WIN fires as before.
  {
    const room = currentRoom();
    if (room.exit) {
      const col = Math.floor(p.x / TILE);
      const row = Math.floor(p.y / TILE);
      if (col === room.exit.x && row === room.exit.y) {
        if (state.keysCollected >= state.totalKeys) {
          recordLevelComplete();   // Phase 12: score this run before reset
          if (state.levelIndex < LEVELS.length - 1) {
            state.levelComplete  = true;
            state.levelCompleteT = 0;
          } else {
            state.won  = true;
            state.wonT = 0;
          }
          return;
        } else {
          state.needKeysT = NEED_KEYS_DURATION;
          // Don't return — let the rest of the frame run normally
        }
      }
    }
  }

  // ── Doorway check ─────────────────────────────────────────────
  // After movement, see if the player landed on a doorway tile.
  // If so, start a fade transition to the target room.
  {
    const col = Math.floor(p.x / TILE);
    const row = Math.floor(p.y / TILE);
    const door = doorwayAt(col, row);
    if (door) {
      state.transition = {
        t: 0,
        phase: 'out',
        toRoom: door.toRoom,
        toX: door.toX,
        toY: door.toY
      };
      return;   // freeze the rest of update() this frame
    }
  }

  // ── Firing (11.2: burst fire + grenade throw) ─────────────────
  // Trigger pull is edge-detected (release + re-press required for
  // each new shot) so a held trigger doesn't auto-spam. Behavior
  // forks on weaponMode:
  //   gun     : start a 3-bullet burst, then forced cooldown
  //   grenade : throw a single grenade and revert to gun mode
  //
  // Touch NADE button (11.8) is its own grenade trigger: pressing it
  // auto-flips into grenade mode (if able), and while held it counts
  // as the trigger so the existing cook/throw path runs unchanged.
  // Only counted as a fire signal in grenade mode so it can't
  // accidentally pop bullets in gun mode (e.g. when out of grenades).
  if (touch.nade && !p.lastNadePressed && p.grenades > 0 &&
      !state.paused && !p.cooking && p.weaponMode !== 'grenade') {
    p.weaponMode = 'grenade';
  }
  p.lastNadePressed = touch.nade;

  const firePressed = keys['Space'] || touch.fire || pad.fire ||
                      (p.weaponMode === 'grenade' && touch.nade);
  const fireEdge    = firePressed && !p.lastFirePressed;
  p.lastFirePressed = firePressed;

  if (p.shootCooldown > 0) p.shootCooldown--;

  if (p.weaponMode === 'gun') {
    // Start a new burst on trigger edge — gated by cooldown + ammo.
    if (fireEdge && p.shootCooldown === 0 && p.burstRemaining === 0 && p.ammo > 0) {
      p.burstRemaining = Math.min(BURST_SIZE, p.ammo);
      p.burstStep      = 0;
    }
    // Fire the next bullet of the in-flight burst when the intra-
    // burst tick reaches zero. When the burst empties, set the
    // long inter-burst cooldown so the next trigger pull has to wait.
    if (p.burstRemaining > 0) {
      if (p.burstStep > 0) {
        p.burstStep--;
      } else if (p.ammo > 0) {
        const bx = p.x + Math.cos(p.dir) * (PLAYER_R + 4);
        const by = p.y + Math.sin(p.dir) * (PLAYER_R + 4);
        currentRoomState().bullets.push({
          x: bx, y: by,
          vx: Math.cos(p.dir) * BULLET_SPEED,
          vy: Math.sin(p.dir) * BULLET_SPEED,
          traveled: 0
        });
        p.ammo--;
        addAlertness(ALERTNESS_ON_FIRE);
        p.burstRemaining--;
        p.burstStep = BURST_INTRA_FRAMES;
        if (p.burstRemaining === 0 || p.ammo === 0) {
          p.burstRemaining = 0;
          p.shootCooldown  = BURST_COOLDOWN;
        }
      } else {
        p.burstRemaining = 0;   // ran dry mid-burst
        p.shootCooldown  = BURST_COOLDOWN;
      }
    }
  } else if (p.weaponMode === 'grenade') {
    // Cook-and-throw (11.5). Press to start cooking (pin out, fuse
    // ticking). Hold to extend the cook. Release to throw with
    // remaining fuse, so a quick tap is a normal toss and a long
    // hold airbursts where it lands. Hold past the fuse and it
    // detonates in your hand — self-damage included.
    if (p.grenades <= 0) {
      p.weaponMode = 'gun';
      p.cooking    = false;
      p.cookT      = 0;
    } else if (firePressed) {
      if (!p.cooking && p.shootCooldown === 0) {
        // Just started cooking this frame.
        p.cooking = true;
        p.cookT   = 0;
      } else if (p.cooking) {
        p.cookT++;
        if (p.cookT >= GRENADE_FUSE) {
          // Cook-over: detonate in hand at player position.
          detonateGrenadeAt(p.x, p.y);
          p.grenades--;
          p.cooking       = false;
          p.cookT         = 0;
          p.weaponMode    = 'gun';
          p.shootCooldown = BURST_COOLDOWN;
        }
      }
    } else if (p.cooking) {
      // Released: throw with remaining fuse. Floor at 1 frame so a
      // simultaneous press+release doesn't divide-by-zero anywhere.
      const remainingFuse = Math.max(1, GRENADE_FUSE - p.cookT);
      const bx = p.x + Math.cos(p.dir) * (PLAYER_R + 4);
      const by = p.y + Math.sin(p.dir) * (PLAYER_R + 4);
      currentRoomState().grenades.push({
        x: bx, y: by,
        vx: Math.cos(p.dir) * GRENADE_SPEED,
        vy: Math.sin(p.dir) * GRENADE_SPEED,
        fuse: remainingFuse
      });
      p.grenades--;
      p.cooking       = false;
      p.cookT         = 0;
      p.weaponMode    = 'gun';
      p.shootCooldown = BURST_COOLDOWN;
      addAlertness(ALERTNESS_ON_FIRE);
    }
  }

  // ── Bullets ───────────────────────────────────────────────────
  const rs = currentRoomState();
  for (const b of rs.bullets) {
    b.x += b.vx;
    b.y += b.vy;
    b.traveled += BULLET_SPEED;
    // Wall hit: mark for removal
    if (isWallAt(b.x, b.y)) b.dead = true;
    if (b.traveled > BULLET_RANGE) b.dead = true;
    // Guard hit: find nearest guard within BULLET_R + GUARD_R
    for (const g of rs.guards) {
      const ddx = g.x - b.x, ddy = g.y - b.y;
      if (ddx * ddx + ddy * ddy < (GUARD_R + BULLET_R) * (GUARD_R + BULLET_R)) {
        g.dead = true;
        b.dead = true;
        addAlertness(ALERTNESS_ON_KILL);
        break;
      }
    }
  }
  rs.bullets = rs.bullets.filter(b => !b.dead);

  // ── Grenades (11.2 base, 11.5 cook, 11.7 lob over walls) ──────
  // In-flight: travel until the fuse runs out, then detonate. Fuse
  // is the skill mechanic — time the throw so the grenade lands
  // near the target as it explodes. Walls do NOT stop a grenade
  // (it's lobbed up and over them); if the fuse hits zero while
  // the grenade is over a wall tile, it just airbursts there.
  // Deliberately NOT contact-detonating on guards either — real
  // grenades are timer-fused, the timing IS the gameplay.
  for (const gn of rs.grenades) {
    gn.x += gn.vx;
    gn.y += gn.vy;
    gn.fuse--;
    if (gn.fuse <= 0) {
      gn.dead = true;
      detonateGrenadeAt(gn.x, gn.y);
    }
  }
  rs.grenades = rs.grenades.filter(gn => !gn.dead);

  // Tick active explosions; clear when they've finished animating.
  for (const ex of rs.explosions) ex.t++;
  rs.explosions = rs.explosions.filter(ex => ex.t < EXPLOSION_FRAMES);

  rs.guards  = rs.guards.filter(g => !g.dead);

  updateGuards();

  // ── Guard contact damages player ──────────────────────────────
  // On a fresh hit: take 1 HP and get knocked back ~3 tiles away
  // from the guard. Knockback respects walls (steps through collision
  // rather than teleporting). Per-guard contact flag + hysteresis
  // still prevent the same guard re-hitting you before you've
  // actually separated. Less punishing than the earlier full-room
  // teleport — you lose ground, not the whole approach.
  if (p.iframes > 0) p.iframes--;
  for (const g of rs.guards) {
    const ddx  = g.x - p.x, ddy = g.y - p.y;
    const dsq  = ddx * ddx + ddy * ddy;
    const inHit       = dsq < GUARD_CONTACT_R   * GUARD_CONTACT_R;
    const outOfRange  = dsq > GUARD_DISENGAGE_R * GUARD_DISENGAGE_R;
    if (inHit && !g.contacted && p.iframes === 0 && p.hp > 0) {
      p.hp--;
      p.iframes = PLAYER_IFRAMES;
      g.contacted = true;
      recordHit();
      if (p.hp <= 0) {
        state.gameover = true;
        state.gameoverT = 0;
        recordDeath();
      } else {
        applyKnockback(p, g.x, g.y, KNOCKBACK_DISTANCE);
      }
      break;  // one hit per frame is plenty
    } else if (outOfRange) {
      g.contacted = false;
    }
  }
}

// ================================================================
// DRAW
// ================================================================

// ── Kenney topdown shooter sprites (CC0, by Kenney.nl) ───────────
// Paths are URL-encoded so the space in "TD Shooter" survives both
// GitHub Pages and local file serving. imgReady() gates every draw
// so if a sprite 404s or is still loading we fall back to the
// original procedural render — gameplay never blocks on art.
const IMG = {};
function loadImg(key, path) {
  const im = new Image();
  im.src = path;
  IMG[key] = im;
}
const _TD = '../assets/TD%20Shooter/PNG';
// No floor sprite — Kenney's pack has no solid dark-gray floor
// (the gray tiles are wall-interior with borders), so we keep the
// procedural dark floor and only sprite the walls.
loadImg('wall',   `${_TD}/Tiles/tile_70.png`);
loadImg('player', `${_TD}/Survivor%201/survivor1_gun.png`);
loadImg('patrol', `${_TD}/Hitman%201/hitman1_gun.png`);
loadImg('sentry', `${_TD}/Soldier%201/soldier1_gun.png`);
loadImg('hunter', `${_TD}/Robot%201/robot1_gun.png`);
loadImg('alarm',  `${_TD}/Zombie%201/zoimbie1_gun.png`);

function imgReady(key) {
  const im = IMG[key];
  return im && im.complete && im.naturalWidth > 0;
}

// Kenney topdown shooter sprites face RIGHT (east) in source art,
// same as game `dir` (0 = east), so no rotation offset needed.
function drawChar(key, x, y, dir, size) {
  const im = IMG[key];
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(dir);
  ctx.drawImage(im, -size / 2, -size / 2, size, size);
  ctx.restore();
}

function drawFloor() {
  const map  = currentRoom().map;
  const room = currentRoom();

  // Solid dark backdrop (covers everything outside the map too)
  ctx.fillStyle = '#060809';
  ctx.fillRect(0, 0, GW, GH);

  const wallReady = imgReady('wall');

  // Pass 1: floor tiles (procedural — Kenney's pack has no solid floor tile)
  ctx.fillStyle = '#0e1115';
  for (let row = 0; row < MAP_ROWS; row++) {
    for (let col = 0; col < MAP_COLS; col++) {
      if (map[row][col] === 0) {
        ctx.fillRect(col * TILE, row * TILE, TILE, TILE);
      }
    }
  }

  // Pass 2: grout grid
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (let row = 0; row < MAP_ROWS; row++) {
    for (let col = 0; col < MAP_COLS; col++) {
      if (map[row][col] === 0) {
        ctx.strokeRect(col * TILE + 0.5, row * TILE + 0.5, TILE - 1, TILE - 1);
      }
    }
  }

  // Pass 3: walls
  for (let row = 0; row < MAP_ROWS; row++) {
    for (let col = 0; col < MAP_COLS; col++) {
      if (map[row][col] === 1) {
        const x = col * TILE, y = row * TILE;
        if (wallReady) {
          ctx.drawImage(IMG.wall, x, y, TILE, TILE);
        } else {
          ctx.fillStyle = '#242a33';
          ctx.fillRect(x, y, TILE, TILE);
          ctx.strokeStyle = 'rgba(255,255,255,0.08)';
          ctx.lineWidth = 1;
          ctx.strokeRect(x + 0.5, y + 0.5, TILE - 1, TILE - 1);
          // Top edge highlight — procedural-only extrusion cue
          if (row > 0 && map[row - 1][col] === 0) {
            ctx.fillStyle = 'rgba(34,211,238,0.18)';
            ctx.fillRect(x, y, TILE, 2);
          }
        }
      }
    }
  }

  // Pass 4: doorway tiles — render a subtle cyan glow so the player
  // can see where the exits are. These are floor tiles in the map
  // array, we just overdraw them with a tint.
  for (const d of room.doorways) {
    const x = d.x * TILE, y = d.y * TILE;
    ctx.fillStyle = 'rgba(34, 211, 238, 0.12)';
    ctx.fillRect(x, y, TILE, TILE);
    ctx.strokeStyle = 'rgba(34, 211, 238, 0.45)';
    ctx.lineWidth = 2;
    ctx.strokeRect(x + 1, y + 1, TILE - 2, TILE - 2);
  }

  // Pass 5: exit door — pulses green if unlocked (all keys collected),
  // dimmer green if still locked. Drawn over the floor tile so it
  // reads as a door cut into the wall.
  if (room.exit) {
    const unlocked = state.keysCollected >= state.totalKeys;
    const x = room.exit.x * TILE, y = room.exit.y * TILE;
    const t = (Date.now() % 1000) / 1000;
    const pulse = 0.5 + 0.5 * Math.sin(t * Math.PI * 2);
    const baseAlpha = unlocked ? 0.45 + pulse * 0.45 : 0.18;
    const ringAlpha = unlocked ? 0.7  + pulse * 0.3  : 0.4;
    ctx.fillStyle = `rgba(52, 211, 153, ${baseAlpha})`;
    ctx.fillRect(x, y, TILE, TILE);
    ctx.strokeStyle = `rgba(110, 231, 183, ${ringAlpha})`;
    ctx.lineWidth = 3;
    ctx.strokeRect(x + 2, y + 2, TILE - 4, TILE - 4);
    // Small "EXIT" tag above the door, inside the room
    ctx.font = "bold 10px 'Courier New', monospace";
    ctx.textAlign = 'center';
    ctx.fillStyle = unlocked ? 'rgba(110, 231, 183, 0.95)' : 'rgba(110, 231, 183, 0.4)';
    ctx.fillText('EXIT', x + TILE / 2, y - 4);
  }
}

function drawKeys() {
  // Render all uncollected keys in the current room. Pulsing yellow
  // diamonds with a soft glow so they read as "pickup" not "decor".
  const room = currentRoomState();
