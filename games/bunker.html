  const t = (Date.now() % 700) / 700;
  const pulse = 0.6 + 0.4 * Math.sin(t * Math.PI * 2);
  for (const k of room.keys) {
    const p = tileToPx(k.x, k.y);
    // Outer glow
    ctx.globalAlpha = 0.3 * pulse;
    ctx.fillStyle = '#fbbf24';
    ctx.beginPath();
    ctx.arc(p.x, p.y, 16, 0, Math.PI * 2);
    ctx.fill();
    // Diamond body (rotated square)
    ctx.globalAlpha = 1;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(Math.PI / 4);
    ctx.fillStyle = '#fbbf24';
    ctx.fillRect(-7, -7, 14, 14);
    ctx.strokeStyle = '#fde68a';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(-7, -7, 14, 14);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

function drawPickups() {
  // Four pickup types with distinct shapes:
  //   health  = red cross
  //   ammo    = cyan capsule (bullet silhouette)
  //   speed   = yellow double-chevron (>>)
  //   grenade = olive ball with a fuse (11.2)
  // All share the same pulsing-glow pattern so they read as "same
  // category of thing" — a walkable pickup.
  const rs = currentRoomState();
  if (rs.pickups.length === 0) return;
  const t = (Date.now() % 700) / 700;
  const pulse = 0.6 + 0.4 * Math.sin(t * Math.PI * 2);

  for (const pk of rs.pickups) {
    const p = tileToPx(pk.x, pk.y);
    let color;
    if      (pk.type === 'health')  color = '#ef4444';
    else if (pk.type === 'ammo')    color = '#22d3ee';
    else if (pk.type === 'grenade') color = '#84cc16';
    else                            color = '#fbbf24';

    // Shared outer glow
    ctx.globalAlpha = 0.3 * pulse;
    ctx.fillStyle   = color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 16, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.fillStyle = color;
    ctx.strokeStyle = 'rgba(255,255,255,0.85)';
    ctx.lineWidth = 1.5;

    if (pk.type === 'health') {
      // Red plus — two overlapping rects
      ctx.fillRect(-8, -3, 16, 6);
      ctx.fillRect(-3, -8, 6, 16);
      ctx.strokeRect(-8, -3, 16, 6);
      ctx.strokeRect(-3, -8, 6, 16);
    } else if (pk.type === 'ammo') {
      // Cyan capsule, oriented horizontally, nose on the right
      ctx.beginPath();
      ctx.ellipse(0, 0, 10, 5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      // Bullet nose tick
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.fillRect(4, -2, 4, 4);
    } else if (pk.type === 'grenade') {
      // Olive ball + a tiny stick "fuse" on top — reads as grenade
      // without needing the iconic pineapple texture.
      ctx.beginPath();
      ctx.arc(0, 1, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      // Fuse cap
      ctx.fillStyle = 'rgba(120, 53, 15, 0.9)';
      ctx.fillRect(-2, -10, 4, 4);
      // Spark
      ctx.fillStyle = '#fde047';
      ctx.beginPath();
      ctx.arc(0, -11, 1.6, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // Yellow double-chevron pointing right
      ctx.beginPath();
      ctx.moveTo(-8, -7); ctx.lineTo(-2, 0); ctx.lineTo(-8, 7);
      ctx.lineTo(-4, 7);  ctx.lineTo(2,  0); ctx.lineTo(-4, -7);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0,  -7); ctx.lineTo(6, 0); ctx.lineTo(0, 7);
      ctx.lineTo(4,  7);  ctx.lineTo(10, 0); ctx.lineTo(4, -7);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    }
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

function drawGuardCone(g) {
  // Translucent pie slice from the guard's position out to VISION_RANGE.
  // Color depends on state so you can see the AI reacting.
  let col;
  if      (g.phase === 'patrol')      col = 'rgba(251, 191, 36, 0.12)';  // yellow (calm)
  else if (g.phase === 'investigate') col = 'rgba(251, 191, 36, 0.22)';  // yellow (attentive)
  else if (g.phase === 'alert')       col = 'rgba(251, 146, 60, 0.28)';  // amber (investigating player)
  else if (g.phase === 'chase')       col = 'rgba(239, 68, 68, 0.35)';   // red (hostile)
  else                                col = 'rgba(251, 191, 36, 0.22)';  // search — yellow darker
  // Alertness widens the cone — match the visual to the effective
  // vision half-width so players can see "these guys are edgier."
  // Sentry also has its own wider-cone multiplier on top.
  const half = guardVisionHalfForGuard(g);
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.moveTo(g.x, g.y);
  ctx.arc(g.x, g.y, GUARD_VISION_RANGE,
          g.dir - half,
          g.dir + half);
  ctx.closePath();
  ctx.fill();

  // Thin border on the cone edges so the extent is visible
  ctx.strokeStyle = col.replace(/,\s*[\d.]+\)$/, ', 0.5)');
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(g.x, g.y);
  ctx.lineTo(g.x + Math.cos(g.dir - half) * GUARD_VISION_RANGE,
             g.y + Math.sin(g.dir - half) * GUARD_VISION_RANGE);
  ctx.moveTo(g.x, g.y);
  ctx.lineTo(g.x + Math.cos(g.dir + half) * GUARD_VISION_RANGE,
             g.y + Math.sin(g.dir + half) * GUARD_VISION_RANGE);
  ctx.stroke();
}

function drawGuardBody(g) {
  // Sprite per guard type — readability from silhouette/color comes
  // from the sprite. If a sprite isn't ready we fall back to the old
  // shape/color scheme (circle=patrol, square=sentry, triangle=hunter,
  // diamond=alarm).
  const spriteKey = g.type === 'sentry' ? 'sentry'
                  : g.type === 'hunter' ? 'hunter'
                  : g.type === 'alarm'  ? 'alarm'
                                        : 'patrol';
  if (imgReady(spriteKey)) {
    drawChar(spriteKey, g.x, g.y, g.dir, 40);
  } else {
    let bodyColor;
    if      (g.type === 'sentry') bodyColor = '#60a5fa';
    else if (g.type === 'hunter') bodyColor = '#f97316';
    else if (g.type === 'alarm')  bodyColor = '#d946ef';
    else                          bodyColor = '#ef4444';

    ctx.save();
    ctx.translate(g.x, g.y);
    ctx.rotate(g.dir);
    ctx.fillStyle = bodyColor;
    ctx.strokeStyle = 'rgba(0,0,0,0.35)';
    ctx.lineWidth = 1;

    ctx.beginPath();
    if (g.type === 'sentry') {
      const s = GUARD_R;
      ctx.rect(-s, -s, s * 2, s * 2);
    } else if (g.type === 'hunter') {
      ctx.moveTo(GUARD_R + 2, 0);
      ctx.lineTo(-GUARD_R * 0.7, -GUARD_R);
      ctx.lineTo(-GUARD_R * 0.7,  GUARD_R);
      ctx.closePath();
    } else if (g.type === 'alarm') {
      ctx.moveTo(GUARD_R, 0);
      ctx.lineTo(0, -GUARD_R);
      ctx.lineTo(-GUARD_R, 0);
      ctx.lineTo(0,  GUARD_R);
      ctx.closePath();
    } else {
      ctx.arc(0, 0, GUARD_R, 0, Math.PI * 2);
    }
    ctx.fill();
    ctx.stroke();

    // Heading bar (white)
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(GUARD_R - 2, 0);
    ctx.lineTo(GUARD_R + 6, 0);
    ctx.stroke();
    ctx.restore();
  }

  // Small state icon above the guard's head
  let mark = '';
  if      (g.phase === 'alert')       mark = '?';
  else if (g.phase === 'chase')       mark = '!';
  else if (g.phase === 'search')      mark = '…';
  else if (g.phase === 'investigate') mark = '·';
  if (mark) {
    ctx.font      = "bold 16px 'Courier New', monospace";
    ctx.textAlign = 'center';
    ctx.fillStyle = g.phase === 'chase' ? '#ef4444'
                  : g.phase === 'alert' ? '#fb923c'
                                        : '#fbbf24';
    ctx.fillText(mark, g.x, g.y - GUARD_R - 6);
  }
}

function drawGuards() {
  // Draw all cones first (under guard bodies), then bodies on top
  const guards = currentRoomState().guards;
  for (const g of guards) drawGuardCone(g);
  for (const g of guards) drawGuardBody(g);
}

function drawPlayer() {
  const p = state.player;
  // Iframe flicker: skip every other pair of frames during invuln so
  // the player visibly blinks after taking a hit
  if (p.iframes > 0 && Math.floor(p.iframes / 4) % 2 === 0) return;

  // Speed-boost + stealth cloak visual. Pulsing halo underneath, and
  // a translucent body so the player reads as "phased out" to match
  // the invisible-to-cones mechanic.
  const cloaked = p.speedBoostT > 0;
  if (cloaked) {
    const t = (Date.now() % 400) / 400;
    const pulse = 0.5 + 0.5 * Math.sin(t * Math.PI * 2);
    ctx.save();
    ctx.globalAlpha = 0.35 + 0.25 * pulse;
    ctx.fillStyle = '#fbbf24';
    ctx.beginPath();
    ctx.arc(p.x, p.y, PLAYER_R + 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  if (imgReady('player')) {
    const prevAlpha = ctx.globalAlpha;
    if (cloaked) ctx.globalAlpha = 0.55;
    drawChar('player', p.x, p.y, p.dir, 40);
    ctx.globalAlpha = prevAlpha;
  } else {
    ctx.save();
    if (cloaked) ctx.globalAlpha = 0.55;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.dir);

    // Procedural fallback: circle body + cyan heading bar
    ctx.fillStyle = '#e6edf3';
    ctx.beginPath();
    ctx.arc(0, 0, PLAYER_R, 0, Math.PI * 2);
    ctx.fill();

    // Heading indicator — lime when grenade mode is armed so the
    // active weapon reads at a glance.
    ctx.strokeStyle = p.weaponMode === 'grenade' ? '#a3e635' : '#22d3ee';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(PLAYER_R - 2, 0);
    ctx.lineTo(PLAYER_R + 7, 0);
    ctx.stroke();

    ctx.restore();
  }
}

function drawBullets() {
  ctx.fillStyle = '#22d3ee';
  for (const b of currentRoomState().bullets) {
    // Soft glow then bright core
    ctx.globalAlpha = 0.35;
    ctx.beginPath();
    ctx.arc(b.x, b.y, BULLET_R * 2.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.beginPath();
    ctx.arc(b.x, b.y, BULLET_R, 0, Math.PI * 2);
    ctx.fill();
  }
}

// 11.7: find the first guard sitting on the aim ray (within max
// grenade range). Used to pop a "COOK Xs" hint over them so the
// player knows the exact hold time to put a grenade on their head.
// Walls don't filter — grenades lob over them, so the hint should
// work through walls too.
function findGuardOnAimLine(p) {
  const rs = currentRoomState();
  const dx = Math.cos(p.dir), dy = Math.sin(p.dir);
  const maxDist = GRENADE_FUSE * GRENADE_SPEED;
  let best = null;
  let bestAlong = Infinity;
  for (const g of rs.guards) {
    const gdx = g.x - p.x, gdy = g.y - p.y;
    const along = gdx * dx + gdy * dy;          // distance along aim ray
    if (along < PLAYER_R + 4 || along > maxDist) continue;
    const perp = Math.abs(-gdx * dy + gdy * dx); // perpendicular distance
    if (perp > GUARD_R + 6) continue;
    if (along < bestAlong) { best = g; bestAlong = along; }
  }
  return best;
}

// 11.6/11.7: where would the grenade explode if thrown right now?
// Just remaining-fuse * speed in the aim direction. Walls don't
// stop the projection because the grenade lobs over them.
function projectGrenadeImpact(p) {
  const fuseRemaining = p.cooking ? Math.max(1, GRENADE_FUSE - p.cookT) : GRENADE_FUSE;
  const distance = fuseRemaining * GRENADE_SPEED;
  const dx = Math.cos(p.dir), dy = Math.sin(p.dir);
  const startX = p.x + dx * (PLAYER_R + 4);
  const startY = p.y + dy * (PLAYER_R + 4);
  return { x: startX + dx * distance, y: startY + dy * distance };
}

function drawGrenadeAim() {
  // Visible only in grenade mode. Dotted line from player to the
  // projected impact point + blast-radius preview + crosshair so
  // long throws aren't blind. The impact point pulls back toward
  // the player as cook time eats into the fuse — gives the cook
  // visceral spatial feedback.
  const p = state.player;
  if (p.weaponMode !== 'grenade') return;
  const impact = projectGrenadeImpact(p);
  const dx = Math.cos(p.dir), dy = Math.sin(p.dir);

  ctx.save();
  // Dotted aim line
  ctx.strokeStyle = 'rgba(132, 204, 22, 0.6)';
  ctx.setLineDash([4, 6]);
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(p.x + dx * (PLAYER_R + 4), p.y + dy * (PLAYER_R + 4));
  ctx.lineTo(impact.x, impact.y);
  ctx.stroke();
  ctx.setLineDash([]);

  // Blast-radius preview — faint red ring + tinted fill
  ctx.fillStyle   = 'rgba(239, 68, 68, 0.10)';
  ctx.beginPath();
  ctx.arc(impact.x, impact.y, EXPLOSION_RADIUS, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(239, 68, 68, 0.45)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([3, 4]);
  ctx.beginPath();
  ctx.arc(impact.x, impact.y, EXPLOSION_RADIUS, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);

  // Crosshair at the landing point
  const cs = 9;
  ctx.strokeStyle = 'rgba(239, 68, 68, 0.95)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(impact.x - cs, impact.y);  ctx.lineTo(impact.x + cs, impact.y);
  ctx.moveTo(impact.x, impact.y - cs);  ctx.lineTo(impact.x, impact.y + cs);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(impact.x, impact.y, 3, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(239, 68, 68, 0.95)';
  ctx.fill();

  // 11.7: if there's a guard on the aim ray, pop a "COOK Xs" badge
  // over them so the player knows the exact cook time for an on-
  // target detonation. Compares to current cookT so the badge
  // says "0.0s" the moment you've cooked enough to land it on them.
  const target = findGuardOnAimLine(p);
  if (target) {
    const distToTarget = Math.hypot(target.x - p.x, target.y - p.y);
    const fuseToHit    = Math.ceil(distToTarget / GRENADE_SPEED);
    const cookFramesNeeded = Math.max(0, GRENADE_FUSE - fuseToHit - p.cookT);
    const secondsNeeded    = (cookFramesNeeded / 60).toFixed(1);

    // Yellow ring around the target so it's obvious which guard
    // the badge refers to
    ctx.strokeStyle = 'rgba(253, 224, 71, 0.9)';
    ctx.lineWidth = 2;
    ctx.setLineDash([3, 3]);
    ctx.beginPath();
    ctx.arc(target.x, target.y, GUARD_R + 5, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);

    // Badge text above the target. Background plate for legibility.
    const label    = cookFramesNeeded === 0 ? 'THROW NOW' : `COOK ${secondsNeeded}s`;
    const badgeY   = target.y - GUARD_R - 14;
    ctx.font       = "bold 11px 'Courier New', monospace";
    ctx.textAlign  = 'center';
    const labelW   = ctx.measureText(label).width + 10;
    ctx.fillStyle  = 'rgba(0, 0, 0, 0.78)';
    ctx.fillRect(target.x - labelW / 2, badgeY - 10, labelW, 14);
    ctx.fillStyle  = cookFramesNeeded === 0 ? '#34d399' : '#fde047';
    ctx.fillText(label, target.x, badgeY);
  }
  ctx.restore();
}

function drawCookTimer() {
  // Above-head fuse readout while cooking. Seconds-remaining as
  // text plus a pulsing red ring in the last quarter of the fuse so
  // the "release NOW" beat is visceral.
  const p = state.player;
  if (!p.cooking) return;
  const remaining = Math.max(0, GRENADE_FUSE - p.cookT);
  const seconds   = (remaining / 60).toFixed(1);
  const frac      = remaining / GRENADE_FUSE;
  const col = frac > 0.5  ? '#fde047'   // yellow (plenty of time)
            : frac > 0.25 ? '#fb923c'   // orange (cook deeper)
                          : '#ef4444';  // red (release or eat it)
  ctx.save();
  ctx.font         = "bold 18px 'Courier New', monospace";
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'alphabetic';
  // Soft shadow so the digits stay legible over any tile color
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillText(seconds, p.x + 1, p.y - 26 + 1);
  ctx.fillStyle = col;
  ctx.fillText(seconds, p.x, p.y - 26);
  // Final-quarter danger ring around the player
  if (frac < 0.3) {
    const pulse = 0.45 + 0.55 * Math.sin(Date.now() / 50);
    ctx.strokeStyle = `rgba(239, 68, 68, ${pulse})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(p.x, p.y, PLAYER_R + 7, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.restore();
}

function drawGrenades() {
  // Olive-green ball with a small dark crosshatch — distinct from
  // the cyan bullets so a thrown grenade reads at a glance.
  for (const gn of currentRoomState().grenades) {
    ctx.fillStyle = '#65a30d';
    ctx.beginPath();
    ctx.arc(gn.x, gn.y, GRENADE_RADIUS, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(20, 30, 10, 0.85)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(gn.x - GRENADE_RADIUS * 0.6, gn.y);
    ctx.lineTo(gn.x + GRENADE_RADIUS * 0.6, gn.y);
    ctx.moveTo(gn.x, gn.y - GRENADE_RADIUS * 0.6);
    ctx.lineTo(gn.x, gn.y + GRENADE_RADIUS * 0.6);
    ctx.stroke();
  }
}

function drawExplosions() {
  // Two-stage radial flash: bright white-yellow core out to ~30%
  // of life, fading orange ring out to full radius. Alpha drops
  // off over the explosion's lifetime.
  for (const ex of currentRoomState().explosions) {
    const t = ex.t / EXPLOSION_FRAMES;     // 0..1 progress
    const r = EXPLOSION_RADIUS * Math.min(1, t * 2.2);
    const a = 1 - t;
    ctx.save();
    // Outer ring (orange)
    ctx.globalAlpha = 0.55 * a;
    ctx.fillStyle = '#fb923c';
    ctx.beginPath();
    ctx.arc(ex.x, ex.y, r, 0, Math.PI * 2);
    ctx.fill();
    // Inner core (hot yellow-white)
    ctx.globalAlpha = 0.85 * a;
    ctx.fillStyle = '#fef3c7';
    ctx.beginPath();
    ctx.arc(ex.x, ex.y, r * 0.55, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// Count guards across every room in the level (for HUD + endgame).
function totalGuardsLeft() {
  let n = 0;
  for (const id in state.rooms) n += state.rooms[id].guards.length;
  return n;
}

function drawHUD() {
  // Build label + current room ID. Phase comes from BUILD_LABEL so
  // the topbar and this HUD corner stay in lockstep.
  ctx.font      = "11px 'Courier New', monospace";
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.textAlign = 'left';
  ctx.fillText(`PHASE ${BUILD_LABEL} · ROOM  [${state.currentRoomId}]`, 14, 22);

  // Control hints
  ctx.textAlign = 'right';
  if (pad.connected) {
    ctx.fillText('STICKS  MOVE/AIM  ·  RT  FIRE  ·  B  GRENADE', GW - 14, 22);
  } else if (touchMode) {
    ctx.fillText('STICK  MOVE  ·  FIRE  SHOOT', GW - 14, 22);
  } else {
    ctx.fillText('WASD  MOVE  ·  SPACE  FIRE  ·  G  GRENADE', GW - 14, 22);
  }

  // HP indicator (bottom-left): "HP" label + actual heart shapes so
  // it reads as health, not as a lives counter. Filled red for
  // remaining, hollow red for lost.
  const p = state.player;
  ctx.font      = "bold 12px 'Courier New', monospace";
  ctx.textAlign = 'left';
  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  const hpLabelY = GH - 18;
  ctx.fillText('HP', 14, hpLabelY);

  const heartStartX = 42;
  const heartY      = GH - 28;
  const heartSize   = 11;
  const heartGap    = 22;
  for (let i = 0; i < PLAYER_HP_MAX; i++) {
    const hx = heartStartX + i * heartGap;
    const filled = i < p.hp;
    // Heart path: two top lobes that meet in a dip at the top-center,
    // tapering to a V at the bottom. Coords relative to (hx, heartY).
    const s = heartSize;
    ctx.beginPath();
    ctx.moveTo(hx, heartY + s * 0.15);
    ctx.bezierCurveTo(
      hx, heartY - s * 0.35,
      hx - s * 1.05, heartY - s * 0.35,
      hx - s * 1.05, heartY + s * 0.15
    );
    ctx.bezierCurveTo(
      hx - s * 1.05, heartY + s * 0.55,
      hx - s * 0.5, heartY + s * 0.75,
      hx, heartY + s * 1.1
    );
    ctx.bezierCurveTo(
      hx + s * 0.5, heartY + s * 0.75,
      hx + s * 1.05, heartY + s * 0.55,
      hx + s * 1.05, heartY + s * 0.15
    );
    ctx.bezierCurveTo(
      hx + s * 1.05, heartY - s * 0.35,
      hx, heartY - s * 0.35,
      hx, heartY + s * 0.15
    );
    ctx.closePath();
    if (filled) {
      ctx.fillStyle = '#ef4444';
      ctx.fill();
      ctx.strokeStyle = '#7f1d1d';
      ctx.lineWidth = 1;
      ctx.stroke();
    } else {
      ctx.strokeStyle = 'rgba(239, 68, 68, 0.4)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  }

  // Key counter (bottom-left, above the HP hearts)
  const allKeys = state.keysCollected >= state.totalKeys;
  ctx.font      = "bold 14px 'Courier New', monospace";
  ctx.textAlign = 'left';
  ctx.fillStyle = allKeys ? '#fbbf24' : 'rgba(255,255,255,0.7)';
  ctx.fillText(`KEYS  ${state.keysCollected}/${state.totalKeys}`, 14, GH - 50);

  // Ammo counter (bottom-right, above guard count).
  // Cyan when comfortable, amber at low, red at empty.
  const pl = state.player;
  let ammoColor;
  if      (pl.ammo === 0)   ammoColor = '#ef4444';
  else if (pl.ammo <= 3)    ammoColor = '#fb923c';
  else                      ammoColor = '#22d3ee';
  ctx.textAlign = 'right';
  ctx.fillStyle = ammoColor;
  ctx.font      = "bold 14px 'Courier New', monospace";
  ctx.fillText(`AMMO  ${pl.ammo}`, GW - 14, GH - 42);

  // Grenade counter (11.2). Shown above AMMO. Olive when stowed,
  // bright lime when armed (weapon mode = grenade) so the active
  // weapon is unambiguous at a glance.
  const grArmed = pl.weaponMode === 'grenade';
  const grColor = pl.grenades === 0 ? 'rgba(255,255,255,0.35)'
                  : grArmed         ? '#a3e635'
                                    : '#84cc16';
  ctx.fillStyle = grColor;
  ctx.font      = "bold 14px 'Courier New', monospace";
  ctx.fillText(`GRN  ${pl.grenades}${grArmed ? '  •ARMED' : ''}`, GW - 14, GH - 66);

  // Stealth+speed indicator: shows only while active, above grenade
  // count. Matches the cloak mechanic — while it's up you're
  // invisible to guard cones and moving at 1.5x speed.
  if (pl.speedBoostT > 0) {
    const secsLeft = Math.ceil(pl.speedBoostT / 60);
    ctx.fillStyle = '#fbbf24';
    ctx.font      = "bold 12px 'Courier New', monospace";
    ctx.fillText(`STEALTH x${SPEED_BOOST_MULT}  ${secsLeft}s`, GW - 14, GH - 88);
  }

  // Remaining-guards count across the whole level (bottom-right)
  ctx.textAlign = 'right';
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = "12px 'Courier New', monospace";
  ctx.fillText(`GUARDS  ${totalGuardsLeft()}`, GW - 14, GH - 16);
}

// ── Phase 6 overlays ────────────────────────────────────────────

function drawNeedKeys() {
  // Floating "NEED N KEYS" text above the player. Used when player
  // walks into a locked exit. Fades over the duration.
  if (state.needKeysT <= 0) return;
  const remaining = state.totalKeys - state.keysCollected;
  const a = Math.min(1, state.needKeysT / 30);   // fade out over last 30 frames
  const p = state.player;
  ctx.font      = "bold 14px 'Courier New', monospace";
  ctx.textAlign = 'center';
  ctx.fillStyle = `rgba(252, 165, 165, ${a})`;
  ctx.fillText(`NEED ${remaining} KEY${remaining === 1 ? '' : 'S'}`, p.x, p.y - 28);
}

function drawAlertness() {
  // Thin horizontal bar, top-center under the timer. Dimmed when
  // alertness is 0 so HUD stays clean during calm play.
  const v = state.alertness;
  const frac = Math.min(1, Math.max(0, v / ALERTNESS_MAX));
  const barW = 200, barH = 8;
  const x = (GW - barW) / 2;
  const y = 48;

  // Label
  ctx.font      = "9px 'Courier News', 'Courier New', monospace";
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillStyle = v > 0 ? 'rgba(255,255,255,0.65)' : 'rgba(255,255,255,0.25)';
  ctx.fillText('ALERT', GW / 2, y - 4);

  // Background track
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.fillRect(x, y, barW, barH);

  // Filled portion — color shifts with level
  let col;
  if      (frac >= 0.9)  col = '#ef4444';   // red  (alarm-threshold territory)
  else if (frac >= 0.6)  col = '#fb923c';   // orange (alert)
  else if (frac >= 0.3)  col = '#fbbf24';   // yellow (warned)
  else                   col = '#34d399';   // green (calm)
  ctx.fillStyle = col;
  ctx.fillRect(x, y, barW * frac, barH);

  // Border
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 1;
  ctx.strokeRect(x + 0.5, y + 0.5, barW - 1, barH - 1);
}

function drawTimer() {
  // Top-center big mono readout: M:SS. White normally, yellow under
  // 60s, red under 30s, flashing under 10s. Dim before it's started.
  const f = Math.max(0, state.timerFrames);
  const totalSec = Math.ceil(f / 60);
  const mm = Math.floor(totalSec / 60);
  const ss = totalSec % 60;
  const text = `${mm}:${ss.toString().padStart(2, '0')}`;

  let color, alpha = 1;
  if      (f <= TIMER_FLASH_FRAMES)  {
    color = '#ef4444';
    // 6 Hz flash — only while actively counting
    if (state.timerStarted) alpha = 0.4 + 0.6 * (Math.sin(Date.now() / 60) * 0.5 + 0.5);
  } else if (f <= TIMER_RED_FRAMES)    color = '#ef4444';
  else if   (f <= TIMER_YELLOW_FRAMES) color = '#fbbf24';
  else                                 color = '#e6edf3';
  if (!state.timerStarted) alpha = 0.55;

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.font = "bold 30px 'JetBrains Mono', 'Courier New', monospace";
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  // Soft shadow for legibility over any tile color
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillText(text, GW / 2 + 2, 10 + 2);
  ctx.fillStyle = color;
  ctx.fillText(text, GW / 2, 10);
  ctx.restore();
  ctx.textBaseline = 'alphabetic';
}

function drawTimesUp() {
  const fade = Math.min(1, state.timesUpT / 30);
  ctx.fillStyle = `rgba(88, 12, 12, ${0.82 * fade})`;
  ctx.fillRect(0, 0, GW, GH);

  const t = (Date.now() % 1000) / 1000;
  const pulse = 0.6 + 0.4 * Math.sin(t * Math.PI * 2);

  ctx.save();
  ctx.globalAlpha = fade;
  ctx.font = "bold 52px 'Courier New', monospace";
  ctx.textAlign = 'center';
  // Red halo behind the main text
  ctx.fillStyle = `rgba(239, 68, 68, ${0.3 * pulse})`;
  ctx.fillText("TIME'S  UP", GW / 2 + 2, GH / 2 - 28);
  ctx.fillStyle = '#fecaca';
  ctx.fillText("TIME'S  UP", GW / 2,     GH / 2 - 30);
  ctx.restore();

  if (fade >= 1) {
    ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
    if      (pad.connected) drawCenteredText('PRESS  START  TO  TRY  AGAIN',  GH / 2 + 24, 14);
    else if (touchMode)     drawCenteredText('TAP  ANYWHERE  TO  TRY  AGAIN', GH / 2 + 24, 14);
    else                    drawCenteredText('PRESS  ENTER  TO  TRY  AGAIN',  GH / 2 + 24, 14);
  }
}

function drawMinimap() {
  // Top-right corner, inside its own dark panel. Renders the current
  // level's rooms as a chain of small squares. Visited rooms filled,
  // unvisited outlined, current room gets a bright cyan border.
  // All levels so far use a linear A→B→C… chain, so drawing rooms in
  // definition order with adjacent connection lines is correct.
  const ids = Object.keys(currentLevel().rooms);
  const cellW = 28, cellH = 22, gap = 8;
  const roomsW = ids.length * cellW + (ids.length - 1) * gap;
  const padX   = 12, padY = 8;
  const titleH = 14;
  // Phase 11: title row now carries "LEVEL N/M" on the left plus the
  // keys count on the right. Enforce a minimum width so the two don't
  // overlap on a 3-room level where the cells alone don't make the
  // panel wide enough.
  const MIN_TITLE_PANEL_W = 160;
  const panelW = Math.max(roomsW + padX * 2, MIN_TITLE_PANEL_W);
  const panelH = titleH + cellH + padY * 2;
  const panelX = GW - panelW - 12;
  const panelY = 10;

  // Panel background
  ctx.fillStyle = 'rgba(10, 14, 20, 0.78)';
  ctx.fillRect(panelX, panelY, panelW, panelH);
  ctx.strokeStyle = 'rgba(34, 211, 238, 0.35)';
  ctx.lineWidth = 1;
  ctx.strokeRect(panelX + 0.5, panelY + 0.5, panelW - 1, panelH - 1);

  // Title
  ctx.font      = "bold 9px 'Courier New', monospace";
  ctx.textAlign = 'left';
  ctx.fillStyle = 'rgba(34, 211, 238, 0.85)';
  ctx.fillText(`LEVEL ${state.levelIndex + 1}/${LEVELS.length}`,
               panelX + padX, panelY + padY + 9);

  // Key progress — small digit count on the right of the title row
  ctx.textAlign = 'right';
  ctx.fillStyle = 'rgba(255, 255, 255, 0.55)';
  ctx.fillText(`${state.keysCollected}/${state.totalKeys}  KEYS`,
               panelX + panelW - padX, panelY + padY + 9);

  // Room cells
  const roomsX = panelX + padX;
  const roomsY = panelY + padY + titleH;
  for (let i = 0; i < ids.length; i++) {
    const id = ids[i];
    const x  = roomsX + i * (cellW + gap);
    const visited = !!state.visitedRooms[id];
    const current = id === state.currentRoomId;
    if (visited) {
      ctx.fillStyle = current ? 'rgba(34, 211, 238, 0.35)'
                              : 'rgba(255, 255, 255, 0.18)';
      ctx.fillRect(x, roomsY, cellW, cellH);
    }
    ctx.strokeStyle = current ? '#22d3ee'
                    : visited ? 'rgba(255,255,255,0.55)'
                              : 'rgba(255,255,255,0.22)';
    ctx.lineWidth = current ? 2 : 1;
    ctx.strokeRect(x + 0.5, roomsY + 0.5, cellW - 1, cellH - 1);
    // Room id letter inside the cell
    ctx.font      = "bold 10px 'Courier New', monospace";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = current ? '#22d3ee'
                  : visited ? 'rgba(255,255,255,0.65)'
                            : 'rgba(255,255,255,0.25)';
    ctx.fillText(id, x + cellW / 2, roomsY + cellH / 2 + 1);

    // Phase 12: adaptive minimap detail tiers.
    //   tier 0 (skill ≥ 0.75) — layout only (above is enough)
    //   tier 1 (skill ≥ 0.40) — yellow dot when this room still has keys
    //   tier 2 (skill <  0.40) — also red dots for live guards in
    //                           visited rooms
    const tier = directorState ? directorState.minimapTier : 1;
    const rs   = state.rooms[id];
    if (tier >= 1 && rs && rs.keys && rs.keys.length > 0) {
      ctx.fillStyle = '#fde047';
      ctx.beginPath();
      ctx.arc(x + 4, roomsY + 4, 1.8, 0, Math.PI * 2);
      ctx.fill();
    }
    if (tier >= 2 && visited && rs && rs.guards) {
      ctx.fillStyle = '#ef4444';
      for (const g of rs.guards) {
        if (!g.dead) {
          ctx.beginPath();
          ctx.arc(x + cellW - 4, roomsY + cellH - 4, 1.6, 0, Math.PI * 2);
          ctx.fill();
          break;   // single dot per room is enough — count isn't the point
        }
      }
    }
  }
  ctx.textBaseline = 'alphabetic';

  // Connection lines between adjacent rooms
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 1;
  for (let i = 0; i < ids.length - 1; i++) {
    const x1 = roomsX + i * (cellW + gap) + cellW;
    const x2 = x1 + gap;
    const y  = roomsY + cellH / 2;
    ctx.beginPath();
    ctx.moveTo(x1, y);
    ctx.lineTo(x2, y);
    ctx.stroke();
  }
}

function drawPaused() {
  // Dim the play field and show a big "PAUSED" title + the input
  // hint that actually matches the active device.
  ctx.fillStyle = 'rgba(6, 10, 18, 0.72)';
  ctx.fillRect(0, 0, GW, GH);

  ctx.save();
  ctx.font         = "bold 56px 'Courier New', monospace";
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'alphabetic';
  // Soft cyan halo so it pops off any tile color underneath
  ctx.fillStyle = 'rgba(34, 211, 238, 0.25)';
  ctx.fillText('PAUSED', GW / 2 + 2, GH / 2 - 6);
  ctx.fillStyle = '#22d3ee';
  ctx.fillText('PAUSED', GW / 2, GH / 2 - 8);
  ctx.restore();

  ctx.fillStyle = 'rgba(230,237,243,0.75)';
  if      (pad.connected) drawCenteredText('PRESS  START  TO  RESUME', GH / 2 + 32, 14);
  else if (touchMode)     drawCenteredText('PAUSED',                   GH / 2 + 32, 14);
  else                    drawCenteredText('PRESS  ESC  OR  P  TO  RESUME', GH / 2 + 32, 14);
}

function drawLevelComplete() {
  // Between-level card: dark cyan wash + "LEVEL N CLEAR" title and
  // the next level's name below. Fades in over the first 20 frames,
  // holds, fades out over the last 20. advanceLevel() fires at
  // LEVEL_COMPLETE_FRAMES so this overlay dismisses itself naturally
  // when state resets to the next level.
  const t    = state.levelCompleteT;
  const T    = LEVEL_COMPLETE_FRAMES;
  const fadeIn  = Math.min(1, t / 20);
  const fadeOut = Math.min(1, (T - t) / 20);
  const fade = Math.min(fadeIn, fadeOut);

  ctx.fillStyle = `rgba(8, 47, 73, ${0.78 * fade})`;
  ctx.fillRect(0, 0, GW, GH);

  ctx.save();
  ctx.globalAlpha = fade;

  // Main title
  ctx.font      = "bold 44px 'Courier New', monospace";
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(34, 211, 238, 0.25)';   // soft cyan halo
  ctx.fillText(`LEVEL ${state.levelIndex + 1} CLEAR`, GW / 2 + 2, GH / 2 - 18);
  ctx.fillStyle = '#22d3ee';
  ctx.fillText(`LEVEL ${state.levelIndex + 1} CLEAR`, GW / 2, GH / 2 - 20);

  // Sub line: the next level's name so the player knows what's coming
  const nextDef = LEVELS[state.levelIndex + 1];
  if (nextDef) {
    ctx.font      = "bold 16px 'Courier New', monospace";
    ctx.fillStyle = 'rgba(230,237,243,0.85)';
    ctx.fillText(`NEXT:  ${nextDef.name}`, GW / 2, GH / 2 + 14);
  }

  // Phase 12: show how the director read the run, and which way the
  // next level is being tuned. Useful while playtesting; the label
  // is a single word so it doesn't drown out the level title.
  const score = currentSkillScore();
  const label = score >= 0.75 ? 'HARDER'
              : score >= 0.40 ? 'STEADY'
              :                 'EASIER';
  const col   = score >= 0.75 ? 'rgba(239, 68, 68, 0.85)'
              : score >= 0.40 ? 'rgba(230,237,243,0.55)'
              :                 'rgba(163,230,53,0.85)';
  ctx.font      = "bold 11px 'Courier New', monospace";
  ctx.fillStyle = col;
  ctx.fillText(`DIRECTOR:  ${label}`, GW / 2, GH / 2 + 38);

  ctx.restore();
}

function drawWin() {
  // Celebratory escape overlay. Green-tinted background, gold text,
  // fades in over first 30 frames like gameover but brighter palette.
  const fade = Math.min(1, state.wonT / 30);
  ctx.fillStyle = `rgba(6, 78, 59, ${0.78 * fade})`;
  ctx.fillRect(0, 0, GW, GH);

  // Title with subtle pulsing glow
  const t = (Date.now() % 1400) / 1400;
  const pulse = 0.5 + 0.5 * Math.sin(t * Math.PI * 2);

  ctx.save();
  ctx.globalAlpha = fade;
  ctx.font      = "bold 56px 'Courier New', monospace";
  ctx.textAlign = 'center';
  // Gold glow halo
  ctx.fillStyle = `rgba(251, 191, 36, ${0.25 * pulse})`;
  ctx.fillText('YOU  ESCAPED', GW / 2 + 1, GH / 2 - 28);
  // Main text
  ctx.fillStyle = '#fbbf24';
  ctx.fillText('YOU  ESCAPED', GW / 2, GH / 2 - 30);
  ctx.restore();

  if (totalGuardsLeft() === 0) {
    ctx.fillStyle = `rgba(110, 231, 183, ${fade})`;
    drawCenteredText('AND  EVERY  GUARD  DOWN', GH / 2 + 14, 14, fade);
  } else {
    ctx.fillStyle = `rgba(255,255,255,0.6)`;
    drawCenteredText(`KEYS  ${state.keysCollected}/${state.totalKeys}  ·  GUARDS  LEFT  ${totalGuardsLeft()}`,
                     GH / 2 + 14, 12, fade);
  }

  if (fade >= 1) {
    ctx.fillStyle = 'rgba(230,237,243,0.85)';
    if      (pad.connected) drawCenteredText('PRESS  START  TO  PLAY  AGAIN', GH / 2 + 56, 14);
    else if (touchMode)     drawCenteredText('TAP  ANYWHERE  TO  PLAY  AGAIN', GH / 2 + 56, 14);
    else                    drawCenteredText('PRESS  ENTER  TO  PLAY  AGAIN', GH / 2 + 56, 14);
  }
}

function drawCenteredText(text, y, size, alpha) {
  ctx.globalAlpha = alpha === undefined ? 1 : alpha;
  ctx.font = `bold ${size}px 'Courier New', monospace`;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#e6edf3';
  ctx.fillText(text, GW / 2, y);
  ctx.globalAlpha = 1;
}

function drawGameOver() {
  // Fade-in over the first 30 frames after death
  const fade = Math.min(1, state.gameoverT / 30);
  ctx.fillStyle = `rgba(0,0,0,${0.65 * fade})`;
  ctx.fillRect(0, 0, GW, GH);
  drawCenteredText('GAME  OVER', GH / 2 - 30, 38, fade);
  if (totalGuardsLeft() === 0) {
    // Edge case: you killed every guard in the level then died
    ctx.fillStyle = '#22d3ee';
    drawCenteredText('ALL  GUARDS  DOWN', GH / 2 + 6, 14, fade);
  }
  // Restart prompt appears after fade completes
  if (fade >= 1) {
    ctx.fillStyle = 'rgba(230,237,243,0.7)';
    if (pad.connected)      drawCenteredText('PRESS  START  TO  RESTART',  GH / 2 + 40, 14);
    else if (touchMode)     drawCenteredText('TAP  ANYWHERE  TO  RESTART', GH / 2 + 40, 14);
    else                    drawCenteredText('PRESS  ENTER  TO  RESTART',  GH / 2 + 40, 14);
  }
}

function drawTransition() {
  // Black overlay whose alpha ramps up during 'out' and down during
  // 'in'. The room switch happens at peak opacity so the player
  // never sees the swap.
  const tr = state.transition;
  let a;
  if (tr.phase === 'out') a = tr.t / TRANSITION_OUT_FRAMES;
  else                    a = 1 - (tr.t / TRANSITION_IN_FRAMES);
  a = Math.max(0, Math.min(1, a));
  ctx.fillStyle = `rgba(0, 0, 0, ${a})`;
  ctx.fillRect(0, 0, GW, GH);
}

function draw() {
  drawFloor();
  drawKeys();
  drawPickups();
  drawGuards();
  drawBullets();
  drawGrenades();
  drawGrenadeAim();   // 11.6: landing reticle while in grenade mode
  drawPlayer();
  drawCookTimer();    // 11.5: fuse digits over the player while cooking
  drawExplosions();   // on top of player so the flash visually wins
  drawNeedKeys();
  drawHUD();
  drawTimer();
  drawAlertness();
  drawMinimap();
  if (state.gameover)      drawGameOver();
  if (state.won)           drawWin();
  if (state.timesUp)       drawTimesUp();
  if (state.levelComplete) drawLevelComplete();
  if (state.transition)    drawTransition();
  // Paused last so it sits on top of everything (except nothing
  // overlaps — canTogglePause forbids pausing during the others).
  if (state.paused)        drawPaused();
}

// ================================================================
// FPS counter — diagnostic overlay (Phase 11)
// ----------------------------------------------------------------
// Rolling average of the last ~60 frame deltas, drawn top-left so
// we can see whether the game is actually hitting 60fps on tablets
// vs desktop. Green ≥55, yellow 40-54, red <40. Remove once we've
// picked a movement-rate strategy.
// ================================================================
let fpsLastT = (typeof performance !== 'undefined' ? performance.now() : Date.now());
const fpsSamples = [];
const FPS_SAMPLE_MAX = 60;
function sampleFps() {
  const now = performance.now();
  const dt  = now - fpsLastT;
  fpsLastT  = now;
  fpsSamples.push(dt);
  if (fpsSamples.length > FPS_SAMPLE_MAX) fpsSamples.shift();
}
function currentFps() {
  if (fpsSamples.length === 0) return 60;
  let sum = 0;
  for (const d of fpsSamples) sum += d;
  const avg = sum / fpsSamples.length;
  return avg > 0 ? Math.round(1000 / avg) : 60;
}
function drawFps() {
  const fps = currentFps();
  const col = fps >= 55 ? '#34d399' : fps >= 40 ? '#fbbf24' : '#ef4444';
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(4, 4, 62, 18);
  ctx.font         = "bold 11px 'Courier New', monospace";
  ctx.textAlign    = 'left';
  ctx.textBaseline = 'top';
  ctx.fillStyle    = col;
  ctx.fillText(`FPS ${fps}`, 10, 7);
  ctx.restore();
}

// ================================================================
// LOOP
// ================================================================

// Sync touch button visual state to game state (e.g. NADE greyed when
// out of grenades). Called every frame; cheap class toggle.
const nadeBtnEl = document.getElementById('btn-nade');
function syncTouchUi() {
  if (!nadeBtnEl || !state) return;
  const empty = state.player.grenades <= 0;
  nadeBtnEl.classList.toggle('empty', empty);
}

function loop() {
  sampleFps();
  pollGamepad();
  update();
  draw();
  drawFps();
  syncTouchUi();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
