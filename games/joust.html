//── Helpers ──────────────────────────────────────────────────────────────────
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function birdBox(b) {
  return { x: b.x, y: b.y, w: BIRD_W, h: BIRD_H };
}
// Tighter body box used for joust (bird-vs-bird) collisions only.
// Excludes the lance tip (one side) and tail feathers (other side).
// Birds must actually be body-to-body close to trigger a joust.
function birdJoustBox(b) {
  return {
    x: b.x + BIRD_JOUST_INSET_X,
    y: b.y,
    w: BIRD_W - BIRD_JOUST_INSET_X * 2,
    h: BIRD_H,
  };
}
function lanceY(b) {
  return b.y + LANCE_OFFSET_Y;
}
function rectOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function updateLivesHUD() {
  hudLives.innerHTML = '';
  for (let i = 0; i < lives; i++) {
    const span = document.createElement('span');
    span.className = 'life-icon';
    span.innerHTML = `<svg viewBox="0 0 12 12" width="12" height="12"><circle cx="6" cy="6" r="5" fill="#ffdb4a"/></svg>`;
    hudLives.appendChild(span);
  }
}

// Resolve horizontal collisions for a bird against all platforms.
// Call AFTER updating b.x with vx * dt. Pushes the bird back out the
// side it came from.
// Returns true if a side-bump happened (for sound triggering by caller)
function resolveHorizontalPlatformCollisions(b) {
  const allP = getAllPlatforms();
  let bumped = false;
  for (const p of allP) {
    const bb = birdBox(b);
    const pb = { x: p.x, y: p.y, w: p.w, h: PLATFORM_THICKNESS };
    if (rectOverlap(bb, pb)) {
      if (b.vx > 0)       b.x = p.x - BIRD_W;       // moving right → hit left side
      else if (b.vx < 0)  b.x = p.x + p.w;          // moving left  → hit right side
      if (Math.abs(b.vx) > 30) bumped = true;       // ignore tiny grazes
      b.vx = 0;
    }
  }
  return bumped;
}

// Returns { onGround, bumpedHead } so caller can play sounds appropriately.
// bumpedHead = bird's head hit the underside of a platform during ascent.
function resolveVerticalPlatformCollisions(b) {
  let onGround = false;
  let bumpedHead = false;
  const allP = getAllPlatforms();
  for (const p of allP) {
    const bb = birdBox(b);
    const pb = { x: p.x, y: p.y, w: p.w, h: PLATFORM_THICKNESS };
    if (rectOverlap(bb, pb)) {
      if (b.vy > 0) {
        // Falling → land on top
        b.y = p.y - BIRD_H;
        b.vy = 0;
        onGround = true;
      } else if (b.vy < 0) {
        // Flapping up into the bottom → bonk
        b.y = p.y + PLATFORM_THICKNESS;
        if (b.vy < -60) bumpedHead = true;     // only count real bonks
        b.vy = 0;
      }
    }
  }
  return { onGround, bumpedHead };
}

//── Particles (for materialize / spawn effect) ───────────────────────────────
const particles = [];
function spawnMaterializeParticles(x, y) {
  for (let i = 0; i < 18; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 40 + Math.random() * 80;
    particles.push({
      x: x + BIRD_W / 2, y: y + BIRD_H / 2,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 30,  // bias upward
      life: 0.6, maxLife: 0.6,
      color: '255, 219, 74',  // yellow (Joust signature)
      size: 3,
    });
  }
}

// Knight disintegration burst — the rider "pixel-bangs" into sparkle stars
// when the player dies. Bird flies off separately as a riderless entity.
function spawnKnightBurst(x, y) {
  // Big radial burst of bright sparkles from the saddle position
  for (let i = 0; i < 28; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 70 + Math.random() * 140;
    // Alternate cool-white and silver-blue for "armor pixels"
    const isCool = Math.random() < 0.5;
    particles.push({
      x: x + BIRD_W / 2, y: y + BIRD_H * 0.4,  // saddle area, not bird body
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 40,  // bias upward more
      life: 0.9, maxLife: 0.9,
      color: isCool ? '230, 240, 255' : '180, 210, 255',
      size: 4,
    });
  }
  // A few brighter "star" particles for emphasis
  for (let i = 0; i < 6; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 50 + Math.random() * 80;
    particles.push({
      x: x + BIRD_W / 2, y: y + BIRD_H * 0.4,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 50,
      life: 1.1, maxLife: 1.1,
      color: '255, 255, 255',
      size: 5,
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 0.94;
    p.vy *= 0.94;
  }
}
function drawParticles() {
  for (const p of particles) {
    const t = p.life / p.maxLife;
    const color = p.color || '255, 219, 74';
    const size = p.size || 3;
    ctx.fillStyle = `rgba(${color}, ${t})`;
    ctx.fillRect(p.x - size / 2, p.y - size / 2, size, size);
  }
}

// Riderless birds — when player dies, the ostrich (now empty) flies off on its
// own. Tracks position, velocity, gravity-fighting flap, and a despawn check.
const riderlessBirds = [];

function spawnRiderlessBird(x, y, vx, vy, facingLeft) {
  riderlessBirds.push({
    x: x, y: y,
    // Inherit the player's velocity but give it an upward kick — bird is
    // panicking and escapes after the rider vanishes.
    vx: vx * 0.8 + (facingLeft ? -40 : 40),
    vy: vy - 120,
    facingLeft: facingLeft,
    flapTimer: 0,
    flapAnimTime: 0,
    onGround: false,
    isSkidding: false,
    life: 4.0,  // safety despawn after 4 seconds
  });
}

function updateRiderlessBirds(dt) {
  for (let i = riderlessBirds.length - 1; i >= 0; i--) {
    const b = riderlessBirds[i];
    b.life -= dt;
    // Auto-flap every ~0.4s to stay aloft (panic flapping)
    b.flapTimer -= dt;
    b.flapAnimTime += dt;
    if (b.flapTimer <= 0) {
      b.vy = Math.max(-180, b.vy - 110);  // upward thrust
      b.flapTimer = 0.35 + Math.random() * 0.15;
    }
    // Gravity
    b.vy += GRAVITY * dt;
    b.vy = Math.min(b.vy, TERMINAL_VY);
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    // Despawn when offscreen or timed out
    if (b.life <= 0 || b.x < -BIRD_W - 40 || b.x > W + 40 || b.y > H + 40) {
      riderlessBirds.splice(i, 1);
    }
  }
}

function drawRiderlessBirds() {
  for (const b of riderlessBirds) {
    // Use the regular fly sprites — without a brake variant.
    // If you make riderlessOstrichFly sprites later, swap them in here.
    drawBird(b, sprites.ostrich, sprites.ostrichMove, sprites.ostrichFly, sprites.ostrichFly2, null);
  }
}

//── Game flow ────────────────────────────────────────────────────────────────
function startGame() {
  state = 'PLAYING';
  paused = false;
  score = 0;
  wave = 1;
  wSmart = 1;            // wave 1: only 1 enemy hunts at a time (canonical)
  lives = STARTING_LIVES;
  enemiesKilledThisWave = 0;
  enemies.length = 0;
  eggs.length = 0;
  scorePops.length = 0;
  eggCatchChain = 0; eggChainTimer = 0;
  riderlessBirds.length = 0;
  floorBurnAmount = 0;
  setFloorBurnTarget(wave);
  spawnTimer = 0;
  spawnQueue = [];
  queueWaveSpawns(wave);
  player.x = SPAWN_X; player.y = SPAWN_Y;
  player.vx = 0; player.vy = 0;
  player.facingLeft = false; player.onGround = true;
  player.alive = true; player.respawnTimer = 0;
  const pbirth = getBirthDuration('mybirth');
  player.invulnTimer = pbirth;
  player.birthTimer = pbirth;
  player.birthDuration = pbirth;
  player.birthMode = 'player';
  player.wasSkidding = false; player.isSkidding = false;
  player.lastAbsVx = 0;
  snd.mybirth();
  spawnMaterializeParticles(player.x, player.y);
  hudScore.textContent = score;
  hudWave.textContent = wave;
  updateLivesHUD();
  overlay.classList.add('hidden');
}

function gameOver() {
  state = 'GAME_OVER';
  overlay.classList.remove('hidden');
  overlay.innerHTML = `
    <h2>GAME OVER</h2>
    <p>Final Score</p>
    <div class="big-score">${score}</div>
    <p>Wave reached: ${wave}</p>
    <button id="restartBtn">PLAY AGAIN</button>
  `;
  document.getElementById('restartBtn').addEventListener('click', startGame);
}

function loseLife() {
  snd.death();
  // Knight pixel-burst at the rider position + riderless bird escapes
  spawnKnightBurst(player.x, player.y);
  spawnRiderlessBird(player.x, player.y, player.vx, player.vy, player.facingLeft);
  lives--;
  updateLivesHUD();
  if (lives <= 0) {
    setTimeout(gameOver, 800);
    return;
  }
  // Respawn after delay
  player.alive = false;
  player.respawnTimer = 1.0;
  eggCatchChain = 0; eggChainTimer = 0;  // death breaks the chain
}

function respawnPlayer() {
  player.x = SPAWN_X; player.y = SPAWN_Y;
  player.vx = 0; player.vy = 0;
  player.facingLeft = false; player.onGround = true;
  player.alive = true;
  const pbirth = getBirthDuration('mybirth');
  player.invulnTimer = pbirth;
  player.birthTimer = pbirth;
  player.birthDuration = pbirth;
  player.birthMode = 'player';
  player.wasSkidding = false; player.isSkidding = false;
  player.lastAbsVx = 0;
  snd.mybirth();
  spawnMaterializeParticles(player.x, player.y);
}

function advanceWave() {
  wave++;
  hudWave.textContent = wave;
  // WSMART scales with wave (mirrors WPERSUE in 1982 wave table). Wave 1 = 1
  // active hunter; wave 2 = 2; etc., capped at the wave's enemy count.
  wSmart = Math.min(wave, enemiesForWave(wave));
  enemiesKilledThisWave = 0;
  eggCatchChain = 0; eggChainTimer = 0;  // new wave breaks the chain
  setFloorBurnTarget(wave);              // floor burns more this wave
  snd.wave();
  enemies.length = 0;
  eggs.length = 0;
  spawnQueue = [];
  queueWaveSpawns(wave);                 // queue staggered births
}

// Queue staggered enemy births for the start of a wave. First arrives after
// a short delay so the player has a moment to orient, then ~1.2s between
// births. Number scales with wave (3, 4, 5, 5, ...).
function queueWaveSpawns(waveNum) {
  const count = enemiesForWave(waveNum);
  for (let i = 0; i < count; i++) {
    spawnQueue.push({ delay: 1.0 + i * WAVE_SPAWN_SPREAD });
  }
}

//── Update ───────────────────────────────────────────────────────────────────
function update(dt) {
  // Animate floor burn-away + lava waves
  updateBurnState(dt);

  // Player input + physics
  playerBlock: if (player.alive) {
    // Birth-lock: while birthTimer > 0, player is frozen on the spawn pad.
    // ANY movement key (flap, left, right) immediately cancels birth and
    // commits the player to engagement.
    if (player.birthTimer > 0) {
      if (keys.flapPressed || keys.left || keys.right) {
        player.birthTimer = 0;
        player.invulnTimer = 0;   // cancel protection too
      } else {
        player.birthTimer -= dt;
        break playerBlock;        // skip rest of physics — bird frozen on pad
      }
    }
    // Flap (edge-triggered, single impulse per press)
    // Horizontal speed amplifies vertical lift: standing flap is gentle,
    // running flap is powerful. This is the real Joust mechanic.
    if (keys.flapPressed && player.flapTimer <= 0) {
      const speedFactor = 1 + FLAP_SPEED_BONUS * (Math.abs(player.vx) / HORIZ_MAX);
      const impulse = FLAP_IMPULSE * speedFactor;
      player.vy = Math.max(MAX_VY_UP, player.vy + impulse);
      player.flapTimer = FLAP_COOLDOWN;
      player.flapAnimTime = 0;
      player.onGround = false;
      snd.flap();
    }
    keys.flapPressed = false;
    player.flapTimer -= dt;
    player.flapAnimTime += dt;

    // Horizontal input — pressing a direction accelerates that way, but the
    // bird only FLIPS facing once it's actually moving (or stopped) that way.
    // On the ground, the bird commits to its current direction and only flips
    // after braking to zero. This makes turn-arounds feel weighty, like Joust.
    //
    // SKID STATE MACHINE (real arcade Joust):
    // - If running fast and player presses opposite direction → enter SKID
    // - During SKID: hard constant deceleration, ignore input until vx ≈ 0
    // - On exit (vx ≈ 0): held key resumes accelerating in new direction
    // - Tap or low-speed reverse: no skid, just normal turnaround
    const SKID_ENTER_SPEED_PCT = 0.50;   // 50% (= 120 px/s) — just above WALK_SPEED of 110
                                         // so walking can't skid, but running triggers it
                                         // as soon as you cross out of the walk zone.
    const SKID_DECEL = 320;              // px/sec² brake during skid — tuned to match
                                         // arcade WAV. At max speed 240 → 0.75s slide / 90px.
                                         // At 55% trigger speed → 0.41s / 28px.
    const SKID_EXIT_SPEED = 4;           // when |vx| drops below this, exit skid

    // Detect skid entry: on ground + at speed + opposite direction key pressed
    if (!player.isSkidding && player.onGround) {
      const speedHi = Math.abs(player.vx) > HORIZ_MAX * SKID_ENTER_SPEED_PCT;
      const reversingRight = player.vx > 0 && keys.left  && !keys.right;
      const reversingLeft  = player.vx < 0 && keys.right && !keys.left;
      if (speedHi && (reversingRight || reversingLeft)) {
        player.isSkidding = true;
        snd.skid(Math.abs(player.vx) / HORIZ_MAX);
      }
    }

    if (player.isSkidding) {
      // SKIDDING — apply hard linear deceleration, ignore movement input.
      // Bird MUST come to a stop before it can turn. The facing stays in the
      // movement direction (commits to looking the way it's sliding).
      const skidAmt = SKID_DECEL * dt;
      if (Math.abs(player.vx) <= skidAmt + SKID_EXIT_SPEED) {
        player.vx = 0;
        player.isSkidding = false;
      } else {
        player.vx -= Math.sign(player.vx) * skidAmt;
      }
      // Also exit skid if bird leaves the ground (e.g. floor burned away under)
      if (!player.onGround) {
        player.isSkidding = false;
      }
    } else {
      // NORMAL ground / air movement
      // Walk vs run on the ground: tap (key held < HOLD_THRESHOLD) caps at
      // WALK_SPEED; hold (longer) lets bird reach full HORIZ_MAX. In the air,
      // always full speed allowed (no walking through the air).
      const nowT = performance.now() / 1000;
      const leftHeldLong  = keys.left  && leftPressTime  > 0 && (nowT - leftPressTime)  >= HOLD_THRESHOLD;
      const rightHeldLong = keys.right && rightPressTime > 0 && (nowT - rightPressTime) >= HOLD_THRESHOLD;
      const groundMaxSpeed = player.onGround
        ? ((leftHeldLong || rightHeldLong) ? HORIZ_MAX : WALK_SPEED)
        : HORIZ_MAX;

      if (keys.left) {
        player.vx -= HORIZ_ACCEL * dt;
        if (!player.onGround || player.vx <= 0) player.facingLeft = true;
      }
      if (keys.right) {
        player.vx += HORIZ_ACCEL * dt;
        if (!player.onGround || player.vx >= 0) player.facingLeft = false;
      }
      if (!keys.left && !keys.right) {
        if (player.onGround) {
          // Linear friction deceleration — gentle, slow stop. No skid sound.
          const decelAmount = GROUND_DECEL * dt;
          if (Math.abs(player.vx) <= decelAmount) {
            player.vx = 0;
          } else {
            player.vx -= Math.sign(player.vx) * decelAmount;
          }
        } else {
          // Air: gentle exponential drag (keeps drift between flaps)
          player.vx *= AIR_FRICTION;
        }
      }
      // Apply walk/run speed cap
      player.vx = clamp(player.vx, -groundMaxSpeed, groundMaxSpeed);
    }
    player.vx = clamp(player.vx, -HORIZ_MAX, HORIZ_MAX);

    // Gravity
    player.vy += GRAVITY * dt;
    player.vy = Math.min(player.vy, TERMINAL_VY);

    // Apply movement and resolve collisions axis-by-axis so platforms are
    // solid on all four sides.
    player.x += player.vx * dt;
    const sideBumped = resolveHorizontalPlatformCollisions(player);
    // Horizontal wrap (after collision resolution)
    if (player.x + BIRD_W < 0) player.x = W;
    if (player.x > W) player.x = -BIRD_W;

    player.y += player.vy * dt;
    const vRes = resolveVerticalPlatformCollisions(player);
    player.onGround = vRes.onGround;
    if (sideBumped || vRes.bumpedHead) snd.floorbump();

    // Ceiling
    if (player.y < CEILING) { player.y = CEILING; player.vy = Math.max(0, player.vy); }

    // Track |vx| for any other consumers (debug, animations).
    player.lastAbsVx = Math.abs(player.vx);

    // Lava — only the LEFT and RIGHT corner zones (sides of the base platform)
    {
      const bbottom = player.y + BIRD_H;
      // Lava death: bird's bottom touches the lava surface. Floor strips
      // (when present) block falling, so this only fires when bird is over
      // an opened lava section (burned floor) or flies too low.
      if (bbottom > getLavaTopY() && !player.onGround && player.invulnTimer <= 0) {
        loseLife();
      }
    }

    // Spawn invulnerability runs out by time, but ALSO cancels immediately
    // if the player presses a movement key — committing to the engagement.
    if (player.invulnTimer > 0 && (keys.left || keys.right || keys.flapPressed)) {
      player.invulnTimer = 0;
    }
    player.invulnTimer = Math.max(0, player.invulnTimer - dt);
  } else {
    // Player dead, count down respawn
    player.respawnTimer -= dt;
    if (player.respawnTimer <= 0 && lives > 0) {
      respawnPlayer();
    }
  }

  // Count currently-smart enemies (NSMART in ROM). When this drops below
  // wSmart (WSMART quota), the next LINET-tick'd enemy promotes itself.
  // We recompute each frame instead of maintaining a counter because death,
  // egg-spawn, and re-incarnation paths would all need to keep it correct.
  let nSmart = 0;
  for (const e of enemies) {
    if (e.alive && e.isSmart && (!e.birthTimer || e.birthTimer <= 0)) nSmart++;
  }

  // Enemies
  for (const e of enemies) {
    if (!e.alive) continue;

    // Tick spawn invulnerability
    if (e.invulnTimer && e.invulnTimer > 0) {
      e.invulnTimer = Math.max(0, e.invulnTimer - dt);
    }

    // Birth-lock: while birthTimer > 0, enemy is frozen on its spawn pad.
    // Doesn't move, doesn't flap, can't be hit. After birth, AI engages.
    if (e.birthTimer && e.birthTimer > 0) {
      e.birthTimer -= dt;
      continue;   // skip AI + physics for this enemy this frame
    }

    // ─────────────────────────────────────────────────────────────────────
    // Canonical Joust enemy AI — direct port of Bill Pfutzenreuter's 1982
    // 6809 routines (LINET / BOUNDR / B2UNDR / SHADOW / SELPLY / BOLEV)
    // from JOUSTRV4.ASM in synamaxmusic/joust. All ROM constants are
    // labeled in comments; values scaled ×3 for our 720-tall world.
    //
    // The AI has TWO modes per enemy:
    //
    //   1. LINET — dumb line-tracking wander (default). The enemy picks the
    //      nearest of three horizontal tracking lines (AOFFL1/2/3) and
    //      flaps to maintain altitude on it while drifting in its current
    //      facing direction. NSMART < WSMART promotes a wandering enemy
    //      to smart mode (LNTSMT).
    //
    //   2. Smart (BOUNDR / B2UNDR / SHADOW) — tier-specific chase. The
    //      enemy calls SELPLY to find a valid target, then enters one of
    //      three sub-states based on relative altitude:
    //
    //        dy > dnRange  → DIVE   (BODN: gravity-fall toward player,
    //                                flap only to cap fall speed)
    //        dy < -upRange → CLIMB  (BOUP: flap up toward player)
    //        otherwise     → LEVEL  (BOLEV: match player altitude,
    //                                mirror direction changes after a
    //                                debounce, periodically reconsider)
    //
    // The smart enemy DOESN'T horizontally home like a missile — it drifts
    // in its current facing direction. It does NOT intentionally turn toward
    // the player. Direction flips come from collision/cliff/edge responses
    // (auto-180), while aggression ramps through vertical choices, flap power,
    // and shorter decision timers.
    //
    // LAVA PANIC: at any altitude below the lava-warn line (~580 in our
    // world; CLIF5=$D3=211 in arcade), if we're falling we force-flap up.
    // This is BODIRL's BOLAVA override that prevents lava-suicide.

    e.aiTimer   -= dt;
    e.plavt     -= dt;
    e.flapTimer -= dt;
    e.flapAnimTime += dt;
    e.flightAge = (e.flightAge || 0) + dt;
    if (e.prdir > 0)            e.prdir -= dt;
    if (e.facingFlipTimer > 0)  e.facingFlipTimer -= dt;
    if (e.bumpCooldown > 0)     e.bumpCooldown -= dt;
    if (e.bumpEscapeTimer > 0)  e.bumpEscapeTimer -= dt;
    if (e.bumpChainTimer > 0)   e.bumpChainTimer -= dt;
    else e.bumpChain = 0;
    if (e.noFlapTimer > 0)      e.noFlapTimer -= dt;

    const tier = KNIGHT_TIERS[e.tier] || KNIGHT_TIERS.bounder;

    // Arcade-style pressure ramp: the longer a rider lives, the more often
    // it reconsiders vertical attack and the stronger its flaps get. This is
    // aggression WITHOUT intentional horizontal turning; facing still only
    // changes from platform/bird collisions or wrap/edge responses.
    const agePressure = clamp((e.flightAge || 0) / 28, 0, 1);
    const aggression  = (e.aiAggression || 1.0) * (1 + agePressure * 0.55);
    const decideTime  = Math.max(0.08, tier.levelTime / (1 + agePressure * 0.85));
    const climbRange  = tier.upRange * (1 - agePressure * 0.25);
    const diveRange   = tier.dnRange * (1 - agePressure * 0.25);

    // SELPLY — find a valid target (TARTIM check via invulnTimer).
    const target = (player.alive && player.invulnTimer <= 0) ? player : null;

    // Tracking lines in our world (AOFFL1/2/3 ×3, tuned to our platforms).
    // Wide ~100px bands so an enemy can roam vertically a bit on a line.
    const TRACK_HI  = 120;
    const TRACK_MID = 380;
    const TRACK_LO  = 580;
    const TRACK_BAND = 100;   // AOFFUD ×3
    const LAVA_PANIC_Y = 600; // CLIF5 lava-panic line ×3

    // v0.62: tighten enemy flight. The previous pass corrected horizontal
    // intent, but enemies still flapped the moment they slipped even 1px
    // below a tracking line. That created the ocean-float wave and drove
    // birds into platforms. Give normal flight a real deadband so they glide
    // straighter and only flap after a meaningful drop.
    const LINE_FLAP_DEADBAND  = 42;
    const LEVEL_FLAP_DEADBAND = 34;

    // Pick this enemy's current tracking line (LINET lines 197–204):
    //   start with AOFFL1; if PPOSY ≥ AOFFL1+AOFFUD pick AOFFL2; etc.
    let trackLine = TRACK_HI;
    if (e.y >= TRACK_HI + TRACK_BAND)  trackLine = TRACK_MID;
    if (e.y >= TRACK_MID + TRACK_BAND) trackLine = TRACK_LO;

    // ─── Promotion check (LNTSMT): when wave has room for more smart
    // enemies, the next wandering bird becomes a hunter. PLAVT gates this
    // so we don't promote every frame.
    if (!e.isSmart && e.plavt <= 0) {
      if (nSmart < wSmart) {
        e.isSmart = true;
        nSmart++;
      }
      e.plavt = 0.4;   // LNTLAV-equivalent re-check interval
    }

    let wantFlap = false;
    let steerDir = e.facingLeft ? -1 : 1;

    if (!e.isSmart) {
      // ─── LINET — dumb line-tracking wander.
      // If below the tracking line AND not already rising, flap up.
      if (e.y > trackLine + LINE_FLAP_DEADBAND && e.vy >= 12) wantFlap = true;
      // Otherwise just drift in facing direction. PFACE doesn't change in
      // LINET unless cliff-bump flips it.
    } else if (!target) {
      // Smart but no valid target (player dead/spawning) — fall back to
      // line-tracking so we don't sit still in the air.
      if (e.y > trackLine + LINE_FLAP_DEADBAND && e.vy >= 12) wantFlap = true;
    } else {
      // ─── Smart AI — tier-specific chase.
      // LAVA PANIC override (BODIRL / BOLAVA): too close to lava, falling,
      // FORCE flap up regardless of mode. Saves us from suicide dives.
      if (e.y > LAVA_PANIC_Y && e.vy >= 0) {
        wantFlap = true;
      }

      const dy = target.y - e.y;   // positive = player below us

      // Re-decide mode whenever aiTimer expires (BOLEV's PJOYT timeout),
      // OR on the very first frame after promotion (aiMode default).
      // BOUNDR's top-level decision: dy >= dnRange → DIVE; dy ≤ -upRange
      // → CLIMB; otherwise LEVEL.
      if (e.aiTimer <= 0) {
        if (dy >= diveRange) {
          e.aiMode = 'dive';
        } else if (dy <= -climbRange) {
          e.aiMode = 'climb';
        } else {
          e.aiMode = 'level';
          e.pdist  = e.y;            // PDIST: remember OUR current Y line (ROM BOLEV uses PPOSY,U)
          e.ppvelx = target.vx;      // PPVELX: remember player's vx
          e.prdir  = 0.3;             // PRDIR: small debounce before mirror
        }
        e.aiTimer = decideTime;
      }

      if (e.aiMode === 'dive') {
        // BODN/BODIR: vertical decision only. The ROM does NOT turn the enemy
        // into a horizontal homing missile here; BODIR returns joystick X from
        // PFACE. Direction changes mostly come from cliff/bump handling and
        // level-flight reconsideration.
        if (e.vy > tier.dnVyCap) wantFlap = true;
        steerDir = e.facingLeft ? -1 : 1;
      } else if (e.aiMode === 'climb') {
        // BOUP: climb with short, controlled flap bursts. Do not flap every
        // frame/cooldown forever; that was the ocean-float problem. Once the
        // bird already has decent upward velocity, let momentum carry it.
        wantFlap = e.vy > -115;
        steerDir = e.facingLeft ? -1 : 1;
      } else {
        // BOLEV — LEVEL FLIGHT. On entry, PDIST remembers the enemy's own Y
        // line, not the player's current Y. If we sag below that line while
        // falling, flap back up. Otherwise drift and periodically reconsider.
        if (e.y > e.pdist + LEVEL_FLAP_DEADBAND && e.vy >= 12) wantFlap = true;

        // No intentional horizontal turn here. The real feel comes from
        // vertical pressure while the rider commits to its current facing.
        // If it needs to reverse, it must earn that reversal by bouncing off
        // a platform/bird/edge, producing the classic auto-180 behavior.
        steerDir = e.facingLeft ? -1 : 1;
      }
    }

    // ─── Cliff/platform escape override.
    // Direction remains pure arcade: the rider keeps its current facing unless
    // it physically bumps something. The important missing piece is vertical
    // separation after a bump. Same-row platforms can otherwise create a
    // back-and-forth hallway, so a bump gives the bird a short committed escape
    // and a small up/down bias chosen at the moment of contact.
    if (e.bumpEscapeTimer > 0) {
      steerDir = e.facingLeft ? -1 : 1;

      if (e.noFlapTimer > 0) {
        // Down-bias escape: don't instantly flap back into the same shelf.
        wantFlap = false;
      } else if (e.bumpVertBias === 'up' && e.vy > -25 && e.flapTimer <= 0) {
        // Up-bias escape: one small correction to clear the shelf line.
        wantFlap = true;
      }
    }

    // ─── Apply flap (ADDFLP analog).
    if (wantFlap && e.flapTimer <= 0) {
      const speedFactor = 1 + FLAP_SPEED_BONUS * (Math.abs(e.vx) / HORIZ_MAX);
      const tierFlap    = (e.flapPower || 0.9) * (0.76 + agePressure * 0.18);
      const impulse     = FLAP_IMPULSE * tierFlap * speedFactor;
      e.vy = Math.max(MAX_VY_UP, e.vy + impulse);
      e.flapTimer    = FLAP_COOLDOWN * Math.max(1.05, 1.45 - agePressure * 0.25);
      e.flapAnimTime = 0;
    }

    // ─── Apply horizontal steer (joystick into PVELX). Mild acceleration
    // — enemies don't snap to speed, they drift up to it like the player.
    if (steerDir !== 0) {
      const accel = HORIZ_ACCEL * 0.45 * (0.85 + 0.25 * aggression);
      e.vx += steerDir * accel * dt;
    }
    // Light air drag so they don't accumulate forever
    e.vx *= 0.985;

    // Apply physics: clamp, gravity, integrate, collisions.
    e.vx = clamp(e.vx, -HORIZ_MAX, HORIZ_MAX);
    e.vy += GRAVITY * dt;
    e.vy = Math.min(e.vy, TERMINAL_VY);

    e.x += e.vx * dt;
    const eSideBumped = resolveHorizontalPlatformCollisions(e);
    // Cliff/platform side hit = forced auto-180. This is the only normal
    // horizontal turn source. To avoid same-level platform pinball, the bump
    // also gets a 50/50 vertical escape: up to clear the shelf line, or down
    // to drop out of the lane. Repeated fast bonks get a little stronger bias,
    // but still no player-facing turn.
    if (eSideBumped) {
      if (e.bumpCooldown <= 0) {
        e.bumpChain = (e.bumpChainTimer > 0 ? (e.bumpChain || 0) + 1 : 1);
        e.bumpChainTimer = 0.85;

        e.facingLeft = !e.facingLeft;
        const away = e.facingLeft ? -1 : 1;
        e.vx = away * (e.bumpChain >= 2 ? 180 : 145);

        const goUp = Math.random() < 0.5;
        if (goUp) {
          e.bumpVertBias = 'up';
          e.vy = Math.min(e.vy, e.bumpChain >= 2 ? -110 : -75);
          e.noFlapTimer = 0;
        } else {
          e.bumpVertBias = 'down';
          e.vy = Math.max(e.vy, e.bumpChain >= 2 ? 125 : 90);
          e.noFlapTimer = e.bumpChain >= 2 ? 0.26 : 0.16;
        }

        e.bumpEscapeTimer = e.bumpChain >= 2 ? 0.55 : 0.42;
        e.aiTimer = Math.max(e.aiTimer, 0.20);
        e.facingFlipTimer = 0.45;
        e.bumpCooldown = 0.24;
      } else {
        // Still inside cooldown: keep committing away from the last wall, but
        // don't auto-180 again. This prevents left-right-left-right chatter.
        const away = e.facingLeft ? -1 : 1;
        e.vx = away * Math.max(120, Math.abs(e.vx));
      }
    }
    if (e.x + BIRD_W < 0) e.x = W;
    if (e.x > W) e.x = -BIRD_W;

    e.y += e.vy * dt;
    const eVRes = resolveVerticalPlatformCollisions(e);
    e.onGround = eVRes.onGround;
    if (eVRes.bumpedHead) {
      // Underside bonks are another shelf-pocket symptom. Don't reverse
      // facing here; just stop the immediate re-flap and drift out.
      e.noFlapTimer = Math.max(e.noFlapTimer || 0, 0.18);
      e.bumpEscapeTimer = Math.max(e.bumpEscapeTimer || 0, 0.25);
    }
    if (e.y < CEILING) { e.y = CEILING; e.vy = Math.max(0, e.vy); }

    // Lava death — enemy bottom touches lava surface = instant kill.
    {
      const ebottom = e.y + BIRD_H;
      if (ebottom > getLavaTopY()) {
        e.alive = false;
      }
    }
  }

  // Eggs: gravity, platform landing, lava destruction, hatch timer
  for (const egg of eggs) {
    if (!egg.alive) continue;

    if (egg.state === 'falling') {
      egg.vy += EGG_GRAVITY * dt;
      egg.vy = Math.min(egg.vy, EGG_TERMINAL_VY);
      egg.vx *= EGG_AIR_DRAG;
      egg.x += egg.vx * dt;
      egg.y += egg.vy * dt;

      // Horizontal wrap
      if (egg.x + EGG_W < 0) egg.x = W;
      if (egg.x > W) egg.x = -EGG_W;

      // Try to land on a platform
      const allP = getAllPlatforms();
      for (const p of allP) {
        if (egg.vy >= 0 &&
            egg.x + EGG_W > p.x && egg.x < p.x + p.w &&
            egg.y + EGG_H >= p.y && egg.y + EGG_H <= p.y + PLATFORM_THICKNESS + Math.abs(egg.vy * dt) + 2) {
          egg.y = p.y - EGG_H;
          egg.vy = 0;
          egg.vx = 0;
          egg.state = 'resting';
          egg.timer = EGG_HATCH_TIME;
          // Chain does NOT reset on egg landing (per real arcade behavior —
          // chain decays by TIME, not by ground contact).
          break;
        }
      }

      // Lava destroys the egg
      if (egg.y + EGG_H > getLavaTopY()) {
        egg.alive = false;
      }

      // Safety: gone off the bottom
      if (egg.y > H + 50) egg.alive = false;
    } else if (egg.state === 'resting') {
      egg.timer -= dt;
      if (egg.timer <= 0) {
        // Hatch into a new enemy
        spawnEnemyAtEgg(egg);
        egg.alive = false;
      }
    }
  }

  // Egg chain decay — if no catch within timeout window, chain resets.
  if (eggCatchChain > 0) {
    eggChainTimer += dt;
    if (eggChainTimer >= EGG_CHAIN_TIMEOUT) {
      eggCatchChain = 0;
      eggChainTimer = 0;
    }
  }

  // Player picks up eggs by touching them.
  // CHAIN works on ALL pickups (air + ground). Per arcade Joust behavior,
  // the chain stays alive as long as you keep catching eggs within
  // EGG_CHAIN_TIMEOUT seconds. Caps at 1000 points after 4th egg.
  if (player.alive && player.invulnTimer <= 0) {
    const pb = birdBox(player);
    for (const egg of eggs) {
      if (!egg.alive) continue;
      const eb = { x: egg.x, y: egg.y, w: EGG_W, h: EGG_H };
      if (rectOverlap(pb, eb)) {
        egg.alive = false;
        const chainIdx = Math.min(eggCatchChain, EGG_CHAIN_VALUES.length - 1);
        const pickupScore = EGG_CHAIN_VALUES[chainIdx];
        eggCatchChain++;
        eggChainTimer = 0;   // reset decay timer
        // Show chain count + value (two-tier popup like the original)
        if (eggCatchChain > 1) {
          spawnScorePop(egg.x + EGG_W + 10, egg.y - 14,
                        'CHAIN x' + eggCatchChain, '#ff9050');
          spawnScorePop(egg.x + EGG_W + 10, egg.y + 4,  '+' + pickupScore);
        } else {
          spawnScorePop(egg.x + EGG_W + 10, egg.y, '+' + pickupScore);
        }
        score += pickupScore;
        hudScore.textContent = score;
        snd.egg();
      }
    }
  }

  // Clean up dead eggs
  for (let i = eggs.length - 1; i >= 0; i--) {
    if (!eggs[i].alive) eggs.splice(i, 1);
  }

  // Update score popups (float upward, fade out)
  for (const pop of scorePops) {
    pop.age += dt;
    pop.y += pop.vy * dt;
  }
  for (let i = scorePops.length - 1; i >= 0; i--) {
    if (scorePops[i].age >= scorePops[i].lifetime) scorePops.splice(i, 1);
  }

  // Bird-bird collisions: player vs enemies
  if (player.alive && player.invulnTimer <= 0) {
    for (const e of enemies) {
      if (!e.alive) continue;
      if (e.invulnTimer && e.invulnTimer > 0) continue;  // skip spawn-protected enemies
      if (e.birthTimer && e.birthTimer > 0) continue;    // skip birthing enemies
      if (rectOverlap(birdJoustBox(player), birdJoustBox(e))) {
        const pl = lanceY(player);
        const el = lanceY(e);
        const diff = pl - el; // negative = player's lance is higher (better)
        // ANY contact fires the enemycollide sound (broader than jousthit)
        snd.enemycollide();
        if (Math.abs(diff) < LANCE_TOLERANCE) {
          // Bounce off each other
          const sep = (player.x < e.x ? -1 : 1);
          player.vx += sep * 180;
          e.vx       -= sep * 180;
        } else if (diff < 0) {
          // Player's lance higher → player wins. Score depends on tier killed.
          const tier = KNIGHT_TIERS[e.tier] || KNIGHT_TIERS.shadowlord;
          e.alive = false;
          spawnEgg(e.x, e.y, player.x + BIRD_W / 2, e.tier);
          score += tier.score;
          spawnScorePop(e.x + BIRD_W, e.y, '+' + tier.score, '#ffe040');
          hudScore.textContent = score;
          enemiesKilledThisWave++;
          snd.jousthit();
          // Small bounce so player isn't sitting on dead enemy
          player.vy = -120;
        } else {
          // Enemy's lance higher → player dies
          loseLife();
          break;
        }
      }
    }
  }

  // Enemy-vs-enemy collisions: bounce off each other and flip direction.
  // Doesn't kill (would make the game too easy if enemies took each other
  // out for free). Just deflects so they don't pass through or stack up.
  for (let i = 0; i < enemies.length; i++) {
    for (let j = i + 1; j < enemies.length; j++) {
      const a = enemies[i];
      const b = enemies[j];
      if (!a.alive || !b.alive) continue;
      if (rectOverlap(birdJoustBox(a), birdJoustBox(b))) {
        snd.enemycollide();  // enemies thumping each other also makes the sound
        // Push apart based on which is left/right
        const sep = a.x < b.x ? -1 : 1;
        a.vx = sep * 120;
        b.vx = -sep * 120;
        a.facingLeft = sep < 0;
        b.facingLeft = sep > 0;
      }
    }
  }

  // Clean up dead enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    if (!enemies[i].alive) enemies.splice(i, 1);
  }

  // Spawning — wave queue: at wave start, an enemy is queued for each
  // spot, with staggered delays. They birth from random spawn pads. No more
  // continuous random spawning during the wave.
  if (state === 'PLAYING') {
    for (let i = spawnQueue.length - 1; i >= 0; i--) {
      spawnQueue[i].delay -= dt;
      if (spawnQueue[i].delay <= 0) {
        spawnEnemy();
        spawnQueue.splice(i, 1);
      }
    }
  }

  // Wave progression — advance ONLY when all queued spawns have happened
  // AND all enemies are dead AND all eggs are gone (collected/hatched/destroyed).
  if (state === 'PLAYING' && spawnQueue.length === 0 && enemies.length === 0 && eggs.length === 0) {
    advanceWave();
  }
}

//── Rendering ────────────────────────────────────────────────────────────────
// Background stars (precomputed)
const stars = [];
for (let i = 0; i < 80; i++) {
  stars.push({
    x: Math.random() * W,
    y: Math.random() * (H - 80),
    bright: Math.random() < 0.4,
  });
}

function drawBackground() {
  ctx.fillStyle = COLOR_BG;
  ctx.fillRect(0, 0, W, H);
  // Stars
  for (const s of stars) {
    ctx.fillStyle = s.bright ? COLOR_STAR : COLOR_STAR_DIM;
    ctx.fillRect(s.x, s.y, 1.5, 1.5);
  }
}

function drawPlatforms() {
  // First the base — rendered at BASE_DRAW_W_PCT of canvas width, centered
  const baseS = sprites.base;
  if (baseS && baseS.complete && baseS.naturalWidth > 0) {
    const baseW = baseS.naturalWidth;
    const baseH = baseS.naturalHeight;
    const drawW = W * BASE_DRAW_W_PCT;
    const drawH = baseH * (drawW / baseW);
    const drawX = (W - drawW) / 2;
    ctx.drawImage(baseS, drawX, H - drawH, drawW, drawH);
    drawBaseScoreOverlay(drawH, drawW, drawX);
  } else {
    // Fallback: dark slab
    ctx.fillStyle = COLOR_PLATFORM;
    const fx = W * (1 - BASE_DRAW_W_PCT) / 2;
    ctx.fillRect(fx, H - 80, W * BASE_DRAW_W_PCT, 80);
    ctx.fillStyle = COLOR_PLATFORM_EDGE;
    ctx.fillRect(W * BASE_WALK_X_START_PCT, H - 80,
                 W * (BASE_WALK_X_END_PCT - BASE_WALK_X_START_PCT), 2);
  }

  // Then the floating platforms — scaled down by PLATFORM_DRAW_SCALE
  for (const p of platforms) {
    const s = sprites[p.sprite];
    const w = platformWidth(p);
    const h = platformHeight(p);
    const x = platformX(p);
    if (s && s.complete && s.naturalWidth > 0) {
      ctx.drawImage(s, x, p.y, w, h);
    } else {
      // Fallback colored rect while sprite loads
      ctx.fillStyle = COLOR_PLATFORM;
      ctx.fillRect(x, p.y, w, PLATFORM_THICKNESS);
      ctx.fillStyle = COLOR_PLATFORM_EDGE;
      ctx.fillRect(x, p.y, w, 2);
    }
  }
}

// Draws the score INSIDE the base's built-in score window. Covers the
// "0123456789" placeholder digits so they don't show through.
// drawnBaseH = rendered base height, drawnBaseW = rendered base width,
// drawnBaseX = base sprite's left x-coord on canvas.
//
// TUNE these proportions if the score doesn't sit perfectly over the
// placeholder digits in your base.png:
function drawBaseScoreOverlay(drawnBaseH, drawnBaseW, drawnBaseX) {
  // For base.png 1143x140, the placeholder "0123456789" sits in the
  // dark score window. Position estimates as fractions of base sprite:
  const winX_PCT = 0.21;  // fraction of BASE width (not canvas)
  const winW_PCT = 0.27;
  const winY_PCT = 0.55;  // fraction of BASE height (from base top)
  const winH_PCT = 0.22;

  const winX = drawnBaseX + drawnBaseW * winX_PCT;
  const winW = drawnBaseW * winW_PCT;
  const winY = (H - drawnBaseH) + drawnBaseH * winY_PCT;
  const winH = drawnBaseH * winH_PCT;

  // Dark fill over the placeholder digits
  ctx.fillStyle = 'rgba(20, 8, 4, 0.95)';
  ctx.fillRect(winX, winY, winW, winH);

  // Real score in golden yellow
  ctx.save();
  ctx.fillStyle = '#ffd040';
  ctx.font = `bold ${Math.floor(winH * 0.65)}px "JoustArcade", "Press Start 2P", monospace`;
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  ctx.fillText(score.toString().padStart(6, '0'),
               winX + winW - 8,
               winY + winH / 2);
  ctx.restore();
}

// Smoothly animate the floor burn toward its target (set per wave).
function updateBurnState(dt) {
  if (floorBurnAmount < targetBurnAmount) {
    floorBurnAmount = Math.min(targetBurnAmount, floorBurnAmount + FLOOR_BURN_RATE * dt);
  }
  lavaWavePhase += dt * 2;
}

// Render the lava body (full width). Called BEFORE base sprite so the base
// renders on top of lava and the score window stays visible.
function drawLava(dt) {
  const lavaTopY = getLavaTopY();
  const lavaH = H - lavaTopY;

  // Lava body — full width from below floor to canvas bottom
  ctx.fillStyle = '#aa1f08';
  ctx.fillRect(0, lavaTopY, W, lavaH);

  // Wavy bright top edge
  ctx.fillStyle = '#ff5818';
  for (let x = 0; x < W; x += 3) {
    const wave = Math.sin(x * 0.06 + lavaWavePhase) * 2 + Math.sin(x * 0.15 + lavaWavePhase * 1.7) * 1;
    ctx.fillRect(x, lavaTopY - 1 + wave, 3, 3);
  }
}

// Render floor strips on either side of base. Visual extends to the BASE
// COLLISION RECT (not sprite edge). Base sprite renders on top later and
// covers any inside overlap.
function drawFloorStrips() {
  const floorY = getFloorStripY();
  const baseColl = getBaseCollisionRect();
  const baseCollLeftX  = baseColl.x;
  const baseCollRightX = baseColl.x + baseColl.w;

  const leftStripW = baseCollLeftX - floorBurnAmount;
  if (leftStripW > 0) {
    drawFloorStrip(floorBurnAmount, floorY, leftStripW);
  }
  const rightStripW = (W - floorBurnAmount) - baseCollRightX;
  if (rightStripW > 0) {
    drawFloorStrip(baseCollRightX, floorY, rightStripW);
  }
}

// Render flames at burn edges. Called LAST so flames render on top of
// everything (including the base sprite and floor strips).
function drawBurnFlamesAtEdges() {
  const floorY = getFloorStripY();
  const baseColl = getBaseCollisionRect();
  const baseCollLeftX  = baseColl.x;
  const baseCollRightX = baseColl.x + baseColl.w;

  const leftStripW = baseCollLeftX - floorBurnAmount;
  const rightStripW = (W - floorBurnAmount) - baseCollRightX;
  if (leftStripW > 4)  drawBurnFlames(floorBurnAmount, floorY);
  if (rightStripW > 4) drawBurnFlames(W - floorBurnAmount, floorY);
}

// Render a chunk of rocky floor — JUST the thin walkable strip in brown-orange
// matching the base sprite. No rocky body below; the gap fills with flames
// at burn edges and lava beyond.
function drawFloorStrip(x, y, w) {
  // Brown-orange thin strip (matches base palette)
  ctx.fillStyle = '#c47038';   // top highlight (bright)
  ctx.fillRect(x, y, w, 2);
  ctx.fillStyle = '#a35028';   // main body (mid orange-brown)
  ctx.fillRect(x, y + 2, w, FLOOR_STRIP_HEIGHT - 4);
  ctx.fillStyle = '#7c3818';   // bottom shadow (darker)
  ctx.fillRect(x, y + FLOOR_STRIP_HEIGHT - 2, w, 2);
}

// Cluster of 5 animated flame tongues + base glow + rising embers at a burn
// edge. Flames sit ON the lava surface, tips reach UP just past floor bottom.
// `x` is the burn point (where floor ends, lava begins).
function drawBurnFlames(x, floorTopY) {
  const floorBottomY = floorTopY + FLOOR_STRIP_HEIGHT;
  const lavaY = floorBottomY + LAVA_GAP;
  // Flame height = gap + a few px of overlap so tips "lick" the floor
  const flameH = LAVA_GAP + 4;

  // Base glow ellipse on lava — soft warm aura where flames meet the surface
  const grad = ctx.createRadialGradient(x, lavaY, 0, x, lavaY, 22);
  grad.addColorStop(0, 'rgba(255, 180, 50, 0.55)');
  grad.addColorStop(1, 'rgba(255, 100, 30, 0)');
  ctx.fillStyle = grad;
  ctx.fillRect(x - 22, lavaY - 12, 44, 18);

  // 5 flame tongues at horizontal offsets, varying heights (tallest in middle)
  drawFlameTongue(x - 9, lavaY, flameH * 0.75, 0.0);
  drawFlameTongue(x - 4, lavaY, flameH * 0.92, 0.5);
  drawFlameTongue(x + 0, lavaY, flameH * 1.05, 1.0);
  drawFlameTongue(x + 4, lavaY, flameH * 0.92, 1.5);
  drawFlameTongue(x + 9, lavaY, flameH * 0.75, 2.0);

  // Rising embers — 3 small particles drifting up
  for (let i = 0; i < 3; i++) {
    drawEmber(x, lavaY, lavaWavePhase + i * 0.7);
  }
}

// Single animated upward flame, base at (x, baseY), peak height h.
// 4-layer color buildup: dark red → red-orange → orange → yellow tip.
function drawFlameTongue(x, baseY, h, phaseOff) {
  const t = lavaWavePhase * 1.5 + phaseOff;
  const flicker = 1 + Math.sin(t * 4) * 0.18 + Math.sin(t * 7.3) * 0.08;
  const ht = h * flicker;
  const sway = Math.sin(t * 2.5) * 3;

  // Layer 1: dark red outer (widest, softest)
  ctx.fillStyle = 'rgba(180, 40, 10, 0.75)';
  ctx.beginPath();
  ctx.moveTo(x - 9, baseY);
  ctx.quadraticCurveTo(x - 11 + sway, baseY - ht * 0.5, x + sway * 0.5, baseY - ht * 1.05);
  ctx.quadraticCurveTo(x + 11 + sway, baseY - ht * 0.5, x + 9, baseY);
  ctx.closePath();
  ctx.fill();

  // Layer 2: red-orange
  ctx.fillStyle = 'rgba(255, 90, 25, 0.88)';
  ctx.beginPath();
  ctx.moveTo(x - 7, baseY - 1);
  ctx.quadraticCurveTo(x - 8 + sway, baseY - ht * 0.5, x + sway * 0.4, baseY - ht * 0.92);
  ctx.quadraticCurveTo(x + 8 + sway, baseY - ht * 0.5, x + 7, baseY - 1);
  ctx.closePath();
  ctx.fill();

  // Layer 3: orange mid
  ctx.fillStyle = 'rgba(255, 165, 50, 0.92)';
  ctx.beginPath();
  ctx.moveTo(x - 4, baseY - 1);
  ctx.quadraticCurveTo(x - 5 + sway * 0.7, baseY - ht * 0.55, x + sway * 0.3, baseY - ht * 0.80);
  ctx.quadraticCurveTo(x + 5 + sway * 0.7, baseY - ht * 0.55, x + 4, baseY - 1);
  ctx.closePath();
  ctx.fill();

  // Layer 4: bright yellow inner tip
  ctx.fillStyle = 'rgba(255, 230, 130, 0.95)';
  ctx.beginPath();
  ctx.moveTo(x - 2, baseY - 2);
  ctx.quadraticCurveTo(x - 3 + sway * 0.5, baseY - ht * 0.55, x + sway * 0.2, baseY - ht * 0.65);
  ctx.quadraticCurveTo(x + 3 + sway * 0.5, baseY - ht * 0.55, x + 2, baseY - 2);
  ctx.closePath();
  ctx.fill();
}

// Single rising ember — small particle that drifts upward and fades.
// Loops every 1.8 seconds. Phase offset spaces embers out over the cycle.
function drawEmber(x, baseY, time) {
  const cycle = (time % 1.8) / 1.8;        // 0 to 1
  const dy = -cycle * 50;                  // rise 50px
  const dx = Math.sin(time * 3) * 5 + Math.sin(time * 8) * 2;
  const alpha = (1 - cycle) * 0.8;
  const size = 1.6 - cycle * 0.6;
  ctx.fillStyle = `rgba(255, 200, 80, ${alpha})`;
  ctx.beginPath();
  ctx.arc(x + dx, baseY + dy, Math.max(0.3, size), 0, Math.PI * 2);
  ctx.fill();
}

// Find the Y coordinate of the highest platform top directly below the bird.
// Used for casting a dynamic shadow. Returns null if no platform is below.
function findShadowY(b) {
  let bestY = null;
  const allP = getAllPlatforms();
  for (const p of allP) {
    if (p.x < b.x + BIRD_W && p.x + p.w > b.x && p.y >= b.y + BIRD_H) {
      if (bestY === null || p.y < bestY) bestY = p.y;
    }
  }
  return bestY;
}

// Cast a small ellipse shadow on the platform below the bird. Alpha fades
// with altitude — darker when close, fainter when high.
function drawShadow(b) {
  const sy = findShadowY(b);
  if (sy === null) return;
  const distance = sy - (b.y + BIRD_H);
  if (distance < 0) return;
  const alpha = Math.max(0.06, 0.45 - distance / 220);
  const widthScale = Math.max(0.55, 1 - distance / 400);
  ctx.fillStyle = `rgba(0, 0, 0, ${alpha})`;
  ctx.beginPath();
  ctx.ellipse(b.x + BIRD_W / 2, sy + 1, (BIRD_W * 0.36) * widthScale, 3.5, 0, 0, Math.PI * 2);
  ctx.fill();
}

// Draw a bird+rider using the sprite image, flipping horizontally if facing
// left. Falls back to a simple placeholder rect if the sprite hasn't loaded.
// If brakeSprite is provided and the bird is in skid state, uses it.
function drawBird(b, sprite, walkSprite, flySprite, fly2Sprite, brakeSprite) {
  // Sprite ready check
  if (!sprite || !sprite.complete || sprite.naturalWidth === 0) {
    // Fallback placeholder so the game is still playable while sprites load
    ctx.fillStyle = (sprite === sprites.buzzard) ? '#ff4a4a' : '#ffdb4a';
    ctx.fillRect(b.x, b.y, BIRD_W, BIRD_H);
    return;
  }

  const inAir     = !b.onGround;
  const isSkidding = b.isSkidding === true;
  const isWalking = b.onGround && !isSkidding && Math.abs(b.vx) > 30;

  // Pick the active sprite based on state:
  //   Skidding   → brake sprite (legs forward) if available
  //   Flapping   → cycle fly1/fly2 briefly after each flap (~250ms), then glide
  //   Gliding    → in air but between flaps → base sprite (wings tucked)
  //   Walking    → cycle ostrich + ostrichMove (legs stepping)
  //   Standing   → base sprite (no animation)
  let activeSprite = sprite;
  const flyReady   = flySprite   && flySprite.complete   && flySprite.naturalWidth   > 0;
  const fly2Ready  = fly2Sprite  && fly2Sprite.complete  && fly2Sprite.naturalWidth  > 0;
  const walkReady  = walkSprite  && walkSprite.complete  && walkSprite.naturalWidth  > 0;
  const brakeReady = brakeSprite && brakeSprite.complete && brakeSprite.naturalWidth > 0;

  // Window of time after a flap during which the flap-cycle sprites show.
  // Outside this window, bird glides on the base sprite.
  const FLAP_ANIM_DURATION = 0.28;  // seconds — about one full flap cycle
  const recentFlap = (b.flapAnimTime !== undefined) && b.flapAnimTime < FLAP_ANIM_DURATION;

  if (isSkidding && brakeReady) {
    activeSprite = brakeSprite;
  } else if (inAir && recentFlap && flyReady && fly2Ready) {
    // Cycle fly + fly2 during the flap animation window
    const flyFrame = Math.floor(performance.now() / 80) % 2;
    activeSprite = flyFrame === 0 ? flySprite : fly2Sprite;
  } else if (inAir && fly2Ready) {
    // Gliding in air between flaps — use fly2 (wings level/down) as the
    // soaring pose. NOT the base ostrich sprite (which has standing legs).
    activeSprite = fly2Sprite;
  } else if (isWalking && walkReady) {
    const walkFrame = Math.floor(performance.now() / 160) % 2;
    activeSprite = walkFrame === 0 ? sprite : walkSprite;
  }
  // else: activeSprite stays as the default sprite (standing on ground)

  // Vertical bob — only while actively walking or flapping. Gliding = no bob.
  let bobY = 0;
  if (isSkidding) {
    bobY = 0;
  } else if (isWalking) {
    bobY = Math.sin(performance.now() / 80) * 2;
  } else if (inAir && recentFlap) {
    bobY = Math.cos(performance.now() / 35) * 1.0;
  }
  const drawY = b.y + bobY;

  ctx.save();
  ctx.imageSmoothingEnabled = false;
  if (b.facingLeft) {
    ctx.translate(b.x + BIRD_W, drawY);
    ctx.scale(-1, 1);
    ctx.drawImage(activeSprite, 0, 0, BIRD_W, BIRD_H);
  } else {
    ctx.drawImage(activeSprite, b.x, drawY, BIRD_W, BIRD_H);
  }
  ctx.restore();
}

// Offscreen canvas used to tint a sprite by source-atop compositing.
// Persistent so we don't allocate every frame.
const _tintCanvas = document.createElement('canvas');
_tintCanvas.width = BIRD_W;
_tintCanvas.height = BIRD_H;
const _tintCtx = _tintCanvas.getContext('2d');

function drawPlayer() {
  if (!player.alive) return;
  drawShadow(player);
  if (player.birthTimer > 0) {
    drawBirthSilhouette(player, sprites.ostrich, player.birthDuration, player.birthMode);
    drawBaseBirthFlash(player);
  } else {
    drawBird(player, sprites.ostrich, sprites.ostrichMove, sprites.ostrichFly, sprites.ostrichFly2, sprites.ostrichBrake);
  }
}

// Birth animation renderer. Two modes:
//   'player' = first ~70% alternates top-white/bottom-grey ↔ top-grey/bottom-white
//              (the flickering "halves" effect), accelerating. Last ~30% goes
//              solid YELLOW. Then bird becomes alive (real sprite).
//   'enemy'  = solid white silhouette for the entire birth duration.
function drawBirthSilhouette(b, sprite, totalDuration, mode) {
  if (!sprite || !sprite.complete || sprite.naturalWidth === 0) return;
  const progress = 1 - (b.birthTimer / totalDuration);   // 0 → 1
  const dirLeft = b.facingLeft;

  if (mode === 'player') {
    if (progress < 0.70) {
      // Phase 1: alternating top/bottom white-grey halves, faster as it goes
      const localProgress = progress / 0.70;             // 0 → 1 within phase 1
      const freq = 3 + localProgress * 15;               // 3 → 18 Hz
      const phase = Math.floor(performance.now() / 1000 * freq) % 2;
      const topColor    = phase === 0 ? '#ffffff' : '#9a9aa6';
      const bottomColor = phase === 0 ? '#9a9aa6' : '#ffffff';
      drawTwoToneBird(b, sprite, topColor, bottomColor, dirLeft);
    } else {
      // Phase 2: solid yellow body
      drawSolidTintBird(b, sprite, '#ffe040', dirLeft);
    }
  } else {
    // Enemy mode: solid white silhouette throughout
    drawSolidTintBird(b, sprite, '#ffffff', dirLeft);
  }
}

// Helper: draws the bird's sprite outline filled with a single solid color.
// Uses source-atop on an offscreen canvas so only the bird's pixels are tinted.
function drawSolidTintBird(b, sprite, color, facingLeft) {
  _tintCtx.clearRect(0, 0, BIRD_W, BIRD_H);
  _tintCtx.imageSmoothingEnabled = false;
  _tintCtx.drawImage(sprite, 0, 0, BIRD_W, BIRD_H);
  _tintCtx.globalCompositeOperation = 'source-atop';
  _tintCtx.fillStyle = color;
  _tintCtx.fillRect(0, 0, BIRD_W, BIRD_H);
  _tintCtx.globalCompositeOperation = 'source-over';
  blitTintCanvas(b, facingLeft);
}

// Helper: top half = topColor, bottom half = bottomColor, masked to bird outline
function drawTwoToneBird(b, sprite, topColor, bottomColor, facingLeft) {
  _tintCtx.clearRect(0, 0, BIRD_W, BIRD_H);
  _tintCtx.imageSmoothingEnabled = false;
  _tintCtx.drawImage(sprite, 0, 0, BIRD_W, BIRD_H);
  _tintCtx.globalCompositeOperation = 'source-atop';
  _tintCtx.fillStyle = topColor;
  _tintCtx.fillRect(0, 0, BIRD_W, BIRD_H / 2);
  _tintCtx.fillStyle = bottomColor;
  _tintCtx.fillRect(0, BIRD_H / 2, BIRD_W, BIRD_H / 2);
  _tintCtx.globalCompositeOperation = 'source-over';
  blitTintCanvas(b, facingLeft);
}

function blitTintCanvas(b, facingLeft) {
  ctx.save();
  ctx.imageSmoothingEnabled = false;
  if (facingLeft) {
    ctx.translate(b.x + BIRD_W, b.y);
    ctx.scale(-1, 1);
    ctx.drawImage(_tintCanvas, 0, 0);
  } else {
    ctx.drawImage(_tintCanvas, b.x, b.y);
  }
  ctx.restore();
}

// Flash a bright overlay on the BASE'S walking strip behind a birthing player.
function drawBaseBirthFlash(b) {
  const cycle = Math.floor(performance.now() / 80) % 2;
  if (cycle === 0) return;
  const baseColl = getBaseCollisionRect();
  const flashX = b.x + BIRD_W / 2 - 30;
  const flashY = baseColl.y;
  ctx.save();
  ctx.fillStyle = 'rgba(255, 255, 200, 0.5)';
  ctx.fillRect(flashX, flashY, 60, 3);
  ctx.restore();
}

// Flash the silver pad of an enemy's birth platform.
function drawPadBirthFlash(e) {
  if (!e.birthPad) return;
  const cycle = Math.floor(performance.now() / 80) % 2;
  if (cycle === 0) return;
  const px = platformX(e.birthPad);
  const pw = platformWidth(e.birthPad);
  ctx.save();
  ctx.fillStyle = 'rgba(255, 255, 200, 0.5)';
  ctx.fillRect(px, e.birthPad.y, pw, 3);
  ctx.restore();
}

// Render floating score popups (after egg pickups, etc.) — fade out over time
function drawScorePops() {
  ctx.save();
  ctx.font = 'bold 18px "JoustArcade", "Press Start 2P", monospace';
  ctx.textAlign = 'left';
  for (const pop of scorePops) {
    const alpha = 1 - (pop.age / pop.lifetime);
    // Shadow for legibility
    ctx.fillStyle = `rgba(0, 0, 0, ${alpha * 0.7})`;
    ctx.fillText(pop.text, pop.x + 1, pop.y + 1);
    // Main text
    const c = pop.color;
    // Convert hex to rgba with alpha
    const r = parseInt(c.slice(1, 3), 16);
    const g = parseInt(c.slice(3, 5), 16);
    const b = parseInt(c.slice(5, 7), 16);
    ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${alpha})`;
    ctx.fillText(pop.text, pop.x, pop.y);
  }
  ctx.restore();
}

function drawEnemies() {
  for (const e of enemies) {
    if (!e.alive) continue;
    drawShadow(e);
    // Pick sprite set for this enemy's tier.
    const tier = KNIGHT_TIERS[e.tier] || KNIGHT_TIERS.shadowlord;
    const baseSprite = sprites[tier.sprite];
    // Bounder + Hunter only have a single sprite right now — fall back to
    // baseSprite for walk/fly/brake until tier-specific frames exist.
    const moveSprite  = sprites[tier.sprite + 'Move']  || baseSprite;
    const flySprite   = sprites[tier.sprite + 'Fly']   || baseSprite;
    const fly2Sprite  = sprites[tier.sprite + 'Fly2']  || baseSprite;
    const brakeSprite = sprites[tier.sprite + 'Brake'] || null;

    if (e.birthTimer && e.birthTimer > 0) {
      drawBirthSilhouette(e, baseSprite, e.birthDuration, e.birthMode);
      drawPadBirthFlash(e);
    } else {
      drawBird(e, baseSprite, moveSprite, flySprite, fly2Sprite, brakeSprite);
    }
  }
}

// Render all eggs. Eggs falling rotate slightly with horizontal velocity.
// Eggs resting near hatch time pulse to warn the player.
function drawEggs() {
  for (const egg of eggs) {
    if (!egg.alive) continue;

    ctx.save();
    ctx.translate(egg.x + EGG_W / 2, egg.y + EGG_H / 2);
    if (egg.state === 'falling') {
      ctx.rotate(egg.vx * 0.004 + egg.vy * 0.002);
    }

    // Warning pulse if near hatching
    if (egg.state === 'resting' && egg.timer < 2.0) {
      const pulse = 0.5 + 0.5 * Math.sin(performance.now() / 80);
      ctx.strokeStyle = `rgba(255, 140, 60, ${pulse * 0.7})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.ellipse(0, 0, EGG_W / 2 + 3, EGG_H / 2 + 3, 0, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Egg body — cream tan
    ctx.fillStyle = '#f0e0c0';
    ctx.beginPath();
    ctx.ellipse(0, 0, EGG_W / 2, EGG_H / 2, 0, 0, Math.PI * 2);
    ctx.fill();

    // Shading line
    ctx.strokeStyle = '#a08060';
    ctx.lineWidth = 1.4;
    ctx.stroke();

    // Specks for character
    ctx.fillStyle = '#8c6b48';
    ctx.beginPath(); ctx.arc(-2.5, -3.5, 1.0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc( 3.0,  3.5, 0.9, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc( 1.0, -5.5, 0.7, 0, Math.PI * 2); ctx.fill();

    ctx.restore();
  }
}

//── Main loop ────────────────────────────────────────────────────────────────
let lastT = performance.now();
function frame(now) {
  const dt = Math.min(0.033, (now - lastT) / 1000); // clamp to 30fps min step
  lastT = now;

  // Pause freezes game logic but keeps rendering
  if (state === 'PLAYING' && !paused) {
    update(dt);
  }
  if (!paused) {
    updateParticles(dt);
    updateRiderlessBirds(dt);
  }

  drawBackground();
  drawLava(dt);             // lava body — behind everything
  drawFloorStrips();        // floor strips extend into base area
  drawPlatforms();          // base + floats render ON TOP, hiding floor overlap
  drawBurnFlamesAtEdges();  // flames on top of floor + base for vivid burn effect
  drawRiderlessBirds();     // escaping unmounted ostriches
  drawParticles();          // knight-burst sparkles + materialize particles
  drawEggs();
  drawEnemies();
  drawPlayer();
  drawScorePops();
  drawSkidDebugFlash();
  if (paused) drawPausedOverlay();

  requestAnimationFrame(frame);
}

// Dim everything and show large PAUSED text in the center
function drawPausedOverlay() {
  ctx.save();
  // Dim the playfield
  ctx.fillStyle = 'rgba(0, 0, 0, 0.55)';
  ctx.fillRect(0, 0, W, H);
  // PAUSED text
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#ffdb4a';
  ctx.shadowColor = 'rgba(255, 219, 74, 0.6)';
  ctx.shadowBlur = 20;
  ctx.font = 'bold 64px "JoustArcade", "Press Start 2P", monospace';
  ctx.fillText('PAUSED', W / 2, H / 2 - 20);
  ctx.shadowBlur = 0;
  ctx.font = 'bold 18px "JoustArcade", "Press Start 2P", monospace';
  ctx.fillStyle = 'rgba(255, 219, 74, 0.7)';
  ctx.fillText('PRESS P TO RESUME', W / 2, H / 2 + 40);
  ctx.restore();
}

// Temporary debug — flashes "SKID!" on screen when the skid trigger fires.
// Helps confirm whether the issue is the trigger logic or the audio output.
// Remove once we've verified the skid is reliably firing.
function drawSkidDebugFlash() {
  const t = performance.now() / 1000;
  const since = t - lastSkidFireTime;
  if (since < 0.5) {
    const alpha = 1 - (since / 0.5);
    ctx.fillStyle = `rgba(255, 200, 60, ${alpha})`;
    ctx.font = 'bold 14px "JetBrains Mono", monospace';
    ctx.fillText('SKID!', 14, H - 14);
  }
}

//── Boot ─────────────────────────────────────────────────────────────────────
updateLivesHUD();
startBtn.addEventListener('click', startGame);
requestAnimationFrame(frame);

</script>
</body>
