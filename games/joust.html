<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOUST v0.62 — Arcade Reactor</title>
<link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png">
<style>
  @font-face {
    font-family: 'JoustArcade';
    src: url('../assets/joust/joust.otf') format('opentype'),
         url('../assets/joust/joust.ttf') format('truetype');
    font-display: swap;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: #050813; color: #e6edf3;
    font-family: 'JetBrains Mono', ui-monospace, Consolas, monospace;
    height: 100%; overflow: hidden;
  }
  body {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh;
  }
  .wrap {
    position: relative; width: 1200px; height: 720px;
    max-width: 100vw; max-height: 100vh;
    aspect-ratio: 4 / 3;
  }
  canvas { display: block; width: 100%; height: 100%; cursor: default; background: #050813; }

  .hud {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 16px; pointer-events: none;
    color: #ffdb4a; font-size: 16px; letter-spacing: 0.18em;
    text-shadow: 0 0 8px rgba(255, 219, 74, 0.4);
    font-family: 'JoustArcade', 'JetBrains Mono', monospace;
  }
  .hud-section { display: flex; gap: 24px; }
  .hud-label { color: rgba(255, 219, 74, 0.55); font-size: 13px; letter-spacing: 0.22em; margin-right: 6px; }
  .hud-value { color: #ffdb4a; }
  .lives-icons { display: inline-flex; gap: 4px; vertical-align: middle; }
  .life-icon { width: 12px; height: 12px; }

  .overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(5, 8, 19, 0.85);
    text-align: center; padding: 24px;
    pointer-events: auto;
  }
  .overlay.hidden { display: none; }
  .overlay h1 {
    font-size: 48px; letter-spacing: 0.28em; margin: 0 0 14px;
    color: #ffdb4a; text-shadow: 0 0 24px rgba(255, 219, 74, 0.5);
  }
  .overlay h2 {
    font-size: 24px; letter-spacing: 0.2em; margin: 0 0 14px;
    color: #ff4a6e; text-shadow: 0 0 16px rgba(255, 74, 110, 0.5);
  }
  .overlay p { color: rgba(230, 237, 243, 0.7); margin: 4px 0; font-size: 13px; letter-spacing: 0.05em; line-height: 1.6; }
  .overlay .big-score { color: #ffdb4a; font-size: 28px; margin: 12px 0 16px; letter-spacing: 0.12em; }
  .overlay button {
    margin-top: 18px; padding: 12px 32px; background: transparent;
    color: #ffdb4a; border: 1px solid rgba(255, 219, 74, 0.5);
    font-family: inherit; font-size: 13px; letter-spacing: 0.22em; cursor: pointer;
    border-radius: 4px;
    transition: background 0.15s ease, color 0.15s ease, box-shadow 0.15s ease;
  }
  .overlay button:hover {
    background: rgba(255, 219, 74, 0.12);
    box-shadow: 0 0 16px rgba(255, 219, 74, 0.3);
  }

  .version-tag {
    position: absolute; bottom: 8px; right: 12px;
    font-size: 10px; color: rgba(255, 255, 255, 0.18); letter-spacing: 0.2em;
    pointer-events: none;
  }

  .back-link {
    position: fixed; top: 12px; left: 16px;
    color: rgba(255, 219, 74, 0.5); text-decoration: none;
    font-size: 12px; letter-spacing: 0.2em;
    transition: color 0.15s ease;
    z-index: 10;
  }
  .back-link:hover { color: #ffdb4a; }
</style>
</head>
<body>
  <a href="../index.html" class="back-link">← ARCADE REACTOR</a>
  <div class="wrap">
    <canvas id="game" width="1200" height="720"></canvas>
    <div class="hud">
      <div class="hud-section">
        <div><span class="hud-label">SCORE</span><span class="hud-value" id="score">0</span></div>
        <div><span class="hud-label">WAVE</span><span class="hud-value" id="wave">1</span></div>
      </div>
      <div class="hud-section">
        <div><span class="hud-label">LIVES</span><span class="lives-icons" id="lives"></span></div>
      </div>
    </div>
    <div class="overlay" id="overlay">
      <h1>JOUST</h1>
      <p>Flap to fly. Joust by lance height — higher lance loses.</p>
      <p>Touch the lava and you die. Wrap around the edges.</p>
      <p style="margin-top: 16px;">A/D or ←→ to move · Space/W/↑ to flap</p>
      <button id="startBtn">START</button>
    </div>
    <div class="version-tag" id="versionTag">v0.62</div>
  </div>

<script>
//──────────────────────────────────────────────────────────────────────────────
// JOUST v0.62 — Arcade Reactor
//──────────────────────────────────────────────────────────────────────────────

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width;   // 800
const H = canvas.height;  // 600

// Disable image smoothing so pixel art stays crisp when scaled
ctx.imageSmoothingEnabled = false;

//── Sprites ──────────────────────────────────────────────────────────────────
const sprites = {
  // Birds
  ostrich: new Image(),
  ostrichMove: new Image(),
  ostrichFly: new Image(),
  ostrichFly2: new Image(),
  ostrichBrake: new Image(),
  buzzard: new Image(),       // Shadow Lord — 1000 pts (currently purple, will be blue)
  buzzardMove: new Image(),
  buzzardFly: new Image(),
  buzzardFly2: new Image(),
  buzzardBrake: new Image(),
  bounder: new Image(),       // Bounder — 500 pts (red, weakest)
  hunter: new Image(),         // Hunter — 750 pts (white, middle)
  // Platform sprites
  base: new Image(),
  floorone: new Image(),
  floortwoleft: new Image(),
  floortworight: new Image(),
  floorthreemiddle: new Image(),
  floorfourleft: new Image(),
  floorfourright: new Image(),
  floorfourfarright: new Image(),
  floorfivemiddle: new Image(),
  floorsixleft: new Image(),
  floorsixright: new Image(),
};
sprites.ostrich.src     = '../assets/joust/ostrich.png';
sprites.ostrichMove.src = '../assets/joust/ostrichmove.png';
sprites.ostrichFly.src  = '../assets/joust/fly.png';
sprites.ostrichFly2.src = '../assets/joust/fly2.png';
sprites.ostrichBrake.src = '../assets/joust/ostrichbrake.png';
sprites.buzzard.src     = '../assets/joust/buzzard.png';
sprites.buzzardMove.src = '../assets/joust/buzzardmove.png';
sprites.buzzardFly.src  = '../assets/joust/buzzardfly.png';
sprites.buzzardFly2.src = '../assets/joust/buzzardfly2.png';
sprites.buzzardBrake.src = '../assets/joust/buzzardbrake.png';
sprites.bounder.src      = '../assets/joust/bounder.png';
sprites.hunter.src       = '../assets/joust/hunter.png';
sprites.base.src              = '../assets/joust/base.png';
sprites.floorone.src          = '../assets/joust/floorone.png';
sprites.floortwoleft.src      = '../assets/joust/floortwoleft.png';
sprites.floortworight.src     = '../assets/joust/floortworight.png';
sprites.floorthreemiddle.src  = '../assets/joust/floorthreemiddle.png';
sprites.floorfourleft.src     = '../assets/joust/floorfourleft.png';
sprites.floorfourright.src    = '../assets/joust/floorfourright.png';
sprites.floorfourfarright.src = '../assets/joust/floorfourfarright.png';
sprites.floorfivemiddle.src   = '../assets/joust/floorfivemiddle.png';
sprites.floorsixleft.src      = '../assets/joust/floorsixleft.png';
sprites.floorsixright.src     = '../assets/joust/floorsixright.png';

// Diagnostic: log every sprite as it loads or fails so we can see issues
for (const name of Object.keys(sprites)) {
  const img = sprites[name];
  img.addEventListener('load', () => {
    console.log(`[sprite] loaded "${name}" (${img.naturalWidth}x${img.naturalHeight})`);
  });
  img.addEventListener('error', () => {
    console.warn(`[sprite] FAILED to load "${name}" — file missing or invalid`);
  });
}

//── Constants ─────────────────────────────────────────────────────────────────
const GRAVITY        = 280;    // px/sec² — ANTI-gravity feel; speed-boosted flaps dominate
const FLAP_IMPULSE   = -200;   // px/sec — BASE flap; horizontal speed amplifies it (see updatePlayer)
const FLAP_SPEED_BONUS = 0.50; // at full horizontal speed, flap impulse is (1 + this) × base
const MAX_VY_UP      = -380;   // cap upward velocity
const TERMINAL_VY    = 220;    // cap downward velocity — slow fall, never "like a rock"
const HORIZ_ACCEL    = 700;    // px/sec²
const HORIZ_MAX      = 240;    // max horizontal speed (RUNNING)
const WALK_SPEED     = 110;    // walking speed cap — below SKID trigger (132) so walking can't skid
const HOLD_THRESHOLD = 0.18;   // sec — press shorter than this = "tap" (walk), longer = "hold" (run)
const AIR_FRICTION   = 0.99;   // per-frame multiplier when no input — long drift between flaps
const GROUND_DECEL   = 300;    // px/sec² — LINEAR deceleration on ground (not multiplicative).
                               //   Faster speed = proportionally longer slide. From full speed (240),
                               //   stops in 0.8 sec and slides ~96 px. Lava edges are real danger.
const FLAP_COOLDOWN  = 0.16;   // sec — minimum between flaps (key must be re-pressed)

const BIRD_W         = 56;
const BIRD_H         = 52;
const BIRD_JOUST_INSET_X = 12;  // horizontal inset for joust collision (excludes lance + tail)
const LANCE_OFFSET_Y = 22;     // lance is in the MIDDLE of the sprite (helmet above, body below)
const LANCE_TOLERANCE= 9;      // pixels — if lances within this, both bounce

// LAVA + FLOOR system. The floor is a thin rocky strip at the SAME level as
// the base's walking surface — together they form one continuous walkable
// ground. Below the floor is a GAP where the flame body sits, then the
// lava surface. The floor burns from outside-in starting at wave 3 (arcade
// authentic). Set TEST_BURN_FROM_WAVE_1 to see the burn from the start.
const FLOOR_STRIP_HEIGHT  = 8;        // thin rocky walkable strip
const LAVA_GAP            = 22;       // vertical space where flames sit (between floor bottom and lava surface)
const TEST_BURN_FROM_WAVE_1 = true;   // false = arcade authentic (burn starts wave 3)
const FLOOR_BURN_PER_WAVE = 90;       // pixels burned from each side per wave
const FLOOR_BURN_RATE     = 50;       // pixels/sec animation speed during transition
const CEILING        = 28;     // hard ceiling near top

// Floor + lava Y positions are dynamic — they follow the base sprite so
// everything stays aligned even if BASE_WALK_Y_PCT is tuned.
function getFloorStripY()  { return getBaseCollisionRect().y; }
function getFloorBottomY() { return getFloorStripY() + FLOOR_STRIP_HEIGHT; }
function getLavaTopY()     { return getFloorBottomY() + LAVA_GAP; }

// Burn state — updated each frame to smoothly animate toward the target
let floorBurnAmount = 0;
let targetBurnAmount = 0;
let lavaWavePhase = 0;

const ENEMY_SPAWN_INTERVAL = 4.0; // sec between spawns (early game)
// Wave structure constants
// Real arcade Joust: wave 1 = 3 enemies, wave 2 = 4, wave 3+ = 5 (caps)
const MAX_ENEMIES_ON_SCREEN = 5;          // hard cap regardless of wave size
const SPAWN_PROTECTION_DURATION = 1.5;    // legacy — used only as fallback now
// Birth duration is now DYNAMIC per sound — looked up from the loaded WAV
// after decode. Each bird type plays its own birth sound for its own length.
// If a sound isn't loaded yet, falls back to 2.0s so the bird still births.
function getBirthDuration(soundName) {
  const buf = audioBuffers[soundName];
  if (buf && buf.duration > 0) return buf.duration;
  return 2.0;
}
function enemiesForWave(waveNum) {
  return Math.min(2 + waveNum, 5);        // wave 1=3, wave 2=4, wave 3+=5
}
const WAVE_SPAWN_SPREAD = 1.2;            // seconds between staggered births at wave start

// Knight tiers — three enemy types with distinct sprites, score values, and
// (eventually) speed/agility. Egg hatch promotes one tier (Bounder → Hunter
// → Shadow Lord → Bounder). For now they all share AI behavior and birth code.
// Per-tier AI tuning ported from the 1982 ROM (DYTBL initial values for
// game-adjust level 0). Each value scaled ×3 for our 720-tall world.
//   dnRange  = BODNRG/HUDNRG/SHDNRG initial — committed dive engages
//              when player is this far BELOW us in Y.
//   upRange  = -BOUPRG/HUUPRG/SHUPRG initial — committed climb engages
//              when player is this far ABOVE us in Y.
//   levelTime= BOLETM/HULETM/SHLETM — how long we stay in "level flight"
//              before reconsidering. Shadow Lord decides 2× faster.
//   dnVyCap  = BODNVY/HUDNVY — fall-speed cap while diving (px/sec).
const KNIGHT_TIERS = {
  bounder: {
    sprite: 'bounder',           // red, weakest, 500 pts
    score: 500,
    flapPower: 0.75,             // weakest flap
    aiAggression: 0.7,           // less aggressive
    sightWindowX: 180,           // legacy, unused in canonical AI
    birthSound: 'enemybirth',
    // canonical AI tuning
    dnRange:   42,               // BODNRG=14 ×3
    upRange:   45,               // -BOUPRG=15 ×3
    levelTime: 0.35,             // BOLETM=20+1 ticks @ 60fps
    dnVyCap:   220,              // BODNVY=$0100 → ~220 px/s in our scale
  },
  hunter: {
    sprite: 'hunter',            // white, middle, 750 pts
    score: 750,
    flapPower: 0.90,
    aiAggression: 1.0,
    sightWindowX: 280,
    birthSound: 'enemybirth',
    dnRange:   45,               // HUDNRG=15 ×3
    upRange:   45,
    levelTime: 0.30,
    dnVyCap:   340,              // HUDNVY=$0200 → faster fall while diving
  },
  shadowlord: {
    sprite: 'buzzard',           // purple-blue (legacy name), toughest, 1000 pts
    score: 1000,
    flapPower: 1.00,             // strongest flap, fastest climber
    aiAggression: 1.3,
    sightWindowX: 380,
    birthSound: 'bluebirth',     // Mike's confirmed WAV
    dnRange:   60,               // SHDNRG=20 ×3 — wider engagement window
    upRange:   60,
    levelTime: 0.15,             // SHLETM=8+1 ticks — 2× more reactive
    dnVyCap:   180,              // SHDNVY: shadow lord uses gravity, doesn't flap-dive hard
  },
};
// Egg hatching chain — wraps around at the top
const NEXT_TIER = {
  bounder:    'hunter',
  hunter:     'shadowlord',
  shadowlord: 'bounder',
};
// Wave-based enemy mix. Wave 1 = all bounders, harder waves mix in tougher tiers.
function pickEnemyTierForWave(waveNum) {
  const r = Math.random();
  if (waveNum === 1) return 'bounder';
  if (waveNum === 2) return r < 0.5 ? 'bounder' : 'hunter';
  if (waveNum === 3) return r < 0.4 ? 'bounder' : (r < 0.8 ? 'hunter' : 'shadowlord');
  // Wave 4+: mostly hunters/shadowlords
  if (r < 0.2) return 'bounder';
  if (r < 0.6) return 'hunter';
  return 'shadowlord';
}

// Spawn pads: the four small platforms with silver "birth strips" on top.
// Enemies materialize from these at wave start. Player materializes from the
// base platform's central pad.
const SPAWN_PAD_SPRITES = [
  'floorfourleft', 'floorfourright',
  'floortwoleft',  'floortworight',
];
function getSpawnPads() {
  const out = [];
  for (const p of platforms) {
    if (SPAWN_PAD_SPRITES.includes(p.sprite)) {
      const px = platformX(p);
      const pw = platformWidth(p);
      out.push({
        x: px + pw / 2 - BIRD_W / 2,
        y: p.y - BIRD_H,
        platform: p,
      });
    }
  }
  return out;
}

const STARTING_LIVES = 3;

const COLOR_BG       = '#050813';
const COLOR_STAR     = 'rgba(255, 255, 255, 0.5)';
const COLOR_STAR_DIM = 'rgba(255, 255, 255, 0.15)';
const COLOR_PLATFORM = '#3a3f4a';
const COLOR_PLATFORM_EDGE = '#5a6070';
const COLOR_LAVA     = '#ff3d6e';
const COLOR_LAVA_HOT = '#ffb3c5';
const COLOR_PLAYER   = '#ffdb4a';
const COLOR_PLAYER_RIDER = '#6b3d99';
const COLOR_ENEMY    = '#ff4a4a';
const COLOR_ENEMY_RIDER = '#2a2a3a';
const COLOR_LANCE    = '#e6edf3';

//── State ─────────────────────────────────────────────────────────────────────
let state = 'MENU'; // MENU, PLAYING, GAME_OVER
let paused = false; // can pause during PLAYING via P key
let score = 0;
let wave = 1;
// Canonical Joust "smart enemy" quota (WSMART in 1982 ROM).
// Bounders default to LINET (dumb line-tracking wander). One by one, they
// promote themselves to tier-specific chase AI until nSmart reaches wSmart.
// Wave 1 only one enemy hunts you at a time; later waves more in parallel.
// nSmart is recomputed each frame from enemy.isSmart flags.
let wSmart = 1;
let lives = STARTING_LIVES;
let enemiesKilledThisWave = 0;
let spawnTimer = 0;
let spawnQueue = [];  // queued enemy births at wave start: [{delay: seconds}]
let lastSkidFireTime = -10;  // for debug flash — timestamp of last skid trigger

const hudScore = document.getElementById('score');
const hudWave  = document.getElementById('wave');
const hudLives = document.getElementById('lives');
const overlay  = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');

//── Platforms ────────────────────────────────────────────────────────────────
// Each platform is positioned by its CENTER (as fraction of canvas width) +
// absolute y. Sprites are drawn at PLATFORM_DRAW_SCALE × natural size.
// Both collision and rendering use the scaled dimensions, so positions stay
// proportionally correct if canvas resizes.
//
// MIKE: tune cx (0.0 = far left, 1.0 = far right) and y to nudge layout.
const PLATFORM_THICKNESS  = 14;
const PLATFORM_DRAW_SCALE = 0.65;   // smaller = more flying room between platforms

const platforms = [
  // Top row (small side ledges)
  { sprite: 'floorfourleft',     cx: 0.20, y: 130 },
  { sprite: 'floorfourright',    cx: 0.80, y: 130 },
  // Middle row (single wide)
  { sprite: 'floorthreemiddle',  cx: 0.50, y: 250 },
  // Lower row (left + right)
  { sprite: 'floortwoleft',      cx: 0.20, y: 365 },
  { sprite: 'floortworight',     cx: 0.80, y: 365 },
  // floorfourfarright — butted right of floortworight, half-height down
  { sprite: 'floorfourfarright', cx: 0.92, y: 380 },
  // Bottom row (wide platform just above base)
  { sprite: 'floorone',          cx: 0.50, y: 480 },
];

// Returns the scaled width of a platform (collision + rendering use this)
function platformWidth(p) {
  const s = sprites[p.sprite];
  if (s && s.complete && s.naturalWidth > 0) {
    return s.naturalWidth * PLATFORM_DRAW_SCALE;
  }
  return 120; // fallback
}

// Returns the scaled height (for rendering)
function platformHeight(p) {
  const s = sprites[p.sprite];
  if (s && s.complete && s.naturalHeight > 0) {
    return s.naturalHeight * PLATFORM_DRAW_SCALE;
  }
  return 30;
}

// Returns the top-left x coordinate (derived from cx)
function platformX(p) {
  return W * p.cx - platformWidth(p) / 2;
}

// The BASE platform is special — spans the full width with built-in score
// window and corner flame lanterns. Its collision shape excludes the corner
// flame zones (those are death zones, equivalent to lava).
const BASE_HEIGHT_GUESS = 120;
const BASE_TOP_Y_FALLBACK = H - BASE_HEIGHT_GUESS;
const BASE_DRAW_W_PCT = 0.78;        // base sprite renders at this fraction of canvas width
const BASE_WALK_X_START_PCT = 0.18;  // safe walking area as fraction of width
const BASE_WALK_X_END_PCT   = 0.82;
const BASE_WALK_Y_PCT  = 0.05;       // walking surface as fraction of base height from sprite TOP
                                     // For base.png 1143x140, 0.05 = 7px from top.
                                     // SMALLER = walking surface higher (closer to sprite top)
                                     // LARGER  = walking surface lower (closer to score window)

function getBaseCollisionRect() {
  const baseS = sprites.base;
  const drawW = W * BASE_DRAW_W_PCT;
  let drawH = BASE_HEIGHT_GUESS;
  if (baseS && baseS.complete && baseS.naturalWidth > 0) {
    drawH = baseS.naturalHeight * (drawW / baseS.naturalWidth);
  }
  const topY = (H - drawH) + drawH * BASE_WALK_Y_PCT;
  return {
    x: W * BASE_WALK_X_START_PCT,
    y: topY,
    w: W * (BASE_WALK_X_END_PCT - BASE_WALK_X_START_PCT),
    sprite: 'base',
    isBase: true,
  };
}

function getAllPlatforms() {
  const out = [];
  for (const p of platforms) {
    out.push({
      x: platformX(p),
      y: p.y,
      w: platformWidth(p),
      sprite: p.sprite,
    });
  }
  out.push(getBaseCollisionRect());

  // Floor strips on either side of base (these BURN AWAY by wave).
  // Extend collision to touch the BASE'S COLLISION RECT (not its sprite edge).
  // The base sprite is ~78% wide but its walkable rect is only ~64% wide —
  // the difference is rocky decoration that isn't walkable. Floor strip must
  // reach the walkable edge or birds fall through the gap.
  const baseColl = getBaseCollisionRect();
  const baseCollLeftX  = baseColl.x;
  const baseCollRightX = baseColl.x + baseColl.w;
  const floorY = getFloorStripY();

  // Left strip — from burn edge to LEFT edge of base's walkable area
  const leftStripW = baseCollLeftX - floorBurnAmount;
  if (leftStripW > 4) {
    out.push({
      x: floorBurnAmount,
      y: floorY,
      w: leftStripW,
      sprite: 'floor',
    });
  }

  // Right strip — from RIGHT edge of base's walkable area to (W - burn edge)
  const rightStripW = (W - floorBurnAmount) - baseCollRightX;
  if (rightStripW > 4) {
    out.push({
      x: baseCollRightX,
      y: floorY,
      w: rightStripW,
      sprite: 'floor',
    });
  }

  return out;
}

// Sets the target burn level for the current wave. The actual burn animates
// toward this target via FLOOR_BURN_RATE per second in update().
function setFloorBurnTarget(waveNum) {
  // In arcade Joust the floor burns starting wave 3. In test mode we start
  // immediately on wave 1 so we can see the mechanic.
  const effectiveBurnWave = TEST_BURN_FROM_WAVE_1 ? waveNum : Math.max(0, waveNum - 2);
  const baseDrawW = W * BASE_DRAW_W_PCT;
  const maxBurn   = (W - baseDrawW) / 2;  // can't burn past the base edges
  targetBurnAmount = Math.min(maxBurn, effectiveBurnWave * FLOOR_BURN_PER_WAVE);
}

// Spawn position — center of the base platform's safe walking area.
const SPAWN_X = W * 0.5 - BIRD_W / 2;
const SPAWN_Y = BASE_TOP_Y_FALLBACK + (BASE_HEIGHT_GUESS * BASE_WALK_Y_PCT) - BIRD_H;

//── Player ───────────────────────────────────────────────────────────────────
const player = {
  x: SPAWN_X, y: SPAWN_Y,
  vx: 0, vy: 0,
  facingLeft: false,
  onGround: true,
  flapTimer: 0,        // cooldown
  flapAnimTime: 0,     // visual: how long since last flap (drives wing animation)
  alive: true,
  respawnTimer: 0,
  invulnTimer: 0,      // brief invulnerability after respawn
  birthTimer: 0,       // counts down during materialize animation (frozen on pad)
  isSkidding: false,   // hard-brake state — set when reversing at speed, exits at vx≈0
  wasSkidding: false,  // edge detection for sound trigger (deprecated, kept for compatibility)
  lastAbsVx: 0,        // |vx| from previous frame, for skid detection
};

//── Enemies ──────────────────────────────────────────────────────────────────
const enemies = [];

//── Eggs ─────────────────────────────────────────────────────────────────────
const EGG_W = 18;
const EGG_H = 22;
const EGG_HATCH_TIME = 10.0;    // sec on a platform before hatching
const EGG_RESTING_SCORE = 250;  // flat for picking up a landed egg
const EGG_CHAIN_VALUES = [250, 500, 750, 1000];  // in-air consecutive catches
const EGG_AIR_DRAG = 0.997;     // very gentle horizontal drag — eggs glide far
const EGG_GRAVITY = 200;        // anti-gravity — eggs float as they fall
const EGG_TERMINAL_VY = 160;    // slow fall cap

const eggs = [];  // each: { x, y, vx, vy, state, timer, alive }
let eggCatchChain = 0;        // current chain step (0..N). Awards EGG_CHAIN_VALUES[min(chain, max)].
let eggChainTimer = 0;        // seconds since last egg pickup. Resets chain when > EGG_CHAIN_TIMEOUT.
const EGG_CHAIN_TIMEOUT = 10.0; // ~10s without a catch and chain resets

// Spawn an egg from a dying enemy. Egg shoots AWAY from player with modest
// horizontal velocity and a small upward bounce, then floats down. Player
// should NOT be able to grab it immediately — has to chase.
function spawnEgg(enemyX, enemyY, awayFromX, tierName) {
  const eggCenterX = enemyX + BIRD_W / 2;
  const dirAway = eggCenterX >= awayFromX ? 1 : -1;
  eggs.push({
    x: enemyX + (BIRD_W - EGG_W) / 2,
    y: enemyY + (BIRD_H - EGG_H) / 2,
    vx: dirAway * (220 + Math.random() * 60),   // 220-280 px/sec — moderate
    vy: -110 - Math.random() * 50,              // small upward bounce
    state: 'falling',
    timer: 0,
    tier: tierName || 'bounder',                // who this egg came from
    alive: true,
  });
}

// Hatch: egg promotes to the NEXT tier and spawns a new enemy of that tier.
// Bounder → Hunter → Shadow Lord → Bounder (wraps around).
function spawnEnemyAtEgg(egg) {
  const fromTier = egg.tier || 'bounder';
  const nextTier = NEXT_TIER[fromTier];
  const x = egg.x - (BIRD_W - EGG_W) / 2;
  const y = egg.y - (BIRD_H - EGG_H);
  spawnEnemyOfTier(nextTier, x, y, null);
  // The hatched enemy already has birthTimer set; we want it to fly off
  // immediately, not stay frozen on a pad. Override the birth state:
  const e = enemies[enemies.length - 1];
  e.birthTimer = 0;
  e.invulnTimer = 0.6;        // brief invuln so player can't double-tap kill it
  e.vx = (Math.random() < 0.5 ? -80 : 80);
  e.vy = -60;                  // small lift as the buzzard picks it up
  e.onGround = false;
}

function spawnEnemy() {
  // Pick a random spawn pad — these are the 4 small platforms with silver
  // "birth strips" on top. Enemy materializes ON the pad, not in the sky.
  const pads = getSpawnPads();
  if (pads.length === 0) return;
  const pad = pads[Math.floor(Math.random() * pads.length)];
  // Pick a knight tier weighted by wave difficulty
  const tierName = pickEnemyTierForWave(wave);
  spawnEnemyOfTier(tierName, pad.x, pad.y, pad.platform);
}

// Spawn a specific tier at a given position. Used by both wave-start spawning
// (from a pad) and egg-hatch spawning (at egg position, no pad).
function spawnEnemyOfTier(tierName, x, y, birthPad) {
  const tier = KNIGHT_TIERS[tierName];
  const dur  = getBirthDuration(tier.birthSound);
  enemies.push({
    x, y,
    vx: 0,
    vy: 0,
    facingLeft: Math.random() < 0.5,
    flapTimer: 0,
    flapAnimTime: 999,
    aiTimer: 0.5,
    onGround: true,
    tier: tierName,
    flapPower: tier.flapPower,
    aiAggression: tier.aiAggression,
    flightAge: 0,              // seconds since birth ended; raises vertical aggression over time
    bumpCooldown: 0,           // prevents platform-edge pinball double-flips
    // Canonical Joust AI state (ports the 1982 ROM's per-process AI vars):
    //   isSmart  → false until LINET promotes us under WSMART quota
    //   aiMode   → 'level' | 'climb' | 'dive' (set on transitions from BOLEV)
    //   plavt    → PLAVT, the LINET tick countdown that gates re-checks
    //   prdir    → PRDIR, debounce counter for copying player's facing
    //   pdist    → PDIST, remembered target Y for BOLEV level flight
    //   ppvelx   → PPVELX, remembered player vx for "did they turn?" check
    //   facingFlipTimer → throttles autonomous direction flips when stuck
    isSmart:  false,
    aiMode:   'level',
    plavt:    0.4 + Math.random() * 0.2,
    prdir:    0,
    pdist:    y,
    ppvelx:   0,
    facingFlipTimer: 0,
    birthTimer: dur,
    birthDuration: dur,
    birthMode: 'enemy',
    birthPad: birthPad || null,
    invulnTimer: dur,
    alive: true,
  });
  // Play the tier's birth sound (falls back to enemybirth synth if WAV missing)
  if (snd[tier.birthSound]) snd[tier.birthSound]();
  else snd.enemybirth();
}

//── Input ────────────────────────────────────────────────────────────────────
const keys = { left: false, right: false, flapPressed: false };
// Track when each direction key was FIRST pressed, for tap-vs-hold detection.
// -1 means key isn't currently held.
let leftPressTime  = -1;
let rightPressTime = -1;

window.addEventListener('keydown', (ev) => {
  const k = ev.key;
  const now = performance.now() / 1000;
  if (k === 'ArrowLeft' || k === 'a' || k === 'A') {
    if (!keys.left) leftPressTime = now;  // edge-detect first press (ignore auto-repeat)
    keys.left = true;
    ev.preventDefault();
  }
  else if (k === 'ArrowRight' || k === 'd' || k === 'D') {
    if (!keys.right) rightPressTime = now;
    keys.right = true;
    ev.preventDefault();
  }
  else if (k === ' ' || k === 'w' || k === 'W' || k === 'ArrowUp') {
    keys.flapPressed = true;  // edge-triggered flap; consumed in update
    ev.preventDefault();
  }
  else if (k === 'p' || k === 'P' || k === 'Escape') {
    if (state === 'PLAYING') {
      paused = !paused;
      ev.preventDefault();
    }
  }
});
window.addEventListener('keyup', (ev) => {
  const k = ev.key;
  if (k === 'ArrowLeft' || k === 'a' || k === 'A')  { keys.left  = false; leftPressTime  = -1; }
  else if (k === 'ArrowRight' || k === 'd' || k === 'D') { keys.right = false; rightPressTime = -1; }
});

//── Audio ────────────────────────────────────────────────────────────────────
let audioCtx = null;
function getAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { audioCtx = { _broken: true }; }
  }
  return audioCtx;
}

function tone(freq, dur, type='square', vol=0.12, decay=true) {
  const ac = getAudio(); if (ac._broken) return;
  const osc = ac.createOscillator(); const g = ac.createGain();
  osc.type = type; osc.frequency.value = freq;
  g.gain.value = vol;
  if (decay) {
    g.gain.setValueAtTime(vol, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  }
  osc.connect(g); g.connect(ac.destination);
  osc.start(); osc.stop(ac.currentTime + dur);
}
function noiseBurst(dur, vol=0.08) {
  const ac = getAudio(); if (ac._broken) return;
  const bufSize = Math.floor(ac.sampleRate * dur);
  const buf = ac.createBuffer(1, bufSize, ac.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufSize);
  const src = ac.createBufferSource(); src.buffer = buf;
  const g = ac.createGain(); g.gain.value = vol;
  src.connect(g); g.connect(ac.destination); src.start();
}

//── Sound file loading (WAV/MP3 → AudioBuffer cache) ─────────────────────────
// Loaded files live here. null means not loaded yet OR failed to load —
// either way, the corresponding snd.* function falls back to synth.
// To add a new sound: just drop the WAV at the listed path. Page refresh
// picks it up automatically. No code change needed.
const audioBuffers = {
  flap:         null,
  egg:          null,
  skid:         null,
  jousthit:     null,  // lance-on-lance kill impact
  enemycollide: null,  // any bird-vs-bird contact (broader than jousthit)
  floorbump:    null,  // bird vs platform side/underside (not landing)
  death:        null,
  spawn:        null,
  wave:         null,
  hundred:      null,
  pterodactyl:  null,
  lavatroll:    null,
  // Birth/materialize sounds — one per knight color, plus generic enemy
  mybirth:      null,  // player birth/respawn animation sound
  bluebirth:    null,  // blue knight (currently our only enemy type)
  enemybirth:   null,  // generic/unknown enemy birth (fallback)
};

function loadAudioBuffer(name, url) {
  fetch(url)
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.arrayBuffer();
    })
    .then(buf => getAudio().decodeAudioData(buf))
    .then(decoded => {
      audioBuffers[name] = decoded;
      console.log('[audio] loaded "' + name + '" (' + decoded.duration.toFixed(2) + 's)');
    })
    .catch(err => {
      console.log('[audio] no "' + name + '" wav (using synth) — ' + err.message);
    });
}

// Play a loaded buffer with optional pitch + volume variation. Returns true
// if the buffer played, false if it wasn't loaded (caller can synth-fallback).
function playBuffer(name, opts) {
  opts = opts || {};
  const buf = audioBuffers[name];
  if (!buf) return false;
  const ac = getAudio();
  if (ac._broken) return false;
  if (ac.state === 'suspended') ac.resume();

  const src = ac.createBufferSource();
  src.buffer = buf;
  if (opts.playbackRate !== undefined) src.playbackRate.value = opts.playbackRate;

  const g = ac.createGain();
  g.gain.value = opts.volume !== undefined ? opts.volume : 1.0;

  src.connect(g); g.connect(ac.destination);
  src.start();
  return true;
}

// Cartoon descending whistle skid. Triangle wave, frequency 800 Hz → 80 Hz.
// Duration scales with intensity — fast skid = long slide = long sound.
function skidSound(intensity) {
  console.log('[SKID] firing, intensity=' + intensity.toFixed(2));
  const ac = getAudio();
  if (ac._broken) { console.log('[SKID] audio broken'); return; }
  if (ac.state === 'suspended') {
    console.log('[SKID] audio suspended - trying to resume');
    ac.resume();
  }

  const t0 = ac.currentTime;
  // Match the actual slide duration: vx / GROUND_DECEL ≈ intensity * (HORIZ_MAX / GROUND_DECEL)
  // With HORIZ_MAX=240 and GROUND_DECEL=300, full speed gives 0.8 sec.
  const dur = Math.max(0.18, intensity * 0.80);

  // Descending whistle — triangle wave is softer than square
  const osc = ac.createOscillator();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(800, t0);
  osc.frequency.exponentialRampToValueAtTime(80, t0 + dur);

  // Volume envelope — louder for stronger skid
  const peakGain = 0.22 + 0.12 * intensity;
  const g = ac.createGain();
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(peakGain, t0 + 0.02);
  g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);

  osc.connect(g); g.connect(ac.destination);
  osc.start(t0);
  osc.stop(t0 + dur);
}
