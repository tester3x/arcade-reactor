<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOUST v0.1 — Arcade Reactor</title>
<link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png">
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: #050813; color: #e6edf3;
    font-family: 'JetBrains Mono', ui-monospace, Consolas, monospace;
    height: 100%; overflow: hidden;
  }
  body {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh;
  }
  .wrap {
    position: relative; width: 800px; height: 600px;
    max-width: 100vw; max-height: 100vh;
    aspect-ratio: 4 / 3;
  }
  canvas { display: block; width: 100%; height: 100%; cursor: default; background: #050813; }

  .hud {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 16px; pointer-events: none;
    color: #ffdb4a; font-size: 14px; letter-spacing: 0.18em;
    text-shadow: 0 0 8px rgba(255, 219, 74, 0.4);
  }
  .hud-section { display: flex; gap: 24px; }
  .hud-label { color: rgba(255, 219, 74, 0.55); font-size: 11px; letter-spacing: 0.22em; margin-right: 6px; }
  .hud-value { color: #ffdb4a; }
  .lives-icons { display: inline-flex; gap: 4px; vertical-align: middle; }
  .life-icon { width: 12px; height: 12px; }

  .overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(5, 8, 19, 0.85);
    text-align: center; padding: 24px;
    pointer-events: auto;
  }
  .overlay.hidden { display: none; }
  .overlay h1 {
    font-size: 48px; letter-spacing: 0.28em; margin: 0 0 14px;
    color: #ffdb4a; text-shadow: 0 0 24px rgba(255, 219, 74, 0.5);
  }
  .overlay h2 {
    font-size: 24px; letter-spacing: 0.2em; margin: 0 0 14px;
    color: #ff4a6e; text-shadow: 0 0 16px rgba(255, 74, 110, 0.5);
  }
  .overlay p { color: rgba(230, 237, 243, 0.7); margin: 4px 0; font-size: 13px; letter-spacing: 0.05em; line-height: 1.6; }
  .overlay .big-score { color: #ffdb4a; font-size: 28px; margin: 12px 0 16px; letter-spacing: 0.12em; }
  .overlay button {
    margin-top: 18px; padding: 12px 32px; background: transparent;
    color: #ffdb4a; border: 1px solid rgba(255, 219, 74, 0.5);
    font-family: inherit; font-size: 13px; letter-spacing: 0.22em; cursor: pointer;
    border-radius: 4px;
    transition: background 0.15s ease, color 0.15s ease, box-shadow 0.15s ease;
  }
  .overlay button:hover {
    background: rgba(255, 219, 74, 0.12);
    box-shadow: 0 0 16px rgba(255, 219, 74, 0.3);
  }

  .version-tag {
    position: absolute; bottom: 8px; right: 12px;
    font-size: 10px; color: rgba(255, 255, 255, 0.18); letter-spacing: 0.2em;
    pointer-events: none;
  }

  .back-link {
    position: fixed; top: 12px; left: 16px;
    color: rgba(255, 219, 74, 0.5); text-decoration: none;
    font-size: 12px; letter-spacing: 0.2em;
    transition: color 0.15s ease;
    z-index: 10;
  }
  .back-link:hover { color: #ffdb4a; }
</style>
</head>
<body>
  <a href="../index.html" class="back-link">← ARCADE REACTOR</a>
  <div class="wrap">
    <canvas id="game" width="800" height="600"></canvas>
    <div class="hud">
      <div class="hud-section">
        <div><span class="hud-label">SCORE</span><span class="hud-value" id="score">0</span></div>
        <div><span class="hud-label">WAVE</span><span class="hud-value" id="wave">1</span></div>
      </div>
      <div class="hud-section">
        <div><span class="hud-label">LIVES</span><span class="lives-icons" id="lives"></span></div>
      </div>
    </div>
    <div class="overlay" id="overlay">
      <h1>JOUST</h1>
      <p>Flap to fly. Joust by lance height — higher lance loses.</p>
      <p>Touch the lava and you die. Wrap around the edges.</p>
      <p style="margin-top: 16px;">A/D or ←→ to move · Space/W/↑ to flap</p>
      <button id="startBtn">START</button>
    </div>
    <div class="version-tag" id="versionTag">v0.1</div>
  </div>

<script>
//──────────────────────────────────────────────────────────────────────────────
// JOUST v0.1 — Arcade Reactor
//──────────────────────────────────────────────────────────────────────────────

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width;   // 800
const H = canvas.height;  // 600

//── Constants ─────────────────────────────────────────────────────────────────
const GRAVITY        = 1400;   // px/sec²
const FLAP_IMPULSE   = -380;   // px/sec — velocity added on flap (negative = up)
const MAX_VY_UP      = -500;   // cap upward velocity
const TERMINAL_VY    = 700;    // cap downward velocity
const HORIZ_ACCEL    = 700;    // px/sec²
const HORIZ_MAX      = 240;    // max horizontal speed
const AIR_FRICTION   = 0.96;   // per-frame multiplier when no input
const GROUND_FRICTION= 0.86;
const FLAP_COOLDOWN  = 0.16;   // sec — minimum between flaps (key must be re-pressed)

const BIRD_W         = 38;
const BIRD_H         = 30;
const LANCE_OFFSET_Y = -10;    // how far above bird-top the lance sits (rider height)
const LANCE_TOLERANCE= 6;      // pixels — if lances within this, both bounce

const LAVA_TOP       = H - 36;
const CEILING        = 28;     // hard ceiling near top

const ENEMY_SPAWN_INTERVAL = 4.0; // sec between spawns (early game)
const MAX_ENEMIES_ON_SCREEN = 3;
const ENEMIES_PER_WAVE = 4;       // kill this many to advance

const STARTING_LIVES = 3;

const COLOR_BG       = '#050813';
const COLOR_STAR     = 'rgba(255, 255, 255, 0.5)';
const COLOR_STAR_DIM = 'rgba(255, 255, 255, 0.15)';
const COLOR_PLATFORM = '#3a3f4a';
const COLOR_PLATFORM_EDGE = '#5a6070';
const COLOR_LAVA     = '#ff3d6e';
const COLOR_LAVA_HOT = '#ffb3c5';
const COLOR_PLAYER   = '#ffdb4a';
const COLOR_PLAYER_RIDER = '#6b3d99';
const COLOR_ENEMY    = '#ff4a4a';
const COLOR_ENEMY_RIDER = '#2a2a3a';
const COLOR_LANCE    = '#e6edf3';

//── State ─────────────────────────────────────────────────────────────────────
let state = 'MENU'; // MENU, PLAYING, GAME_OVER
let score = 0;
let wave = 1;
let lives = STARTING_LIVES;
let enemiesKilledThisWave = 0;
let spawnTimer = 0;

const hudScore = document.getElementById('score');
const hudWave  = document.getElementById('wave');
const hudLives = document.getElementById('lives');
const overlay  = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');

//── Platforms ────────────────────────────────────────────────────────────────
// y = top of platform; thickness rendered downward 10px
const platforms = [
  // Ground-level platforms (with lava gap in middle)
  { x: 0,   y: H - 36, w: 220 },
  { x: 580, y: H - 36, w: 220 },
  // Mid platforms
  { x: 110, y: 360, w: 180 },
  { x: 510, y: 360, w: 180 },
  // High center
  { x: 320, y: 240, w: 160 },
  // Top platform
  { x: 280, y: 110, w: 240 },
];
const PLATFORM_THICKNESS = 10;

//── Player ───────────────────────────────────────────────────────────────────
const player = {
  x: 140, y: H - 36 - BIRD_H,
  vx: 0, vy: 0,
  facingLeft: false,
  onGround: true,
  flapTimer: 0,        // cooldown
  flapAnimTime: 0,     // visual: how long since last flap (drives wing animation)
  alive: true,
  respawnTimer: 0,
  invulnTimer: 0,      // brief invulnerability after respawn
};

//── Enemies ──────────────────────────────────────────────────────────────────
const enemies = [];

function spawnEnemy() {
  // Spawn from one of the high platforms; come out airborne with random direction
  const spawnPoints = [
    { x: 380, y: 80 },   // top center
    { x: 150, y: 320 },  // left mid
    { x: 600, y: 320 },  // right mid
  ];
  const sp = spawnPoints[Math.floor(Math.random() * spawnPoints.length)];
  enemies.push({
    x: sp.x, y: sp.y,
    vx: (Math.random() < 0.5 ? -80 : 80),
    vy: 0,
    facingLeft: Math.random() < 0.5,
    flapTimer: 0,
    flapAnimTime: 0,
    aiTimer: 0,
    alive: true,
  });
}

//── Input ────────────────────────────────────────────────────────────────────
const keys = { left: false, right: false, flapPressed: false };

window.addEventListener('keydown', (ev) => {
  const k = ev.key;
  if (k === 'ArrowLeft' || k === 'a' || k === 'A') { keys.left = true; ev.preventDefault(); }
  else if (k === 'ArrowRight' || k === 'd' || k === 'D') { keys.right = true; ev.preventDefault(); }
  else if (k === ' ' || k === 'w' || k === 'W' || k === 'ArrowUp') {
    keys.flapPressed = true;  // edge-triggered flap; consumed in update
    ev.preventDefault();
  }
});
window.addEventListener('keyup', (ev) => {
  const k = ev.key;
  if (k === 'ArrowLeft' || k === 'a' || k === 'A') keys.left = false;
  else if (k === 'ArrowRight' || k === 'd' || k === 'D') keys.right = false;
});

//── Audio ────────────────────────────────────────────────────────────────────
let audioCtx = null;
function getAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { audioCtx = { _broken: true }; }
  }
  return audioCtx;
}

function tone(freq, dur, type='square', vol=0.12, decay=true) {
  const ac = getAudio(); if (ac._broken) return;
  const osc = ac.createOscillator(); const g = ac.createGain();
  osc.type = type; osc.frequency.value = freq;
  g.gain.value = vol;
  if (decay) {
    g.gain.setValueAtTime(vol, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  }
  osc.connect(g); g.connect(ac.destination);
  osc.start(); osc.stop(ac.currentTime + dur);
}
function noiseBurst(dur, vol=0.08) {
  const ac = getAudio(); if (ac._broken) return;
  const bufSize = Math.floor(ac.sampleRate * dur);
  const buf = ac.createBuffer(1, bufSize, ac.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufSize);
  const src = ac.createBufferSource(); src.buffer = buf;
  const g = ac.createGain(); g.gain.value = vol;
  src.connect(g); g.connect(ac.destination); src.start();
}

const snd = {
  flap:   () => { noiseBurst(0.08, 0.06); tone(280, 0.08, 'square', 0.08); },
  jousthit: () => { tone(660, 0.08, 'square', 0.14); setTimeout(() => tone(880, 0.12, 'square', 0.14), 60); },
  death:    () => { tone(220, 0.15, 'sawtooth', 0.18); setTimeout(() => tone(110, 0.25, 'sawtooth', 0.18), 150); },
  spawn:    () => { tone(180, 0.06, 'triangle', 0.10); setTimeout(() => tone(240, 0.06, 'triangle', 0.10), 60); },
  wave:     () => {
    tone(523, 0.12, 'square', 0.14);
    setTimeout(() => tone(659, 0.12, 'square', 0.14), 130);
    setTimeout(() => tone(784, 0.20, 'square', 0.14), 260);
  },
};

//── Helpers ──────────────────────────────────────────────────────────────────
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function birdBox(b) {
  return { x: b.x, y: b.y, w: BIRD_W, h: BIRD_H };
}
function lanceY(b) {
  return b.y + LANCE_OFFSET_Y;
}
function rectOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function updateLivesHUD() {
  hudLives.innerHTML = '';
  for (let i = 0; i < lives; i++) {
    const span = document.createElement('span');
    span.className = 'life-icon';
    span.innerHTML = `<svg viewBox="0 0 12 12" width="12" height="12"><circle cx="6" cy="6" r="5" fill="#ffdb4a"/></svg>`;
    hudLives.appendChild(span);
  }
}

//── Game flow ────────────────────────────────────────────────────────────────
function startGame() {
  state = 'PLAYING';
  score = 0;
  wave = 1;
  lives = STARTING_LIVES;
  enemiesKilledThisWave = 0;
  enemies.length = 0;
  spawnTimer = 1.0; // first spawn after 1 sec
  player.x = 140; player.y = H - 36 - BIRD_H;
  player.vx = 0; player.vy = 0;
  player.facingLeft = false; player.onGround = true;
  player.alive = true; player.respawnTimer = 0; player.invulnTimer = 1.0;
  hudScore.textContent = score;
  hudWave.textContent = wave;
  updateLivesHUD();
  overlay.classList.add('hidden');
}

function gameOver() {
  state = 'GAME_OVER';
  overlay.classList.remove('hidden');
  overlay.innerHTML = `
    <h2>GAME OVER</h2>
    <p>Final Score</p>
    <div class="big-score">${score}</div>
    <p>Wave reached: ${wave}</p>
    <button id="restartBtn">PLAY AGAIN</button>
  `;
  document.getElementById('restartBtn').addEventListener('click', startGame);
}

function loseLife() {
  snd.death();
  lives--;
  updateLivesHUD();
  if (lives <= 0) {
    setTimeout(gameOver, 800);
    return;
  }
  // Respawn after delay
  player.alive = false;
  player.respawnTimer = 1.0;
}

function respawnPlayer() {
  player.x = 140; player.y = H - 36 - BIRD_H;
  player.vx = 0; player.vy = 0;
  player.facingLeft = false; player.onGround = true;
  player.alive = true; player.invulnTimer = 1.5;
}

function advanceWave() {
  wave++;
  hudWave.textContent = wave;
  enemiesKilledThisWave = 0;
  snd.wave();
  // Clear enemies to make wave transition feel clean
  enemies.length = 0;
  spawnTimer = 1.2;
}

//── Update ───────────────────────────────────────────────────────────────────
function update(dt) {
  // Player input + physics
  if (player.alive) {
    // Flap (edge-triggered, single impulse per press)
    if (keys.flapPressed && player.flapTimer <= 0) {
      player.vy = Math.max(MAX_VY_UP, player.vy + FLAP_IMPULSE);
      player.flapTimer = FLAP_COOLDOWN;
      player.flapAnimTime = 0;
      player.onGround = false;
      snd.flap();
    }
    keys.flapPressed = false;
    player.flapTimer -= dt;
    player.flapAnimTime += dt;

    // Horizontal input
    if (keys.left) {
      player.vx -= HORIZ_ACCEL * dt;
      player.facingLeft = true;
    }
    if (keys.right) {
      player.vx += HORIZ_ACCEL * dt;
      player.facingLeft = false;
    }
    if (!keys.left && !keys.right) {
      player.vx *= player.onGround ? GROUND_FRICTION : AIR_FRICTION;
    }
    player.vx = clamp(player.vx, -HORIZ_MAX, HORIZ_MAX);

    // Gravity
    player.vy += GRAVITY * dt;
    player.vy = Math.min(player.vy, TERMINAL_VY);

    // Apply
    player.x += player.vx * dt;
    player.y += player.vy * dt;

    // Horizontal wrap
    if (player.x + BIRD_W < 0) player.x = W;
    if (player.x > W) player.x = -BIRD_W;

    // Ceiling
    if (player.y < CEILING) { player.y = CEILING; player.vy = Math.max(0, player.vy); }

    // Platform collision (landing only — from above)
    player.onGround = false;
    for (const p of platforms) {
      if (player.vy >= 0 &&
          player.x + BIRD_W > p.x && player.x < p.x + p.w &&
          player.y + BIRD_H >= p.y && player.y + BIRD_H <= p.y + PLATFORM_THICKNESS + Math.abs(player.vy * dt) + 1) {
        player.y = p.y - BIRD_H;
        player.vy = 0;
        player.onGround = true;
        break;
      }
    }

    // Lava
    if (player.y + BIRD_H > LAVA_TOP && !player.onGround) {
      if (player.invulnTimer <= 0) {
        loseLife();
      }
    }

    player.invulnTimer = Math.max(0, player.invulnTimer - dt);
  } else {
    // Player dead, count down respawn
    player.respawnTimer -= dt;
    if (player.respawnTimer <= 0 && lives > 0) {
      respawnPlayer();
    }
  }

  // Enemies
  for (const e of enemies) {
    if (!e.alive) continue;

    // Simple AI: occasionally flap toward player's height if below, drift toward player horizontally
    e.aiTimer -= dt;
    e.flapTimer -= dt;
    e.flapAnimTime += dt;
    if (e.aiTimer <= 0) {
      e.aiTimer = 0.18 + Math.random() * 0.25;
      // Flap if we should gain altitude (below player or low)
      const wantAlt = player.alive ? player.y : H / 2;
      if (e.y > wantAlt + 30 && e.flapTimer <= 0) {
        e.vy = Math.max(MAX_VY_UP, e.vy + FLAP_IMPULSE * 0.9);
        e.flapTimer = FLAP_COOLDOWN * 1.2;
        e.flapAnimTime = 0;
      }
      // Steer horizontally toward player
      if (player.alive) {
        const dx = player.x - e.x;
        if (Math.abs(dx) > BIRD_W) {
          e.vx += (dx > 0 ? 1 : -1) * HORIZ_ACCEL * 0.5 * 0.18;
          e.facingLeft = (dx < 0);
        }
      }
    }

    e.vx = clamp(e.vx, -HORIZ_MAX, HORIZ_MAX);
    e.vy += GRAVITY * dt;
    e.vy = Math.min(e.vy, TERMINAL_VY);
    e.x += e.vx * dt;
    e.y += e.vy * dt;

    // Wrap
    if (e.x + BIRD_W < 0) e.x = W;
    if (e.x > W) e.x = -BIRD_W;
    if (e.y < CEILING) { e.y = CEILING; e.vy = Math.max(0, e.vy); }

    // Platform collision
    for (const p of platforms) {
      if (e.vy >= 0 &&
          e.x + BIRD_W > p.x && e.x < p.x + p.w &&
          e.y + BIRD_H >= p.y && e.y + BIRD_H <= p.y + PLATFORM_THICKNESS + Math.abs(e.vy * dt) + 1) {
        e.y = p.y - BIRD_H;
        e.vy = 0;
        break;
      }
    }

    // Lava (enemies just die in lava)
    if (e.y + BIRD_H > LAVA_TOP) {
      e.alive = false;
      // No score for lava death
    }
  }

  // Bird-bird collisions: player vs enemies
  if (player.alive && player.invulnTimer <= 0) {
    for (const e of enemies) {
      if (!e.alive) continue;
      if (rectOverlap(birdBox(player), birdBox(e))) {
        const pl = lanceY(player);
        const el = lanceY(e);
        const diff = pl - el; // negative = player's lance is higher (better)
        if (Math.abs(diff) < LANCE_TOLERANCE) {
          // Bounce off each other
          const sep = (player.x < e.x ? -1 : 1);
          player.vx += sep * 180;
          e.vx       -= sep * 180;
        } else if (diff < 0) {
          // Player's lance higher → player wins
          e.alive = false;
          score += 750;
          hudScore.textContent = score;
          enemiesKilledThisWave++;
          snd.jousthit();
          // Small bounce so player isn't sitting on dead enemy
          player.vy = -120;
        } else {
          // Enemy's lance higher → player dies
          loseLife();
          break;
        }
      }
    }
  }

  // Clean up dead enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    if (!enemies[i].alive) enemies.splice(i, 1);
  }

  // Spawning
  if (state === 'PLAYING' && enemies.length < MAX_ENEMIES_ON_SCREEN) {
    spawnTimer -= dt;
    if (spawnTimer <= 0) {
      const needed = ENEMIES_PER_WAVE - enemiesKilledThisWave - enemies.length;
      if (needed > 0) {
        spawnEnemy();
        snd.spawn();
      }
      // Spawn faster as the wave progresses
      spawnTimer = Math.max(1.2, ENEMY_SPAWN_INTERVAL - (wave - 1) * 0.3);
    }
  }

  // Wave progression
  if (enemiesKilledThisWave >= ENEMIES_PER_WAVE && enemies.length === 0) {
    advanceWave();
  }
}

//── Rendering ────────────────────────────────────────────────────────────────
// Background stars (precomputed)
const stars = [];
for (let i = 0; i < 80; i++) {
  stars.push({
    x: Math.random() * W,
    y: Math.random() * (H - 80),
    bright: Math.random() < 0.4,
  });
}

function drawBackground() {
  ctx.fillStyle = COLOR_BG;
  ctx.fillRect(0, 0, W, H);
  // Stars
  for (const s of stars) {
    ctx.fillStyle = s.bright ? COLOR_STAR : COLOR_STAR_DIM;
    ctx.fillRect(s.x, s.y, 1.5, 1.5);
  }
}

function drawPlatforms() {
  for (const p of platforms) {
    // Body
    ctx.fillStyle = COLOR_PLATFORM;
    ctx.fillRect(p.x, p.y, p.w, PLATFORM_THICKNESS);
    // Top edge (slightly brighter for definition)
    ctx.fillStyle = COLOR_PLATFORM_EDGE;
    ctx.fillRect(p.x, p.y, p.w, 2);
  }
}

let lavaWavePhase = 0;
function drawLava(dt) {
  lavaWavePhase += dt * 2;
  ctx.fillStyle = COLOR_LAVA;
  ctx.fillRect(0, LAVA_TOP, W, H - LAVA_TOP);
  // Wavy bright top
  ctx.fillStyle = COLOR_LAVA_HOT;
  for (let x = 0; x < W; x += 3) {
    const wave = Math.sin(x * 0.08 + lavaWavePhase) * 3 + Math.sin(x * 0.18 + lavaWavePhase * 1.7) * 1.5;
    ctx.fillRect(x, LAVA_TOP - 1 + wave, 3, 2);
  }
}

// Draw a bird+rider. `b` is the bird state. `bodyColor`/`riderColor` differentiate.
// Flapping detected via b.flapAnimTime (low value = wings up, recently flapped).
function drawBird(b, bodyColor, riderColor) {
  ctx.save();
  // Translate to bird center, flip if facing left
  const cx = b.x + BIRD_W / 2;
  const cy = b.y + BIRD_H / 2;
  ctx.translate(cx, cy);
  if (b.facingLeft) ctx.scale(-1, 1);
  ctx.translate(-BIRD_W / 2, -BIRD_H / 2);

  // Body (oval-ish)
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.ellipse(BIRD_W * 0.5, BIRD_H * 0.62, BIRD_W * 0.42, BIRD_H * 0.30, 0, 0, Math.PI * 2);
  ctx.fill();

  // Wing — animate based on flapAnimTime
  // 0-0.10s: wings up; 0.10-0.20s: wings down; after: tucked
  const t = b.flapAnimTime;
  let wingY = BIRD_H * 0.55; // tucked
  let wingShape = 'tuck';
  if (t < 0.10) { wingY = BIRD_H * 0.20; wingShape = 'up'; }
  else if (t < 0.22) { wingY = BIRD_H * 0.85; wingShape = 'down'; }

  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  if (wingShape === 'up') {
    ctx.moveTo(BIRD_W * 0.30, BIRD_H * 0.55);
    ctx.lineTo(BIRD_W * 0.20, wingY);
    ctx.lineTo(BIRD_W * 0.55, BIRD_H * 0.50);
    ctx.closePath();
  } else if (wingShape === 'down') {
    ctx.moveTo(BIRD_W * 0.30, BIRD_H * 0.65);
    ctx.lineTo(BIRD_W * 0.18, wingY);
    ctx.lineTo(BIRD_W * 0.55, BIRD_H * 0.65);
    ctx.closePath();
  } else {
    // Tucked
    ctx.moveTo(BIRD_W * 0.30, BIRD_H * 0.58);
    ctx.lineTo(BIRD_W * 0.50, BIRD_H * 0.70);
    ctx.lineTo(BIRD_W * 0.55, BIRD_H * 0.55);
    ctx.closePath();
  }
  ctx.fill();

  // Neck and head (long ostrich neck arching up and forward)
  ctx.strokeStyle = bodyColor;
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(BIRD_W * 0.75, BIRD_H * 0.55);
  ctx.quadraticCurveTo(BIRD_W * 0.92, BIRD_H * 0.30, BIRD_W * 0.92, BIRD_H * 0.40);
  ctx.stroke();
  // Head
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.arc(BIRD_W * 0.93, BIRD_H * 0.32, 3.5, 0, Math.PI * 2);
  ctx.fill();
  // Beak
  ctx.fillStyle = '#ffaa3a';
  ctx.beginPath();
  ctx.moveTo(BIRD_W * 0.96, BIRD_H * 0.31);
  ctx.lineTo(BIRD_W * 1.04, BIRD_H * 0.33);
  ctx.lineTo(BIRD_W * 0.96, BIRD_H * 0.36);
  ctx.closePath();
  ctx.fill();
  // Eye
  ctx.fillStyle = '#000';
  ctx.fillRect(BIRD_W * 0.93, BIRD_H * 0.30, 1.5, 1.5);

  // Legs (two thin lines going down)
  ctx.strokeStyle = bodyColor;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(BIRD_W * 0.42, BIRD_H * 0.85);
  ctx.lineTo(BIRD_W * 0.40, BIRD_H * 1.02);
  ctx.moveTo(BIRD_W * 0.56, BIRD_H * 0.85);
  ctx.lineTo(BIRD_W * 0.58, BIRD_H * 1.02);
  ctx.stroke();

  // Rider — sits on the back of the bird
  // Rider body
  ctx.fillStyle = riderColor;
  ctx.fillRect(BIRD_W * 0.38, BIRD_H * 0.18, 9, 14);
  // Rider head
  ctx.beginPath();
  ctx.arc(BIRD_W * 0.43, BIRD_H * 0.13, 3.5, 0, Math.PI * 2);
  ctx.fill();
  // Lance — extends forward from rider's chest height
  // Lance is positioned at the bird's "lance Y" which is bird.y + LANCE_OFFSET_Y in world coords
  // In local coords here, that's at y = LANCE_OFFSET_Y (since we translated to bird's top-left)
  ctx.strokeStyle = COLOR_LANCE;
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(BIRD_W * 0.50, BIRD_H * 0.20);
  ctx.lineTo(BIRD_W * 1.15, BIRD_H * 0.22);
  ctx.stroke();
  // Lance tip
  ctx.fillStyle = COLOR_LANCE;
  ctx.beginPath();
  ctx.moveTo(BIRD_W * 1.15, BIRD_H * 0.18);
  ctx.lineTo(BIRD_W * 1.22, BIRD_H * 0.22);
  ctx.lineTo(BIRD_W * 1.15, BIRD_H * 0.26);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawPlayer() {
  if (!player.alive) return;
  // Flicker during invulnerability
  if (player.invulnTimer > 0 && Math.floor(player.invulnTimer * 12) % 2 === 0) return;
  drawBird(player, COLOR_PLAYER, COLOR_PLAYER_RIDER);
}

function drawEnemies() {
  for (const e of enemies) {
    if (e.alive) drawBird(e, COLOR_ENEMY, COLOR_ENEMY_RIDER);
  }
}

//── Main loop ────────────────────────────────────────────────────────────────
let lastT = performance.now();
function frame(now) {
  const dt = Math.min(0.033, (now - lastT) / 1000); // clamp to 30fps min step
  lastT = now;

  if (state === 'PLAYING') {
    update(dt);
  }

  drawBackground();
  drawPlatforms();
  drawLava(dt);
  drawEnemies();
  drawPlayer();

  requestAnimationFrame(frame);
}

//── Boot ─────────────────────────────────────────────────────────────────────
updateLivesHUD();
startBtn.addEventListener('click', startGame);
requestAnimationFrame(frame);

</script>
</body>
</html>
