<section id="block-party" class="collection">
  <div class="container">
    <div class="section-head">
      <div>
        <p class="section-eyebrow">COLLECTION 04</p>
        <h2 class="section-title">Block Party</h2>
        <p class="section-sub">Paddle. Ball. Bricks. The geometry of reflection.</p>
      </div>
      <span class="section-tag">1 game</span>
    </div>
    <div class="card-grid">
      <article class="game-card">
        <div class="game-art game-art-breakout" aria-hidden="true">
          <svg viewBox="0 0 160 120" class="art-svg">
            <!-- Brick rows: 4 colors representing the 8 actual rows (2 per color) -->
            <g>
              <!-- Row 1 (red) -->
              <rect x="20"  y="22" width="15" height="6" fill="#ff5050"/>
              <rect x="37"  y="22" width="15" height="6" fill="#ff5050"/>
              <rect x="54"  y="22" width="15" height="6" fill="#ff5050"/>
              <rect x="71"  y="22" width="15" height="6" fill="#ff5050"/>
              <rect x="88"  y="22" width="15" height="6" fill="#ff5050"/>
              <rect x="105" y="22" width="15" height="6" fill="#ff5050"/>
              <rect x="122" y="22" width="15" height="6" fill="#ff5050"/>
              <!-- Row 2 (orange) — one brick missing to suggest gameplay -->
              <rect x="20"  y="30" width="15" height="6" fill="#ff9650"/>
              <rect x="37"  y="30" width="15" height="6" fill="#ff9650"/>
              <rect x="54"  y="30" width="15" height="6" fill="#ff9650"/>
              <!-- gap at x=71 -->
              <rect x="88"  y="30" width="15" height="6" fill="#ff9650"/>
              <rect x="105" y="30" width="15" height="6" fill="#ff9650"/>
              <rect x="122" y="30" width="15" height="6" fill="#ff9650"/>
              <!-- Row 3 (yellow) -->
              <rect x="20"  y="38" width="15" height="6" fill="#ffe864"/>
              <rect x="37"  y="38" width="15" height="6" fill="#ffe864"/>
              <rect x="54"  y="38" width="15" height="6" fill="#ffe864"/>
              <rect x="71"  y="38" width="15" height="6" fill="#ffe864"/>
              <rect x="88"  y="38" width="15" height="6" fill="#ffe864"/>
              <rect x="105" y="38" width="15" height="6" fill="#ffe864"/>
              <rect x="122" y="38" width="15" height="6" fill="#ffe864"/>
              <!-- Row 4 (green) -->
              <rect x="20"  y="46" width="15" height="6" fill="#6effc8"/>
              <rect x="37"  y="46" width="15" height="6" fill="#6effc8"/>
              <rect x="54"  y="46" width="15" height="6" fill="#6effc8"/>
              <rect x="71"  y="46" width="15" height="6" fill="#6effc8"/>
              <rect x="88"  y="46" width="15" height="6" fill="#6effc8"/>
              <rect x="105" y="46" width="15" height="6" fill="#6effc8"/>
              <rect x="122" y="46" width="15" height="6" fill="#6effc8"/>
            </g>
            <!-- Ball trajectory hint (faint dashed line from paddle area up through the gap) -->
            <line x1="78" y1="100" x2="78" y2="36" stroke="#ffe864" stroke-width="0.6" stroke-dasharray="2,2" opacity="0.4"/>
            <!-- Ball in flight -->
            <circle cx="78" cy="65" r="2.5" fill="#cfeaff"/>
            <circle cx="78" cy="65" r="4.5" fill="none" stroke="#cfeaff" stroke-width="0.4" opacity="0.4"/>
            <!-- Paddle at bottom -->
            <rect x="62" y="100" width="32" height="5" fill="#7dffd6" rx="1"/>
          </svg>
        </div>
        <div class="game-meta">
          <h3 class="game-title">Breakout</h3>
          <p class="game-desc">Knock down the wall, brick by brick. Where the ball hits the paddle decides the angle — center for straight, edges for sharp.</p>
          <div class="game-footer">
            <span class="game-tag">PADDLE · CLASSIC</span>
            <a class="btn btn-primary btn-sm" href="./games/breakout.html">Play</a>
          </div>
        </div>
      </article>
    </div>
  </div>
</section>
